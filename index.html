// --- AUDIO SYSTEM ---
const SoundManager = {
    ctx: null, 
    currentBgm: null, 
    staticNode: null, 
    staticGain: null, 
    masterGain: null, 
    isMuted: false,
    tracks: ['test_bgm_01.mp3', 'test_bgm_02.mp3', 'test_bgm_03.mp3', 'test_bgm_04.mp3'],
    
    init: function() {
        if (this.ctx) return;
        window.AudioContext = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AudioContext();
        this.masterGain = this.ctx.createGain();
        this.masterGain.connect(this.ctx.destination);
        this.createRadioStatic();
        
        // [iOS 사파리 락 해제 핵심] 싱글톤 오디오 객체를 첫 터치 순간에 미리 단 하나만 생성해둔다네.
        if (!this.currentBgm) {
            this.currentBgm = new Audio();
            // 빈 소리로 미끼를 던져 사파리 브라우저의 오디오 재생 승인을 미리 획득하네!
            this.currentBgm.play().catch(() => {});
        }
    },
    
    // [iOS 전용 안전장치] 잠든 오디오 엔진을 유저가 화면을 만질 때마다 강제로 깨우는 함수일세.
    resume: function() {
        if (this.ctx && this.ctx.state === 'suspended') {
            this.ctx.resume();
        }
    },
    
    createRadioStatic: function() {
        if (!this.ctx) return;
        const bufferSize = 2 * this.ctx.sampleRate; 
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.2; 
        this.staticNode = this.ctx.createBufferSource();
        this.staticNode.buffer = buffer;
        this.staticNode.loop = true;
        this.staticGain = this.ctx.createGain();
        this.staticGain.gain.value = 0.03; 
        this.staticNode.connect(this.staticGain);
        this.staticGain.connect(this.masterGain); 
        this.staticNode.start();
    },
    
    playRandomBGM: function() {
        if (!this.currentBgm) this.currentBgm = new Audio();
        this.currentBgm.pause();
        const idx = Math.floor(Math.random() * this.tracks.length);
        this.currentBgm.src = this.tracks[idx]; // 객체를 새로 안 만들고 주소만 교체!
        this.currentBgm.loop = true;
        this.currentBgm.volume = 0.5; 
        this.currentBgm.play().catch(e => console.log("BGM wait", e));
    },
    
    stopBGM: function() { 
        if (this.currentBgm) this.currentBgm.pause(); 
    },
	
    playSpecificBGM: function(filename) {
        if (!this.currentBgm) this.currentBgm = new Audio();
        this.currentBgm.pause();
        this.currentBgm.src = filename; // 객체를 새로 안 만들고 주소만 교체!
        this.currentBgm.loop = true;
        this.currentBgm.volume = 0.5; 
        this.currentBgm.play().catch(e => console.log("BGM wait", e));
    },
	
    playBassExplosion: function(chainCount = 0) {
        if (!this.ctx || this.isMuted) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine'; 
        const baseFreq = 110.0; 
        const freq = baseFreq * Math.pow(1.05946, chainCount % 12); 
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.8, now + 0.05); 
        gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2); 
        osc.connect(gain); gain.connect(this.masterGain);
        osc.start(now); osc.stop(now + 1.2);
    },
    
    playBlockSound: function() {
        if (!this.ctx || this.isMuted) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'square'; 
        osc.frequency.setValueAtTime(1200, now); 
        osc.frequency.exponentialRampToValueAtTime(440, now + 0.1); 
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start(now);
        osc.stop(now + 0.1);
    },
    
    playItemGet: function(type) {
        if (!this.ctx || this.isMuted) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        if (type === 'num') { 
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(880, now); 
            gain.gain.setValueAtTime(0.2, now); 
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1); 
        } else { 
            osc.type = 'square'; 
            osc.frequency.setValueAtTime(440, now); 
            osc.frequency.linearRampToValueAtTime(880, now + 0.05); 
            gain.gain.setValueAtTime(0.1, now); 
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1); 
        }
        osc.connect(gain); gain.connect(this.masterGain);
        osc.start(now); osc.stop(now + 0.1);
    }
};

// --- VISUALS ---
const stars = [];
function initStars() { for (let i = 0; i < 100; i++) stars.push({ x: Math.random() * GAME_WIDTH, y: Math.random() * GAME_HEIGHT, size: Math.random() * 1.5 + 0.5, speed: Math.random() * 50 + 20, alpha: Math.random() * 0.5 + 0.3 }); }
function updateStars(dt) {     
    if (activeItems && activeItems.timeStop > 0) return; 

    // (타임스톱이 아닐 때만 아래 코드가 실행되어 별이 움직이네)
    stars.forEach(s => { 
        s.y += s.speed * dt; 
        if (s.y > GAME_HEIGHT) { s.y = 0; s.x = Math.random() * GAME_WIDTH; } 
    }); 
}
function drawStars() { ctx.save(); stars.forEach(s => { ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill(); }); ctx.restore(); }

// --- SERVER LOGIC ---
let globalScores = [];
let isFetching = false; // [로건의 안전장치] 혹시 모를 Reference Error 방지용
function fetchGlobalScores() { 
    isFetching = true; 
    fetch(SERVER_URL)
        .then(r => r.json())
        .then(d => { 
            let tempList = [];
            // 파이어베이스에서 받은 객체 데이터들을 자바스크립트 배열로 정제하네!
            if (d && typeof d === 'object') {
                Object.keys(d).forEach(key => {
                    if (d[key] && d[key].name && d[key].score !== undefined) {
                        tempList.push({ name: d[key].name, score: d[key].score });
                    }
                });
            }
            // 점수가 높은 순(내림차순)으로 칼같이 정렬하여 상위 20개만 슬라이스!
            tempList.sort((a, b) => b.score - a.score);
            globalScores = tempList.slice(0, 20);
            isFetching = false; 
        })
        .catch(e => { 
            console.log("DB Fetch Error:", e);
            isFetching = false; 
        }); 
}

function sendGlobalScore(name, finalScore) { 
    gameState = 'UPLOADING'; 
    highscoreInput.classList.add('hidden'); 
    
    // 파이어베이스 서버로 이름과 점수를 즉각 POST 발사!
    fetch(SERVER_URL, { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, score: finalScore }) 
    })
    .then(r => r.json())
    .then(() => { 
        // 업로드가 끝나면 즉시 랭킹을 새로 읽어오고 랭킹 스크린 로드!
        fetchGlobalScores(); 
        setTimeout(showLeaderboard, 500); // 응답이 워낙 빨라 대기시간을 0.5초로 단축했네!
    })
    .catch((e) => { 
        console.log("DB Send Error:", e);
        setTimeout(showLeaderboard, 500); 
    }); 
}

function checkIsHighScore(finalScore) { if (globalScores.length < 20) return true; return finalScore > globalScores[globalScores.length - 1].score; }

// --- LOGIC ---
function generateLevel(levelNum) {
    let spawnList = [];
    if (typeof STAGE_DATA === 'undefined') return [];
    const stageConfig = STAGE_DATA[levelNum - 1];
    if (!stageConfig) return []; 
    
    if (stageConfig.spawnList) {
        stageConfig.spawnList.forEach(unit => {
            const t = unit.row * ROW_TIME + START_DELAY;
            
            // 1순위: 'type'이 있는 명령어(ITEM 등)를 먼저 체크!
            if (unit.type) {
                spawnList.push({ 
                    time: t, 
                    type: unit.type, 
                    val: unit.val, 
                    text: unit.text, 
                    duration: unit.duration,
                    col: unit.col // 아이템 위치를 위해 col도 같이 저장
                });
            }             	
			// 2순위: type이 없을 때만 '적'으로 생성
            else if (unit.col) {
                const cellWidth = GAME_WIDTH / 7;
                const px = (unit.col - 0.5) * cellWidth;
                // [수정] isCriticalOnly 속성을 데이터에서 가져와 저장하네!
                spawnList.push({ 
                    time: t, 
                    x: px, 
                    hp: unit.hp, 
                    isBoss: unit.isBoss || false,
                    isCriticalOnly: unit.isCriticalOnly || false // 이 줄을 추가하게
                });
            }			
        });
    }
    
	spawnList.sort((a, b) => {
        if (a.time !== b.time) return a.time - b.time;
        // [로건의 팁] 같은 시간(Row)일 경우, 이벤트(type)가 배열의 뒤로 가게 하여
        // 역순 루프(i--)에서 적보다 먼저 실행되도록 우선순위를 조작한다!
        if (a.type && !b.type) return 1;
        if (!a.type && b.type) return -1;
        return 0;
    });
    return spawnList;
}

function spawnForceNumbers(targetNumbers) {
    targetNumbers.forEach(num => {
        let radius = 20; 
        let x = Math.random() * (GAME_WIDTH - radius * 2) + radius; 
        let y = -radius; 
        
        items.push({
            type: 'num', // 자네가 아래 메인 루프에서 사용하는 대문자 규격에 완벽 일치!
            val: num,
            x: x,
            y: y,
            radius: radius,
            speed: Math.random() * 150 + 150 // [보정] dt 기반 물리엔진에 맞춰 초당 150~300픽셀 낙하 속도 부여
        });
    });
}

function startGame() { SoundManager.init(); score = 0; currentLevel = 1; lives = 3; resetStage(); }
function resetStage() {
    gameState = 'PLAY'; messageBox.classList.add('hidden'); highscoreInput.classList.add('hidden'); document.body.style.cursor='none';
    elapsedTime = 0; stageClearTimer = 0; crashTimer = 0; pickupTimer = 0;
    player.expr = ""; bullets = []; enemies = []; items = []; particles = [];
	currentEnemySpeed = ENEMY_BASE_SPEED;
    currentSymbols = [];
    currentNumbers = [];
	scrollingTexts = [];
    enemySpawnData = generateLevel(currentLevel);
    lastTime = performance.now(); isDragging = true;
}
function showLevelClearScreen() { gameState = 'TRANSITION'; currentLevel++; messageBox.classList.remove('hidden'); mainTitle.innerText = "STAGE CLEAR!"; subText.innerText = `[ CLICK FOR LEVEL ${currentLevel} ]`; subText.style.color = '#fff'; }
function triggerStageFail() { gameState = 'FAIL'; messageBox.classList.remove('hidden'); mainTitle.innerText = "DEFENSE FAILED!"; subText.innerText = "RESTARTING STAGE..."; subText.style.color = '#f50'; SoundManager.stopBGM(); setTimeout(() => { resetStage(); }, 2000); }
function handlePlayerCrash() { gameState = 'CRASHED'; crashTimer = 0; isDragging = false; document.body.style.cursor = 'default'; spawnExplosion(player.x, player.y - 20, 'critical', "SYSTEM FAILURE", 0, 1); }
function gameOver() { document.body.style.cursor = 'default'; fetchGlobalScores(); if(checkIsHighScore(score)) { gameState = 'INPUT'; messageBox.classList.add('hidden'); highscoreInput.classList.remove('hidden'); initialsField.value = ""; initialsField.focus(); } else { showLeaderboard(); } }
function showLeaderboard() { gameState = 'LEADERBOARD'; messageBox.classList.add('hidden'); highscoreInput.classList.add('hidden'); }

// --- INPUT & UPDATE ---
window.addEventListener('mousedown', () => { 
    SoundManager.resume(); // 터치할 때마다 사운드 엔진 즉시 수면 깨우기!
    if (gameState === 'LEADERBOARD') startGame(); 
    else if (gameState === 'PLAY') isDragging = true; 
});
window.addEventListener('touchstart', (e) => { 
    SoundManager.resume(); // 모바일 터치 스타트 순간에도 엔진 깨우기!
    if (gameState === 'LEADERBOARD') { e.preventDefault(); startGame(); } 
    else if (gameState === 'PLAY') { e.preventDefault(); isDragging = true; } 
}, { passive: false });
window.addEventListener('mouseup', () => { 
    SoundManager.resume(); // 손가락을 뗄 때도 안전장치 가동!
    if(gameState==='PLAY' && isDragging) { isDragging = false; fireBullet(); }
});
window.addEventListener('touchend', () => { 
    SoundManager.resume(); // 아이패드 터치 끝나는 순간 탄환 발사 및 사운드 유지!
    if(gameState==='PLAY' && isDragging) { isDragging = false; fireBullet(); }
});
window.addEventListener('keydown', function(e) {
    if (e.key === 'n' || e.key === 'N') {
        if (gameState === 'PLAY') { // 플레이 중일 때만 작동
            console.log("🛠️ [DEBUG] 관제탑 권한으로 다음 스테이지 강제 진입!");
            
            // 다음 스테이지 인덱스로 증가 (현재 레벨이 1부터 시작하므로 index.js 매칭)
            currentLevel++; 
            
            // 만약 다음 스테이지 데이터가 있으면 전환, 없으면 엔딩 처리
            if (typeof STAGE_DATA !== 'undefined' && currentLevel <= STAGE_DATA.length) {
                resetStage(); // 자네가 만든 스테이지 리셋 및 로드 함수 호출!
            } else {
                console.log("🛠️ [DEBUG] 마지막 스테이지입니다. 게임 클리어 상태로 전환합니다.");
                gameState = 'CLEAR'; 
            }
        }
    }
	
	if ((e.key === 'z' || e.key === 'Z') && gameState === 'PLAY') {
            console.log("🛠️ [DEBUG] 관제탑 권한으로 즉시 하이스코어 검증 및 게임오버 진입!");
            document.body.style.cursor = 'default';
            // 자네가 설계해 둔 게임오버 프로세스를 다이렉트로 가동하네!
            fetchGlobalScores(); 
            if (checkIsHighScore(score)) { 
                gameState = 'INPUT'; 
                messageBox.classList.add('hidden'); 
                highscoreInput.classList.remove('hidden'); 
                initialsField.value = ""; 
                initialsField.focus(); 
            } else { 
                showLeaderboard(); 
            }
        }
	
});
window.addEventListener('mousemove', e => updatePlayerPos(e.clientX, e.clientY));
window.addEventListener('touchmove', e => { e.preventDefault(); updatePlayerPos(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });

function updatePlayerPos(clientX, clientY) {
    if (gameState !== 'PLAY' || !isDragging) return;
    const pos = getGameCoordinates(clientX, clientY);
    player.x = Math.max(30, Math.min(GAME_WIDTH - 30, pos.x));
    player.y = Math.max(50, Math.min(GAME_HEIGHT - 50, pos.y - 150));
}
function updateExpression(value) {
    const isNum = !isNaN(value); const strVal = String(value);
    let tokens = player.expr.match(/\d+|[+\-×÷]/g);
    if (!tokens) { if (isNum) player.expr = strVal; return; }
    let lastIsNum = !isNaN(tokens[tokens.length - 1]);
    if (isNum) { if (lastIsNum) tokens[tokens.length - 1] = strVal; else tokens.push(strVal); } 
    else { if (!lastIsNum) tokens[tokens.length - 1] = strVal; else tokens.push(strVal); }
    player.expr = tokens.join('');
}

function fireBullet() {
    if (player.expr === "") return;
    if (isNaN(player.expr[player.expr.length - 1])) player.expr = player.expr.slice(0, -1);
    if (player.expr === "") return;
    
    let isPiercing = activeItems.penetration > 0;
    
    // ▼ 잔해 없이 깔끔하게 조립된 철갑탄 장전기!
    bullets.push({ 
        x: player.x, 
        y: player.y - 40, 
        text: player.expr, 
        speed: isPiercing ? 2400 : 1200, 
        isPiercing: isPiercing,       
        hitList: new Set()            
    });

    // ▼ 파티클 로직 (그대로 유지)
    for(let i = 0; i < 5; i++) {
        particles.push({
            type: 'spark',
            x: player.x + (Math.random() - 0.5) * 20, 
            y: player.y - 45,
            vx: (Math.random() - 0.5) * 100,
            vy: -200 - Math.random() * 300, 
            life: 0.7, 
            size: Math.random() * 3 + 2,
            color: Math.random() > 0.3 ? '#ffaa00' : '#ffffff' 
        });
    }
	
	// 헤비 로테이션 시간이 끝났을 때만 수식을 초기화    
	if (!(activeItems.heavyRotation > 0)) {
        player.expr = "";
    }
}

function spawnDebris(x, y, hp) {
    if (hp < 10) return;
    const count = String(hp).length; 
    const maxVal = Math.floor(hp * 0.2); 
    if (maxVal < 1) return;
    for (let i = 0; i < count; i++) {
        let val = Math.floor(Math.random() * maxVal) + 1;
        items.push({ type: 'num', val: val, x: x, y: y, vx: (Math.random() - 0.5) * 400, vy: (Math.random() - 0.5) * 400, isDebris: true });
    }
}

function spawnExplosion(x, y, tier, textValue, damageVal, multiplier) {
    let chain = multiplier > 1 ? multiplier : 0;
    SoundManager.playBassExplosion(chain); 
    
    let finalText = textValue;
    if (textValue !== "SYSTEM FAILURE" && tier === 'critical' && multiplier > 1) { finalText = "Critical"; }
    let textColor = (textValue === "SYSTEM FAILURE") ? '#0ff' : ((tier === 'critical') ? '#ff0000' : '#ffffff');
    particles.push({ type: 'text', x, y, text: finalText, life: 1.0, vy: -150, isCritical: (tier === 'critical'), color: textColor });
    let count, speed, colors, shockSize;
    if (textValue === "SYSTEM FAILURE") { count=50; speed=800; colors=['#00ffff', '#ffffff', '#0088ff']; shockSize=500; } 
    else if(tier==='small') { count=8; speed=300; colors=['#ffff00']; } 
    else if(tier==='medium') { count=20; speed=500; colors=['#ff8800','#ff0000']; shockSize=100; } 
    else { count=40; speed=800; colors=['#ff0000','#ffffff']; shockSize=300; } 
    for(let i=0; i<count; i++){
        const ang = Math.random()*Math.PI*2, s = Math.random()*speed;
        particles.push({ type:'spark', x, y, vx:Math.cos(ang)*s, vy:Math.sin(ang)*s, size:Math.random()*4+2, color:colors[i%colors.length], life:1.0, decay:1.5 });
    }
    if(tier==='critical' || textValue === "SYSTEM FAILURE") { particles.push({ type:'shockwave', x, y, size:10, maxSize:shockSize, color:colors[0], life:1.0, decay:1.0, damage: damageVal, hitList: [], age: 0, multiplier: multiplier }); } 
    else if (tier==='medium') { particles.push({ type:'shockwave_visual', x, y, size:10, maxSize:shockSize, color:colors[0], life:1.0, decay:2.0 }); }
}

function update(dt) {
    updateStars(dt);
    if (pickupTimer > 0) pickupTimer -= dt;

	for (let key in activeItems) {
        if (activeItems[key] > 0) {
            let prevTime = activeItems[key]; 
            activeItems[key] -= (dt / TIME_SCALE);

            // [대망의 피날레] Easy-Busy가 막 끝나는 찰나를 포착!
            if (key === 'easyBusy' && activeItems[key] <= 0 && prevTime > 0) {
                for (let i = items.length - 1; i >= 0; i--) {
                    let it = items[i];
                    if (!it.isDebris) {
                        if ((it.type === 'num' && it.val === 10) || 
                            (it.type === 'sym' && (it.val === '+' || it.val === '×'))) {
                            
                            // 1. 화려한 스파크 파티 생성! 
                            for(let k = 0; k < 8; k++) {
                                particles.push({
                                    type: 'spark',
                                    x: it.x,
                                    y: it.y,
                                    vx: (Math.random() - 0.5) * 400, 
                                    vy: (Math.random() - 0.5) * 400,
                                    life: 1.0,
                                    size: Math.random() * 4 + 2,
                                    color: Math.random() > 0.5 ? '#ffff00' : '#ffffff' 
                                });
                            }
                            // 2. 화면에서 깔끔하게 삭제 (파사삭!)
                            items.splice(i, 1);
                        }
                    }
                }
            }
        }
    }

    if (gameState === 'CRASHED') {
        crashTimer += dt;
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i]; p.life -= (p.decay || 1.0) * dt;
            if (p.type === 'text') p.y += p.vy * dt;
            else if (p.type === 'spark') { p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.9; p.vy *= 0.9; }
            else if (p.type === 'shockwave') { p.size += (p.maxSize - p.size) * 5 * dt; }
            if (p.life <= 0) particles.splice(i, 1);
        }
        if (crashTimer > 1.5) { lives--; if (lives <= 0) gameOver(); else triggerStageFail(); }
        return; 
    }
    if (gameState !== 'PLAY') return;
    if (!(activeItems.timeStop > 0)) {
        elapsedTime += dt * 1000;
    }
    if (enemySpawnData.length === 0 && enemies.length === 0) { stageClearTimer += dt; if (stageClearTimer > 3.0) showLevelClearScreen(); }

	for (let i = enemySpawnData.length - 1; i >= 0; i--) {
        let data = enemySpawnData[i];
        
		if (elapsedTime >= data.time) {
            
            if (data.type) {
                // [STEP 2] 이벤트 디스패처: 명령어를 읽고 전역 변수 업데이트
                if (data.type === 'BGM') { SoundManager.playSpecificBGM(data.val); }
                else if (data.type === 'SPEED') { currentEnemySpeed = data.val; }
                else if (data.type === 'SYMBOL') { currentSymbols = data.val; }
                else if (data.type === 'NUMBER') { currentNumbers = data.val; }
				else if (data.type === 'FORCE') { spawnForceNumbers(data.val); }
                else if (data.type === 'PRINT') {
					// 엑셀이나 파일에서 \n 혹은 실제 줄바꿈 문자가 들어왔을 때를 대비한 분할 처리
					let lines = String(data.text).split(/\\\\n|\n/);
					
					// 글로벌 스크롤 메시지 배열에 새로운 오브젝트 주입!
					scrollingTexts.push({
						lines: lines,
						x: GAME_WIDTH / 2,     // 화면 정중앙 좌표
						y: -30 * lines.length, // 글자 수(줄 수)에 맞춰 화면 위쪽 안 보이는 곳에 스폰
						speed: currentEnemySpeed * 2,
						opacity: 1             // 초기 투명도 (선명함)
					});}
                else if (data.type === 'ITEM') {
                    const colWidth = GAME_WIDTH / 7;
                    const xPos = (data.col - 1) * colWidth + (colWidth / 2);
					
					let width = ENEMY_WIDTH; let height = ENEMY_HEIGHT;
					enemies.push({ 
						x: xPos - width/2, 
						y: -80, 
						width: width, 
						height: height, 
						hp: 1, // 보급선의 체력 (원하는 대로 조절하게)
						maxHp: 1, 
						speed: currentEnemySpeed * 0.8, // 일반 적보다 살짝 느리게
						color: '#ff0', // 황금색 테두리!
						isBoss: false,
						dropItem: data.val // ★ 핵심: 죽을 때 떨어뜨릴 아이템 이름을 뱃속에 기억시킴 ★
					});
                }
				
			} else {
                // 적 소환 (currentEnemySpeed 적용)
                let width = data.isBoss ? 150 : ENEMY_WIDTH; 
                let height = data.isBoss ? 100 : ENEMY_HEIGHT;

                // [로건의 수술] 이제 진짜 방패병의 데이터(isCriticalOnly)를 객체에 주입하네!
                enemies.push({ 
                    x: data.x - width/2, 
                    y: -80, 
                    width, 
                    height, 
                    hp: data.hp, 
                    maxHp: data.hp, 
                    speed: currentEnemySpeed, 
                    color: data.isBoss ? '#f00' : '#fff', 
                    isBoss: data.isBoss,
                    // 이 줄이 추가되어야 충돌 판정 루프에서 "en.isCriticalOnly"를 인식할 수 있어
                    isCriticalOnly: data.isCriticalOnly || false 
                });
            }
            
            enemySpawnData.splice(i, 1);
        }
    }

    if (gameState === 'PLAY') {
		for (let i = scrollingTexts.length - 1; i >= 0; i--) {
			let txt = scrollingTexts[i];
			
			// 스테이지 현재 전장 스크롤 속도에 맞춰 실제 시간(dt)만큼 아래로 이동!
			txt.y += txt.speed * dt; 

			// [전술 연출] 화면 하단(GAME_HEIGHT)에 가까워질수록 자연스럽게 페이드아웃(투명화)
			// 화면 하단 도달 150픽셀 전부터 부드럽게 사라지도록 설계했네.
			let fadeZone = GAME_HEIGHT - 150;
			if (txt.y > fadeZone) {
				let distance = GAME_HEIGHT + 100 - txt.y;
				txt.opacity = Math.max(0, distance / (GAME_HEIGHT + 100 - fadeZone));
			}

			// 완전히 화면 밖(하단 마진 100픽셀)으로 탈출하면 배열에서 즉시 삭제하여 메모리 보호!
			if (txt.y > GAME_HEIGHT + 100) {
				scrollingTexts.splice(i, 1);
			}
		}
	}
	
    
    lastSpawnNum += dt * 1000; lastSpawnSym += dt * 1000;
    
	if (enemies.length > 0 || enemySpawnData.length > 0) {
        
        // ▼ 1. 숫자 폭우 설정: Easy-Busy일 땐 80(0.08초), 아닐 땐 원래 속도
        let currentNumRate = (activeItems.easyBusy > 0) ? 200 : SPAWN_RATE_NUM;
        if (lastSpawnNum > currentNumRate) {
            // [안전장치] currentNumbers에 데이터가 있을 때만 실행!
            if (currentNumbers.length > 0) {		
            // ▼ 삼항 연산자로 Easy-Busy 체크!
                let randNum = (activeItems.easyBusy > 0) ? 10 : currentNumbers[Math.floor(Math.random() * currentNumbers.length)];
                items.push({ type:'num', val:randNum, x:Math.random()*(GAME_WIDTH-60)+30, y:-40, speed:180 + Math.random()*60 }); 
            }
            lastSpawnNum = 0;
        }
        
        // ▼ 2. 기호 폭우 설정: Easy-Busy일 땐 150(0.15초), 아닐 땐 원래 속도
        let currentSymRate = (activeItems.easyBusy > 0) ? 150 : SPAWN_RATE_SYM;
        if (lastSpawnSym > currentSymRate) {
            // [안전장치] currentSymbols에 데이터가 있을 때만 실행!
            if (currentSymbols.length > 0) {
                // ▼ 여기서 Easy-Busy 체크! 활성화 중이면 '+', '×'만 들어있는 임시 배열(Pool)을 사용하네.
                let symPool = (activeItems.easyBusy > 0) ? ['+', '×'] : currentSymbols;
                
                // === [로건의 결정론적 순환 스폰 수술] ===
                // 1. 혹시 스테이지가 바뀌어서 배열 크기보다 인덱스가 커졌을 상황을 대비한 안전장치!
                if (symIndex >= symPool.length) symIndex = 0;
                
                // 2. 랜덤이 아니라 현재 포인터 위치의 기호를 정확하게 픽스하네!
                let randSym = symPool[symIndex];
                
                // 3. 다음 기호를 준비하기 위해 인덱스를 1 키우고, 배열 크기를 넘어가면 0으로 리셋(순환)!
                symIndex = (symIndex + 1) % symPool.length;
                
                items.push({ 
                    type: 'sym', 
                    val: randSym, 
                    x: Math.random() * (GAME_WIDTH - 60) + 30, 
                    y: -40, 
                    speed: 120 + Math.random() * 60 
                }); 
            }
            lastSpawnSym = 0; 
        }
    }
    
    for (let i = items.length - 1; i >= 0; i--) {
        let it = items[i]; 
        
        if (it.isDebris) {
            it.x += it.vx * dt;
            it.y += it.vy * dt;
            it.vy += 200 * dt;
        } else {
			let speedBoost = (activeItems.easyBusy > 0) ? 2.5 : 1.0;
            it.y += (it.speed * speedBoost) * dt;
        }

        if (isDragging && Math.abs(it.x - player.x) < 40 && Math.abs(it.y - player.y) < 40) {
            if (pickupTimer <= 0) {
			
				if (it.type === 'special') {
					if (it.val === 'EASY_BUSY') {
						activeItems.easyBusy = 5.0;
						// activePrint를 지우고, 흐르는 텍스트 배열에 직접 주입하네!
						scrollingTexts.push({ lines: ["EASY-BUSY!"], x: GAME_WIDTH / 2, y: it.y, speed: currentEnemySpeed, opacity: 1 });
						
						items.forEach(existingItem => {
							if (existingItem.type === 'num' && !existingItem.isDebris) existingItem.val = 10;
							else if (existingItem.type === 'sym') existingItem.val = Math.random() < 0.5 ? '+' : '×';
						}); 
					}
					else if (it.val === 'HEAVY_ROTATION') {
						activeItems.heavyRotation = 5.0;
						scrollingTexts.push({ lines: ["HEAVY-ROTATION!"], x: GAME_WIDTH / 2, y: it.y, speed: currentEnemySpeed, opacity: 1 });
					}
					else if (it.val === 'TIME_STOP') {
						activeItems.timeStop = 5.0;
						scrollingTexts.push({ lines: ["RED-LIGHT SPECIAL!"], x: GAME_WIDTH / 2, y: it.y, speed: currentEnemySpeed, opacity: 1 });
					}
					else if (it.val === 'PENETRATION') {
						activeItems.penetration = 15.0;
						scrollingTexts.push({ lines: ["관통 탄환 장전!"], x: GAME_WIDTH / 2, y: it.y, speed: currentEnemySpeed, opacity: 1 });
					}
					
					SoundManager.playItemGet('special');
					items.splice(i, 1);
					continue;
				}
			
                if (!(player.expr === "" && it.type === 'sym')) { 
                    updateExpression(it.val); 
                    SoundManager.playItemGet(it.type); 
                    items.splice(i, 1);
                    pickupTimer = PICKUP_COOLDOWN; 
                    continue; 
                }
            }
        }
        if (it.y > GAME_HEIGHT) items.splice(i, 1);
    }
    
    for (let i = enemies.length - 1; i >= 0; i--) {
        let en = enemies[i];

        // ▼ 타임스톱이 아닐 때만 적이 아래로 이동! (시간이 멈추면 속도가 0이 되는 효과)
        if (!(activeItems.timeStop > 0)) {
            en.y += en.speed * dt;
        }

        // ▼ 충돌 판정은 무조건 검사! (얼어붙은 적에게 들이받으면 가차 없이 터지네!)
        if (Math.abs((en.x + en.width/2) - player.x) < (en.width/2 + 20) && Math.abs((en.y + en.height/2) - (player.y - 20)) < (en.height/2 + 20)) { 
            handlePlayerCrash(); 
            return; 
        }
        
        // 화면 밖으로 나갔을 때의 판정
        if (en.y > GAME_HEIGHT) { 
            lives--; 
            if (lives <= 0) { gameOver(); } else { triggerStageFail(); } 
            return; 
        }
    }
    
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i]; 
        b.y -= b.speed * dt;
        let bulletDestroyed = false; // [로건의 보너스] 총알이 삭제되었는지 기억하는 안전장치!

        for (let j = enemies.length - 1; j >= 0; j--) {
            let en = enemies[j];
            
            // 1. 총알과 적의 기본 충돌 검사
            if (b.x > en.x && b.x < en.x + en.width && b.y > en.y && b.y < en.y + en.height) {
                
                // ▼▼▼ [NEW 1] 이미 때린 적은 명부(HitList)를 보고 무시! ▼▼▼
                if (b.isPiercing && b.hitList.has(en)) {
                    continue; 
                }

                // ▼▼▼ [NEW 2] 처음 때린 적이라면 명부에 바로 이름(en)을 적음! ▼▼▼
                if (b.isPiercing) {
                    b.hitList.add(en);
                }

                // (--- 이 아래는 기존 데미지 및 이펙트 로직 그대로! ---)
                let cleanExpr = b.text.replace(/×/g, '*').replace(/÷/g, '/');
                let dmg = 1; try { dmg = Math.floor(eval(cleanExpr)); } catch(e) {} if (dmg < 1) dmg = 1;
                let isCrit = (en.hp === dmg);
				
				// === [로건의 수술 1: 직격탄 방패 로직] ===
                if (en.isCriticalOnly && !isCrit) {
                    SoundManager.playBlockSound(); // 깡!
                    spawnExplosion(en.x + en.width/2, en.y + en.height/2, 'small', "BLOCK!", 0, 1);
                    
                    if (!b.isPiercing) {
                        bullets.splice(i, 1);
                        bulletDestroyed = true;
                    }
                    break; // 이번 총알은 이 적에게 막혔으므로 적 루프 종료
                }
				
                let tier = (en.hp - dmg <= 0) ? (isCrit ? 'critical' : 'medium') : 'small';
                let actualDmg = Math.min(en.hp, dmg);
                
                if (isCrit) {
                    spawnDebris(en.x + en.width/2, en.y + en.height/2, en.hp);
                }

                score += actualDmg;
                spawnExplosion(en.x + en.width/2, en.y + en.height/2, tier, isCrit ? "CRITICAL!" : dmg, dmg, 2);
                en.hp -= dmg; 
                if (en.hp <= 0) {
                    if (en.dropItem) {
                        items.push({ 
                            type: 'special', val: en.dropItem, 
                            x: en.x + en.width / 2, y: en.y + en.height / 2, speed: 150 
                        });
                    }                           
                    enemies.splice(j, 1); 
                }
                // (--- 데미지 로직 끝 ---)

                // ▼▼▼ [NEW 3] 관통탄은 파괴되지 않고 뚫고 지나감! ▼▼▼
                if (!b.isPiercing) {
                    bullets.splice(i, 1); // 일반 총알만 여기서 터짐
                    bulletDestroyed = true; // 삭제되었다고 도장 쾅!
                    break; // 더 이상 다른 적을 검사할 필요 없으니 탈출
                }
            }
        }
        
        // ▼▼▼ [NEW 4] 화면 밖으로 나간 총알 삭제 (버그 픽스 포함) ▼▼▼
        // 이미 적을 때려서 삭제된 총알(bulletDestroyed)을 또 지우려다 에러가 나는 걸 방지!
        if (!bulletDestroyed && b.y < -100) {
            bullets.splice(i, 1);
        }
    }
    
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.life -= (p.decay || 1.0) * dt; p.y += ENEMY_BASE_SPEED * dt;
        if (p.type === 'text') p.y += p.vy * dt;
        else if (p.type === 'spark') { p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.9; p.vy *= 0.9; }
        else if (p.type === 'shockwave' || p.type === 'shockwave_visual') {
            p.size += (p.maxSize - p.size) * 3 * dt;
            if (p.type === 'shockwave') {
                p.age += dt;
                if (p.age <= CHAIN_DMG_DURATION) {
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        let en = enemies[j]; if (en.y < 0 || en.y > GAME_HEIGHT) continue; if (p.hitList.includes(en)) continue;
                        let dist = Math.hypot((en.x + en.width/2) - p.x, (en.y + en.height/2) - p.y);
                        if (dist < p.size - 10) {
                            let isStrictCrit = (en.hp === p.damage); 
							
							// 적이 C타입인데 숫자가 딱 맞지 않으면 '깡-' 소리와 함께 무시!
                            if (en.isCriticalOnly && !isStrictCrit) {
                                SoundManager.playBlockSound(); // 깡!
                                spawnExplosion(en.x + en.width/2, en.y + en.height/2, 'small', "BLOCK!", 0, 1);
                                p.hitList.push(en); // 이번 충격파에는 이미 맞은 것으로 처리해서 중복 BLOCK 방지
                                continue; // 아래의 대미지 처리 로직을 건너뛰고 다음 적 검사로 넘어감
                            }
							let actualDmg = Math.min(en.hp, p.damage);
                            score += actualDmg * p.multiplier; en.hp -= p.damage; p.hitList.push(en);
                            if (en.hp <= 0) {
                                if (isStrictCrit) spawnDebris(en.x + en.width/2, en.y + en.height/2, p.damage);
                                spawnExplosion(en.x + en.width/2, en.y + en.height/2, isStrictCrit ? 'critical' : 'medium', isStrictCrit ? "CHAIN!" : p.damage, p.damage, p.multiplier + 1);
								if (en.dropItem) { items.push({ type: 'special', val: en.dropItem, x: en.x + en.width/2, y: en.y + en.height/2, speed: 150 }); }
                                enemies.splice(j, 1);
                            } else { spawnExplosion(en.x + en.width/2, en.y + en.height/2, 'small', p.damage, 1); }
                        }
                    }
                }
            }
        }
        if (p.life <= 0) particles.splice(i, 1);
    }
}
function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    drawStars();
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.strokeRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
		
	if (gameState === 'PLAY') {
		// 하늘에서 내려오는 모든 스크롤 메시지 배열을 순회하네.
		scrollingTexts.forEach(txt => {
			ctx.save();
			
			// 부드러운 페이드아웃 효과를 위해 rgba에 txt.opacity를 적용했네!
			ctx.fillStyle = `rgba(255, 255, 255, ${txt.opacity})`; 
			ctx.font = 'bold 22px Courier New';
			ctx.textAlign = 'center';
			ctx.textBaseline = 'middle';
			
			// 적이나 자원 위에 겹쳐도 잘 보이도록 검은색 테두리(그림자) 떡칠 계승!
			ctx.shadowColor = `rgba(0, 0, 0, ${txt.opacity})`;
			ctx.shadowBlur = 10;
			ctx.lineWidth = 4;
			ctx.strokeStyle = `rgba(0, 0, 0, ${txt.opacity})`;

			let lineHeight = 30; // 자네가 설정한 줄 간격 30픽셀 그대로 유지!
			
			// [멀티라인 핵심 보존] 스폰할 때 이미 쪼개둔 lines 배열을 돌며 차례대로 그리네.
			txt.lines.forEach((line, index) => {
				// 정지된 startY 대신, 실시간으로 낙하하는 txt.y를 기준으로 줄 간격을 계산하네!
				let currentY = txt.y + (index * lineHeight);
				
				ctx.strokeText(line, GAME_WIDTH / 2, currentY);
				ctx.fillText(line, GAME_WIDTH / 2, currentY);
			});
			
			ctx.restore();
		});
	}	
	
    if (gameState === 'LEADERBOARD' || gameState === 'UPLOADING') {
        ctx.save(); ctx.fillStyle = '#0f0'; ctx.font = 'bold 40px Courier New'; ctx.textAlign = 'center';
        ctx.fillText("GLOBAL RANKING", GAME_WIDTH/2, 100); ctx.fillStyle = '#fff'; ctx.font = '24px Courier New';
        ctx.fillText(`YOUR SCORE: ${score}`, GAME_WIDTH/2, 150);
        if (gameState === 'UPLOADING') { ctx.fillStyle = '#ff0'; ctx.font = '30px Courier New'; ctx.fillText("UPLOADING TO SERVER...", GAME_WIDTH/2, GAME_HEIGHT/2); } 
        else if (isFetching) { ctx.fillStyle = '#ff0'; ctx.font = '30px Courier New'; ctx.fillText("FETCHING DATA...", GAME_WIDTH/2, GAME_HEIGHT/2); } 
        else {
            ctx.textAlign = 'left'; let startY = 220;
			
			globalScores.forEach((row, i) => {
            ctx.fillStyle = (i === 0) ? '#ff0' : (i === 1) ? '#ccc' : (i === 2) ? '#cd7f32' : '#fff';
            ctx.textAlign = 'left';
            
            // 1. 등수 출력
            ctx.fillText(`${i + 1}.`, 80, 180 + i * 28);
            
            // 2. 이름 데이터 분석 ("KR LOGAN" -> 국가코드 "KR"과 이름 "LOGAN" 분리)
            let firstSpace = row.name.indexOf(" ");
            let countryCode = "GLOBAL";
            let displayName = row.name;
            
            if (firstSpace !== -1) {
                countryCode = row.name.substring(0, firstSpace);
                displayName = row.name.substring(firstSpace + 1);
            }
            
            // 3. 국기 이미지 실시간 로드 및 렌더링 (텍스트 KR/US 등은 화면에서 증발시킴!)                        
            if (countryCode !== "GLOBAL") {
                let flagImg = new Image();                
                flagImg.src = `https://flagcdn.com/24x18/${countryCode.toLowerCase()}.png`;
                                
                flagImg.onload = function() {                    
                    if (gameState === 'LEADERBOARD') {
                        ctx.drawImage(flagImg, 140, 164 + i * 28, 24, 18);
                    }
                };                
                ctx.drawImage(flagImg, 140, 164 + i * 28, 24, 18);			
            } else {
                // 국가 매핑이 안 된 글로벌 유저는 기존처럼 이모지나 대체 텍스트 출력
                ctx.fillText("🌐", 140, 180 + i * 28);
            }
            
            // 4. 순수 유저 닉네임 출력 (국기 이미지 뒤쪽인 180px 지점부터 시원하게 출력!)
            ctx.fillText(displayName, 180, 180 + i * 28);
            
            // 5. 점수 출력
            ctx.textAlign = 'right';
            ctx.fillText(row.score, 520, 180 + i * 28);
        });
			
            if (Math.floor(Date.now() / 500) % 2 === 0) { ctx.fillStyle = '#f00'; ctx.textAlign = 'center'; ctx.fillText("[ CLICK TO RESTART ]", GAME_WIDTH/2, GAME_HEIGHT - 50); }
        }
		
        ctx.restore(); return;
    }
    if (gameState === 'PLAY' || gameState === 'TRANSITION' || gameState === 'FAIL' || gameState === 'INPUT' || gameState === 'CRASHED') {
        ctx.save(); if (gameState === 'INPUT' || gameState === 'CRASHED') ctx.globalAlpha = (gameState === 'CRASHED' ? 1.0 : 0.3);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 24px Courier New'; ctx.textAlign = 'left'; ctx.fillText(`LV: ${currentLevel}`, 20, 30);
        ctx.textAlign = 'center'; ctx.fillText(`SCORE: ${score}`, GAME_WIDTH / 2, 30); ctx.textAlign = 'right'; ctx.fillStyle = '#f00';
        let hearts = "♥".repeat(Math.max(0, lives)); ctx.fillText(`LIVES: ${hearts}`, GAME_WIDTH - 20, 30);
		
		let timerY = 60; // 30픽셀 아래(60)부터 타이머를 출력하네.
        for (let key in activeItems) {
			if (activeItems[key] > 0) {
				// 1. 아이템 종류에 따라 색상과 라벨을 결정하네
				let color = '#fff';
				let label = '';

				if (key === 'easyBusy') {
					color = '#ff66cc'; // 핑크
					label = 'EASY-BUSY';
				} else if (key === 'heavyRotation') {
					color = '#00ffff'; // 하늘색
					label = 'HEAVY-ROTATION';
				} else if (key === 'timeStop') {
					color = '#ffff00'; // 타임스톱 전용 골드!
					label = 'RED-LIGHT SPECIAL';
				} else if (key === 'penetration') {
					color = '#f33';
					label = 'PENETRATION';
				}

				// 2. 결정된 설정으로 텍스트를 그리네
				ctx.fillStyle = color;
				ctx.font = 'bold 18px Courier New';
				ctx.textAlign = 'right';
				
				// 소수점 두 자리까지 출력해서 긴박함을 유지하지!
				ctx.fillText(`${label}: ${activeItems[key].toFixed(2)}`, GAME_WIDTH - 20, timerY);
				
				// 다음 타이머가 겹치지 않게 아래로 내리네
				timerY += 25; 
			}
		}
        
		// === [아이템 렌더링 영역] ===
        items.forEach(it => {
            ctx.save();
            ctx.translate(it.x, it.y); // 아이템의 위치로 좌표축 이동
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (it.type === 'num') {
                // 숫자 아이템 (일반은 노란색, 파편은 주황색)
                ctx.fillStyle = (it.isDebris ? '#ffa500' : '#ff0');
                ctx.font = (it.isDebris ? 'bold 20px' : 'bold 24px') + ' Courier New';
                ctx.fillText(it.val, 0, 0);

            } else if (it.type === 'sym') {
                // 부호 아이템 (초록색)
                ctx.fillStyle = '#0f0';
                ctx.font = 'bold 24px Courier New';
                ctx.fillText(it.val, 0, 0);

            } else if (it.type === 'special') {
                // [NEW] 특수 아이템 (사각형 그레이박싱)
                let color = '#fff';
                if (it.val === 'HEAVY_ROTATION') color = '#ff0'; // 노랑
                else if (it.val === 'EASY_BUSY') color = '#f0f';     // 핑크
                else if (it.val === 'TIME_STOP') color = '#0cf';     // 하늘
                else if (it.val === 'PENETRATION') color = '#f33';   // 빨강

                // 네온 효과 발동!
                ctx.shadowColor = color;
                ctx.shadowBlur = 15;
                ctx.fillStyle = color;
                ctx.fillRect(-15, -15, 30, 30); // 30x30 사이즈 박스

                // 박스 위에 첫 글자 표시 (구분용)
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#000';
                ctx.font = 'bold 16px Arial';
                ctx.fillText(it.val[0], 0, 0);
            }
            ctx.restore();
        });
		
        enemies.forEach(en => { 
            // 1. 기존의 바깥쪽 테두리를 그리네
            ctx.strokeStyle = en.color; 
            ctx.lineWidth = en.isBoss ? 4 : 2; 
            ctx.beginPath();
            // 맨 마지막 숫자 12가 모서리를 얼마나 둥글게 깎을지 결정하는 '반지름(Radius)'일세!
            ctx.roundRect(en.x, en.y, en.width, en.height, 12);
            ctx.stroke();

            // C타입 적(장갑병)의 안쪽 1픽셀 장갑 연출도 똑같이 부드럽게 깎아주네!
            if (en.isCriticalOnly) {
                ctx.beginPath();
                // 패딩 값을 주어 안쪽으로 4픽셀 들여보내고, 둥글기도 8로 살짝 줄여서 핏을 맞췄네.
                ctx.roundRect(en.x + 4, en.y + 4, en.width - 8, en.height - 8, 8);
                ctx.stroke();
            }

            // 2. 적의 HP 숫자 출력 (기존 코드 유지)
            ctx.fillStyle = '#fff'; 
            ctx.font = '30px Courier New'; 
            ctx.textAlign = 'center'; 
            ctx.textBaseline='middle'; 
            ctx.fillText(en.hp > 0 ? en.hp : "", en.x + en.width/2, en.y + en.height/2); 
        });
		
        bullets.forEach(b => { 
            ctx.save(); 
            ctx.translate(b.x, b.y); 
            ctx.rotate(Math.PI / 2); 
            
            // === [로건의 가시성 폴리싱: 순백색 탄환 + 검은색 테두리 그림자] ===
            // 총알 글씨 자체는 요청하신 눈부신 흰색(#fff)으로 채우고!
            ctx.fillStyle = '#fff'; 
            ctx.font = 'bold 22px Courier New'; // 가독성을 위해 bold 처리하고 크기도 슬쩍 키웠네.
            ctx.textAlign = 'center'; 
            ctx.textBaseline = 'middle';

            // 화려한 이펙트나 적들 사이에서도 수식이 묻히지 않도록 진한 검은색 테두리를 칠해주네!
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#000';
            ctx.strokeText(b.text, 0, 0);
            
            // 최종적으로 흰색 글씨를 얹어 마무리!
            ctx.fillText(b.text, 0, 0); 
            ctx.restore(); 
        });
		
		if (gameState !== 'CRASHED' && gameState !== 'FAIL' && gameState !== 'GAMEOVER') {
			if (player.expr !== "") { ctx.save(); ctx.font = 'bold 40px Courier New'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom'; ctx.shadowColor = '#0f0'; ctx.shadowBlur = 10; ctx.fillStyle = '#fff'; ctx.fillText(player.expr, GAME_WIDTH / 2, GAME_HEIGHT - 20); ctx.restore(); }
			
			ctx.save(); 
			if (!isDragging && gameState === 'PLAY') ctx.globalAlpha = 0.7; 
			
			ctx.translate(player.x, player.y); 
			
			// [로건의 안전벨트] 이미지가 완벽히 로딩 완료(complete)되었을 때만 그리도록 제어하네!
			if (playerImg.complete && playerImg.naturalWidth !== 0) {
				ctx.drawImage(playerImg, -30, -30, 60, 60); 
			} else {
				// 혹시라도 이미지가 0.1초 늦게 뜰 때를 대비해, 로딩 중엔 임시로 원래 사각형이라도 그리게 백업해 두었네.
				ctx.fillStyle = '#0ff';
				ctx.fillRect(-20, -20, 40, 40);
			}
			
			ctx.restore();
		}
        particles.forEach(p => { ctx.save(); ctx.globalAlpha = p.life; if (p.type === 'text') { ctx.translate(p.x, p.y); ctx.fillStyle = p.color; ctx.font = (p.isCritical?'bold 40px':'30px') + ' Courier New'; ctx.textAlign = 'center'; ctx.fillText(p.text, 0, 0); } else if (p.type === 'spark') { ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2); ctx.fill(); } else if (p.type === 'shockwave' || p.type === 'shockwave_visual') { ctx.strokeStyle = p.color; ctx.lineWidth = 5 * p.life; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.stroke(); } ctx.restore(); });
		
        ctx.restore();
    }
}
function gameLoop(currentTime) {
    const dt = (currentTime - lastTime) / 1000;
    lastTime = currentTime;
    if (dt < 0.1) { update(dt * TIME_SCALE); } 
    draw(); 
    requestAnimationFrame(gameLoop);
}

lastTime = performance.now();
requestAnimationFrame(gameLoop);

</script>
