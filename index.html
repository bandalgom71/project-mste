const SaveSystem = {
    SECRET_KEY: 119, // 수식 치트를 방어하기 위한 비밀 XOR 오차 키라네.
    
    // 데이터를 안전하게 꾸워내어 로컬 스토리지에 박는 함수
    save: function(level, score, lives) {
        try {
            const dataObj = { lvl: level, scr: score, lvs: lives };
            const jsonStr = JSON.stringify(dataObj);
            
            // 1차 암호화: 글자 주파수를 비밀 키로 비틀어버리네.
            let xorStr = "";
            for (let i = 0; i < jsonStr.length; i++) {
                xorStr += String.fromCharCode(jsonStr.charCodeAt(i) ^ this.SECRET_KEY);
            }
            // 2차 암호화: 브라우저가 직접 읽지 못하게 Base64 문자로 인코딩 가동!
            const encData = btoa(encodeURIComponent(xorStr));
            localStorage.setItem('mste_sys_save', encData);
            console.log("🛠️ [관제탑] 전장 상태 암호화 세이브 완료.");
        } catch(e) { console.error("세이브 오류:", e); }
    },

    // 외계어로 짜인 금고를 다시 해독하는 함수
    load: function() {
        try {
            const encData = localStorage.getItem('mste_sys_save');
            if (!encData) return null;
            
            // 역순으로 복호화 알고리즘 가동
            const xorStr = decodeURIComponent(atob(encData));
            let jsonStr = "";
            for (let i = 0; i < xorStr.length; i++) {
                jsonStr += String.fromCharCode(xorStr.charCodeAt(i) ^ this.SECRET_KEY);
            }
            return JSON.parse(jsonStr);
        } catch(e) {
            console.error("복호화 에러 (조작 흔적 감지):", e);
            this.clear(); // 강제 변조 흔적이 있다면 금고를 파쇄해 버리네!
            return null;
        }
    },

    // 금고 영구 파쇄 함수 (게임오버 시 사용)
    clear: function() {
        localStorage.removeItem('mste_sys_save');
        console.log("🛠️ [관제탑] 세이브 데이터 완전 초기화 완료.");
    }
};

// --- AUDIO SYSTEM ---

    // 🎯 [로건의 수술 1]: 에이스 샘플 bass2(메가), bass3(일반/체인) 서랍장 장착
    bassBuffer2: null,

    init: function() {
        if (this.ctx) return;
        window.AudioContext = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AudioContext();
        this.masterGain = this.ctx.createGain();
        this.masterGain.connect(this.ctx.destination);
        
        if (this.ctx.state === 'suspended') {
            this.ctx.resume();
        }
        try {
            const dummyOsc = this.ctx.createOscillator();
            const dummyGain = this.ctx.createGain();
            dummyGain.gain.setValueAtTime(0, this.ctx.currentTime);

            dummyGain.connect(this.ctx.destination);
            dummyOsc.start(0);

        } catch(e) {
            console.log("AudioContext Safari warm-up bypass", e);
        }

        this.createRadioStatic();
        
        if (!this.currentBgm) {
            this.currentBgm = new Audio();
            this.currentBgm.play().catch(() => {});
        }

        this.loadBassSamples();

	loadBassSamples: function() {
        const self = this;

        fetch('assets/bass1.wav')
            .then(response => response.arrayBuffer())

        fetch('assets/bass2.wav')
            .then(response => response.arrayBuffer())

        fetch('assets/bass3.wav')

            })
            .catch(e => console.error("bass3 로드 실패:", e));
    },

    resume: function() {
        if (this.ctx && this.ctx.state === 'suspended') {
            this.ctx.resume();
            try {
                const osc = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                g.gain.setValueAtTime(0, this.ctx.currentTime);
                osc.connect(g); g.connect(this.ctx.destination);
                osc.start(0); osc.stop(0.01);
            } catch(e){}
        }
    },
	
    createRadioStatic: function() {
        if (!this.ctx) return;
        const bufferSize = 2 * this.ctx.sampleRate; 
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.2; 
        this.staticNode = this.ctx.createBufferSource();
        this.staticNode.buffer = buffer;
        this.staticNode.loop = true;
        this.staticGain = this.ctx.createGain();
        this.staticGain.gain.value = 0.03; 
        this.staticNode.connect(this.staticGain);
        this.staticGain.connect(this.masterGain); 
        this.staticNode.start();
    },
    
    playRandomBGM: function() {
        if (!this.currentBgm) this.currentBgm = new Audio();
        this.currentBgm.pause();
        const idx = Math.floor(Math.random() * this.tracks.length);
        this.currentBgm.src = this.tracks[idx]; 
        this.currentBgm.loop = true;
        this.currentBgm.volume = 0.5; 
        this.currentBgm.play().catch(e => console.log("BGM wait", e));
    },
    
    stopBGM: function() { 
        if (this.currentBgm) this.currentBgm.pause(); 
    },

        if (!this.currentBgm) this.currentBgm = new Audio();
        this.currentBgm.pause();
        this.currentBgm.src = filename; 
        this.currentBgm.loop = true;
        this.currentBgm.volume = 0.5;

    playBassExplosion: function(chainCount = 0, forcedType = null, forcedBase = null) {
        if (!this.ctx || this.isMuted) return;
        try {
            const now = this.ctx.currentTime;
            const source = this.ctx.createBufferSource();
            const gain = this.ctx.createGain();

            let targetBuffer = null;
            let rateMultiplier = 1.0;

            if (chainCount === -1) { 
                if (!this.bassBuffer2) return;
                targetBuffer = this.bassBuffer2;
                rateMultiplier = 1.0; 
            } else {
                // 🎯 [유전자 판별]: 외부에서 "이 무기로 고정해!"라고 넘겨주면(연쇄 중일 때) 주사위를 굴리지 않고 그대로 복종하네!
                let finalType = forcedType;
                let finalBase = forcedBase;

                // 만약 단발성이라 지정된 게 없다면 여기서 새로 주사위를 굴리네.
				if (!finalType) {
                    // 🎲 [자네의 기획]: 33.3% 확률로 3가지 샘플 중 하나를 완전히 무작위 셔플링!
                    const dice = Math.random();
                    if (dice < 0.33) {
                        finalType = 'bass1';
                    } else if (dice < 0.66) {
                        finalType = 'bass2';
                    } else {
                        finalType = 'bass3';
                    }
                    
                    finalBase = 0.90 + (Math.random() * 0.20);
                }

                if (finalType === 'bass1') {
                    targetBuffer = this.bassBuffer1;
                } else if (finalType === 'bass2') {
                    targetBuffer = this.bassBuffer2;
                } else {
                    targetBuffer = this.bassBuffer3;
                }
				
                if (!targetBuffer) return;

                if (chainCount > 1) {
                    // 🔥 [연쇄 폭발]: 첫 발 쏠 때 고정된 시작음(finalBase)을 그대로 기둥으로 삼고, 
                    // 그 위로 자네의 12음계 수식 계단만 깔끔하고 선명하게 쌓아 올리네! (들쑥날쑥 현상 완벽 소멸)
                    rateMultiplier = finalBase * Math.pow(1.05946, (chainCount - 1) % 12);
                } else {
                    // 일반 단발성 폭발은 고정된 변주 피치 그대로 발사!
                    rateMultiplier = finalBase;
                }
            }

            source.buffer = targetBuffer;
            source.playbackRate.setValueAtTime(rateMultiplier, now);

            const sampleDuration = targetBuffer.duration / rateMultiplier;
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.95, now + 0.01); 
            gain.gain.exponentialRampToValueAtTime(0.001, now + sampleDuration);

            source.connect(gain);
            gain.connect(this.masterGain);

            source.start(now);
            source.stop(now + sampleDuration + 0.05); 
            
            console.log(`[연쇄 동기화 폭발] 샘플: ${targetBuffer === this.bassBuffer2 ? 'bass2' : 'bass3'}, 체인: ${chainCount}, 최종배율: ${rateMultiplier.toFixed(3)}`);
        } catch(e) {
            console.error("오디오 출력 오류:", e);
        }
    },
	
    playBlockSound: function() {
        if (!this.ctx || this.isMuted) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'square'; 
        osc.frequency.setValueAtTime(1200, now); 
        osc.frequency.exponentialRampToValueAtTime(440, now + 0.1); 
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start(now);
        osc.stop(now + 0.1);
    },
   
	// 🎵 [신규] 레트로 칩튠 틱 사운드 발전기
    playTickSound: function() {
        if (!this.ctx || this.isMuted) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = 'square'; // 레트로 게임기 특유의 스퀘어 파형
        osc.frequency.setValueAtTime(400 + Math.random() * 500, now); // 400Hz ~ 900Hz 사이의 다이내믹 피치
        
        gain.gain.setValueAtTime(0.03, now); // 귀를 피로하게 하지 않는 소프트 아날로그 볼륨
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
        
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start(now);
        osc.stop(now + 0.04);
    },
   
    playItemGet: function(type) {
        if (!this.ctx || this.isMuted) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        if (type === 'num') { 
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(880, now); 
            gain.gain.setValueAtTime(0.2, now); 
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1); 
        } else { 
            osc.type = 'square'; 
            osc.frequency.setValueAtTime(440, now); 
            osc.frequency.linearRampToValueAtTime(880, now + 0.05); 
            gain.gain.setValueAtTime(0.1, now); 
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1); 
        }
        osc.connect(gain); gain.connect(this.masterGain);
        osc.start(now); osc.stop(now + 0.1);
    }
};

// --- VISUALS ---
const stars = [];

function initStars() { 
    for (let i = 0; i < 100; i++) {
        let cruisingSpeed = Math.random() * 50 + 20; // 20 ~ 70 사이의 원래 속도
        stars.push({ 
            x: Math.random() * GAME_WIDTH, 
            y: Math.random() * GAME_HEIGHT, 
            size: Math.random() * 1.5 + 0.5, 
            speed: cruisingSpeed, 
            baseSpeed: cruisingSpeed, // 💡 [핵심]: 원래 속도를 영구 각인!
            alpha: Math.random() * 0.5 + 0.3 
        }); 
    }
}
initStars();

function updateStars(dt) {     
    if (activeItems && activeItems.timeStop > 0) return;

    const centerX = GAME_WIDTH / 2;
    const centerY = GAME_HEIGHT / 2 + 150; // 하단 지구 배치를 위한 650px 축 고정

    stars.forEach(s => { 
        // 💡 [지휘관의 기획 실장]: 별마다 독립된 진동 주기(1s~10s)와 최소 밝기 메모리 실시간 주입!
        if (s.twinklePhase === undefined) {
            s.twinklePhase = Math.random() * Math.PI * 2; // 무작위 시작 위상(Phase)
            
            // 1초 ~ 10초 사이의 랜덤 주기(T) 설정 -> 각속도(omega = 2*PI / T) 변환
            let period = Math.random() * 3 + 0.4; 
            s.twinkleSpeed = (Math.PI * 2) / period;
            
            // 최소 밝기 설정 (0.2에서 원래 별이 가진 고유 밝기 s.alpha 사이로 안전하게 제한)
            s.minAlpha = Math.random() * (s.alpha - 0.2) + 0.2;
            if (s.minAlpha > s.alpha) s.minAlpha = s.alpha * 0.5;
        }

        // 1. 모든 상태(TITLE & INGAME)에서 공통으로 작동하는 실시간 알파값 사인파 진동 연산
        s.twinklePhase += s.twinkleSpeed * dt;
        let wave = (Math.sin(s.twinklePhase) + 1) / 2; // -1~1의 범위를 0~1 부드러운 곡선으로 정제
        s.liveAlpha = s.minAlpha + (s.alpha - s.minAlpha) * wave; // 최소 밝기 ~ 원래 밝기 사이 진동

        // 2. 타이틀 화면전용 방사형 주행 물리 엔진
        if (gameState === 'START' || gameState === 'TITLEWARP') {
            if (s.angle === undefined || s.dist === undefined) {
                s.angle = Math.atan2(s.y - centerY, s.x - centerX);
                s.dist = Math.hypot(s.x - centerX, s.y - centerY);
            }

            let radialSpeed = (s.speed || 40) * 0.8;
			
			if (gameState === 'TITLEWARP') {
                radialSpeed += Math.pow(titleWarpTimer, 2) * 1200;
            }			
			
			s.dist += radialSpeed * dt;
			           
            s.x = centerX + Math.cos(s.angle) * s.dist;
            s.y = centerY + Math.sin(s.angle) * s.dist;

            if (s.x < 0 || s.x > GAME_WIDTH || s.y < 0 || s.y > GAME_HEIGHT) {
                s.angle = Math.random() * Math.PI * 2;
                s.dist = Math.random() * 30; 
                s.x = centerX + Math.cos(s.angle) * s.dist;
                s.y = centerY + Math.sin(s.angle) * s.dist;
            }
        } else {
            // 3. 인게임 전용 수직 순항 물리 엔진
            s.angle = undefined;
            s.dist = undefined;

            let targetBase = s.baseSpeed || 40;
            if (gameState === 'PLAY' && s.speed > targetBase) {
                s.speed += (targetBase - s.speed) * 1.6 * dt; 
                if (s.speed < targetBase) s.speed = targetBase; 
            }

            s.y += s.speed * dt;
            if (s.y > GAME_HEIGHT) { s.y = 0; s.x = Math.random() * GAME_WIDTH; }
        }
    }); 
}

function drawStars() { 
    ctx.save(); 
    stars.forEach(s => { 
        ctx.beginPath();
        
        // 안전 가드: 혹시라도 연산 전 빈 값이 들어올 경우 순정 알파값으로 대체하네.
        let currentAlpha = s.liveAlpha !== undefined ? s.liveAlpha : s.alpha;

        if (gameState === 'WARP') {
            ctx.strokeStyle = `rgba(255, 255, 255, ${currentAlpha * 0.5})`;
            ctx.lineWidth = s.size * 1.5;
            ctx.moveTo(s.x, s.y);
            ctx.lineTo(s.x, s.y - (s.speed * 0.08));
            ctx.stroke();
		}
			
		else if (gameState === 'TITLEWARP') {
            let currentDist = s.dist || 0;
            let finalSize = Math.min(2.5, s.size * (1.0 + currentDist / 400));
            let alphaScale = Math.min(0.95, (0.2 + currentDist / 300));
            
            if (titleWarpTimer < 1.0) {
                // ✨ 0초 ~ 1초 구간: 선을 긋지 않고, 폭발적으로 가속되는 예쁜 점(Dot) 모드로 시각적 텐션 충전!
                // 타이틀 화면(START)의 순정 고대비 거듭제곱 연출 유전자를 완벽하게 계승하네.
                let alphaScaleStart = Math.pow(currentAlpha, 2.5) * 2.8 * (0.15 + currentDist / 400);
                alphaScaleStart = Math.max(0.04, Math.min(0.95, alphaScaleStart));

                ctx.fillStyle = `rgba(255, 255, 255, ${alphaScaleStart})`;
                ctx.arc(s.x, s.y, finalSize, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // 💫 1초 이후 (2초째 진입) 구간: 이미 바깥으로 날아가고 있는 별들의 꽁무니 뒤로 광속선(Streak)이 역동적 팽창!
                let warpProgress = titleWarpTimer - 1.0; // 1.0초일 때 0부터 시작하도록 이징 원점 조절
                let streakLength = warpProgress * 35 * (1 + currentDist / 150);
                
                ctx.strokeStyle = `rgba(255, 255, 255, ${alphaScale})`;
                ctx.lineWidth = finalSize;
                ctx.moveTo(s.x, s.y);
                // 소실점 중심축 반대 방향 벡터로 칼각 꼬리 레이저 테일 투사!
                ctx.lineTo(s.x - Math.cos(s.angle) * streakLength, s.y - Math.sin(s.angle) * streakLength);
                ctx.stroke();
            }			
		}
					
        else if (gameState === 'START') {
            let currentDist = s.dist || 0;
            let finalSize = Math.min(2.3, s.size * (1.0 + currentDist / 500));

            // 지휘관이 기획한 고대비 거듭제곱 필터에 실시간 트윙클 알파값을 결합!
            let alphaScale = Math.pow(currentAlpha, 2.5) * 2.8 * (0.15 + currentDist / 400);
            alphaScale = Math.max(0.04, Math.min(0.95, alphaScale)); // 완전히 꺼지지 않게 가드

            ctx.fillStyle = `rgba(255, 255, 255, ${alphaScale})`;
            ctx.arc(s.x, s.y, finalSize, 0, Math.PI * 2);
            ctx.fill();
        } else { 
            // 인게임 플레이 중에도 별들이 각자의 주기대로 이쁘게 깜빡이도록 연동 완료!
            ctx.fillStyle = `rgba(255, 255, 255, ${currentAlpha})`;  
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fill();  
        }
    }); 
    ctx.restore(); 
}

initStars();

// --- SERVER LOGIC ---
let globalScores = [];
let isFetching = false; 

// 📡 슈파베이스 RPC 함수를 가동하여 특정 파일럿 주변
async function fetchGlobalScores(targetName = "") { 
    if (isFetching) return;
    
    // 💡 [디버그 동기화]: 통신 직전 테스트 점수를 전역 변수에 강제 주입하네.
    if (DEBUG_MODE.enable) {
        score = DEBUG_MODE.mockUserScore;
    }

    isFetching = true; 
    
    const URL = `https://${PROJECT_ID}.supabase.co/rest/v1/rpc/get_leaderboard_around_user`;
    
    try {
        const response = await fetch(URL, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            },
            body: JSON.stringify({ player_score: score })
        });
        
        if (response.ok) {
            const data = await response.json();
            console.log("📊 [통신 검증] 서버 응답 레코드 개수:", data.length);
            
            // 💡 [안전한 변수 선언]: user_rank 상자를 블록 최상단에 명확하게 생성함
            let user_rank = 1; 
            
            if (data.length > 0) {
                let lowerRow = data.find(r => r.res_score <= score);
                if (lowerRow) { 
                    user_rank = lowerRow.res_rank; 
                } else { 
                    user_rank = data[data.length - 1].res_rank + 1; 
                }
            }
            
			// 기존 외계인 데이터 매핑 구조 유지
            globalScores = data.map(row => ({
                name: row.res_name,
                score: row.res_score,
                rank: row.res_rank,
                isMe: false
            }));			
			
			// 플레이어 본인 레코드 안전하게 주입
            globalScores.push({
                name: getEstimatedCountryCode() + " " + (currentInputName || "YOU"),
                score: score,
                rank: user_rank, // 💡 이제 정상적으로 참조 가능
                isMe: true
            });
			
			// 4️⃣ 내림차순 정렬 (2차 정렬 포함)
			globalScores.sort((a, b) => {
				if (b.score !== a.score) return b.score - a.score;
				return (b.isMe ? 1 : 0) - (a.isMe ? 1 : 0);
			});
			
			// 데이터 정렬 완료 직후 더미 레코드(Dummy Record) 추가
			globalScores.pop();
			globalScores.push({
				rank: '',
				name: '---',
				score: 0,
				isMe: false
			});

			// 💡 표준 경쟁 순위(Standard Competition Ranking) 재연산 블록
			if (globalScores.length > 0) {
				let baseRank = globalScores[0].rank;
				for (let i = 1; i < globalScores.length; i++) {
					if (globalScores[i].score === globalScores[i - 1].score) {
						// 동점일 경우 이전 등수 유지
						globalScores[i].rank = globalScores[i - 1].rank;
					} else {
						// 점수 하락 시 인덱스(Index)만큼 건너뛰기
						globalScores[i].rank = baseRank + i;
					}
				}
			}

			// 5️⃣ 화면 렌더링용 절대 칸 번호 할당
			for (let i = 0; i < globalScores.length; i++) {
				globalScores[i].visualIndex = i;
			}
			// 6️⃣ 스크롤 시작/목표 고도 계산 — 반드시 globalScores 기준으로!
			//    (setupScrollTest()의 계산 방식과 동일하되, 대상만 testLeaderboardData → globalScores로 교체)
			{
				const rowHeight = 28;
				const visibleRows = 22;
				const maxScroll = (globalScores.length - visibleRows) * rowHeight;

				let myRow = globalScores.find(row => row.isMe);
				let myVisualIndex = myRow ? myRow.visualIndex : 0;

				targetScrollY = Math.max(0, Math.min(maxScroll, (myVisualIndex - 10) * rowHeight));

				if (isFinalView) {
					// 최종 확정 화면: 스크롤 연출 없이 내 순위 위치에 즉시 카메라 고정
					scrollY = targetScrollY;
					isScrollFinished = true;
				} else {
					// 첫 진입: 기존 자동 스크롤 연출 가동
					scrollY = maxScroll;
					isScrollFinished = false;
					startScrollY = scrollY;
					scrollTimeActive = 0;
					scrollDelayTimer = 0.6;
				}
			}		
            console.log("🔍 실데이터 진입 확인 — globalScores:", globalScores);  
        } else {
            console.error("❌ 랭킹 로드 실패:", await response.text());
        }
    } catch (e) { 
        console.error("❌ DB 통신 장애:", e);
    } finally {
        isFetching = false; 
    }
}

// 백그라운드 컷오프 점수 비동기 조회 함수
async function fetchCutoffScore() {

    const URL = `https://${PROJECT_ID}.supabase.co/rest/v1/leaderboard?select=score&order=score.desc,created_at.desc&limit=1&offset=99999`;
    
    try {
        const response = await fetch(URL, {
            method: 'GET',
            headers: { 
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            }
        });
        
        if (response.ok) {
            const data = await response.json();
            if (data && data.length > 0) {
                cutoffScore = data[0].score;
                console.log(`📡 [관제탑] 10만등 커트라인 갱신 완료: ${cutoffScore}점`);
            }
        }
    } catch (e) {
        console.error("❌ 커트라인 조회 실패 (기본값 유지):", e);
    }
}

// 📡 서버 검문소에 무선 패킷을 쏴서 내가 진짜 10만 등 안에 들었는지 판정하는 비동기 엔진
async function checkIsHighScore(finalScore) { 
    if (finalScore <= 0) return false; // 0점 오폭 등록은 원천 차단하네.
    
    const URL = `https://${PROJECT_ID}.supabase.co/rest/v1/rpc/check_if_high_score`;
    
    try {
        const response = await fetch(URL, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            },
            body: JSON.stringify({ player_score: finalScore }) 
        });
        
        if (response.ok) {
            return await response.json(); // 서버가 판정한 true(진입 성공) 또는 false(탈락)를 리턴하네.
        }
    } catch(e) {
        console.error("❌ 검문소 통신 장애:", e);
    }

// --- LOGIC ---
function generateLevel(levelNum) {
    let spawnList = [];
    if (typeof STAGE_DATA === 'undefined') return [];
    const stageConfig = STAGE_DATA[levelNum - 1];
    if (!stageConfig) return []; 
    
    // if (stageConfig.spawnList) {
        // stageConfig.spawnList.forEach(unit => {
            // const t = unit.row * ROW_TIME + START_DELAY;
			
	if (stageConfig.spawnList) {
		// 🛸 [로건의 정밀 물리 스폰 모듈]: 물리 간격 56px 유지를 위한 추적 장치 가동!
		let accumulatedTime = START_DELAY; // 누적 타임라인 (초기 지연값 배후 장착)
		let lastRow = 0;                    // 직전 적 기체의 행(Row) 포인터
		let trackedSpeed = ENEMY_BASE_SPEED; // 전장 내부 속도 실시간 추적기 (기본 100)

		stageConfig.spawnList.forEach(unit => {
			// 📐 공식: (행 차이 * 56px 물리거리) / 현재 추적 중인 전장 속도 * 1000ms
			const rowDiff = unit.row - lastRow;
			const timeDiff = ((rowDiff * 60) / trackedSpeed) * 1000;
			
			accumulatedTime += timeDiff; // 시공간 타임라인에 정밀 역산된 시간 적재
			lastRow = unit.row;          // 다음 연산을 위해 포인터 갱신

			// ⚡ [중요 전술]: 계산 도중 SPEED 명령어 변경을 감지하면 즉시 추적 속도를 동적 전환!
			if (unit.type === 'SPEED') {
				trackedSpeed = unit.val;
			}

			const t = accumulatedTime; // 기존 엔진이 인식하던 변수 t에 칼각 동기화 완료!
			
            
            // 1순위: 'type'이 있는 명령어(ITEM 등)를 먼저 체크!
            if (unit.type) {
                spawnList.push({ 
                    time: t, 
                    type: unit.type, 
                    val: unit.val, 
                    text: unit.text, 
                    duration: unit.duration,
                    col: unit.col // 아이템 위치를 위해 col도 같이 저장
                });
            }             	
			// 2순위: type이 없을 때만 '적'으로 생성
            else if (unit.col) {
                const cellWidth = GAME_WIDTH / 7;
                const px = (unit.col - 0.5) * cellWidth;
                // [수정] isCriticalOnly 속성을 데이터에서 가져와 저장하네!
                spawnList.push({ 
                    time: t, 
                    x: px, 
                    hp: unit.hp, 
                    isBoss: unit.isBoss || false,
                    isCriticalOnly: unit.isCriticalOnly || false // 이 줄을 추가하게
                });
            }			
        });
    }
    
	spawnList.sort((a, b) => {
        if (a.time !== b.time) return a.time - b.time;
        // [로건의 팁] 같은 시간(Row)일 경우, 이벤트(type)가 배열의 뒤로 가게 하여
        // 역순 루프(i--)에서 적보다 먼저 실행되도록 우선순위를 조작한다!
        if (a.type && !b.type) return 1;
        if (!a.type && b.type) return -1;
        return 0;
    });
    return spawnList;
}

function spawnForceNumbers(targetNumbers) {
    targetNumbers.forEach(num => {
        let radius = 20; 
        let x = Math.random() * (GAME_WIDTH - radius * 2) + radius; 
        let y = -radius; 
        
        items.push({
            type: 'num', 
            val: num,
            x: x,
            y: y,
            radius: radius,
            speed: Math.random() * 150 + 150 
        });
    });
}

        SaveSystem.clear(); // 금고 영구 파쇄 회로 가동!
    }
    
    const savedRecord = forceNew ? null : SaveSystem.load();

    } else {

// 🎮 게임오버 시 전황을 통제하고 10만 위 커트라인을 판정하는 통제탑
async function gameOver() { 
    document.body.style.cursor = 'default'; 
    
    // 🎯 완전히 패배하여 전멸했으니 로컬 세이브 데이터를 흔적도 없이 삭제하네!
    SaveSystem.clear();

    // 📡 미리 캐싱해둔 cutoffScore와 내 점수를 비교해 랭킹 진입 여부 판단
    isPlayerRanked = (score > 0 && score >= cutoffScore); 
    
    // 🏆 랭킹 진입 성공 시, 실시간 리더보드 데이터 조회 및 스크롤 타겟 연산 가동
    if (isPlayerRanked) {
        isFinalView = false;
        fetchGlobalScores();
    }

    // 🎰 점수판 연출(SCORE_DISPLAY)로 우선 전원 투입!
    gameState = 'SCORE_DISPLAY';
    displayedScore = 0;
    scoreRollTimer = 0;
    scoreDisplayHoldTimer = 0;
    
    // ⏱️ 점수 크기에 따라 동적으로 롤업 시간 역산
    scoreRollDuration = Math.max(0.5, Math.min(3.0, score / 15000));
}

// 🔄 점수판 화면 종료 시 갈림길 전이 엔진
async function transitionFromScoreDisplay() {
    if (isPlayerRanked) {

        // 🧹 [전장 잔재 완벽 세척 프로토콜]
        particles = [];             // 💥 잔상 파티클 및 충격파 파쇄
        items = [];                 // 🔢 잔여 숫자/기호 아이템 파쇄 (Easy-Busy 만료 폭발 차단)
        enemies = [];               // 👾 잔여 적 기체 파쇄
        bullets = [];               // 🔫 비행 중인 총알 파쇄
        supportBeams = [];          // ⚡ 지연 발사 지원사격 빔 타임라인 취소
        scrollingTexts = [];        // 📜 잔여 스크롤 텍스트 파쇄
        ads = [];                   // 📺 잔여 광고판 데이터 파쇄
        activeItems = { easyBusy: 0, penetration: 0, timeStop: 0, heavyRotation: 0 }; // ⏱️ 버프 타이머 즉시 초기화
        document.querySelectorAll('.ingame-ad').forEach(el => el.remove()); // 🖼️ DOM 광고판 엘리먼트 제거

        isKeyboardActive = false;   // 🔌 화면 전환 직후 자판 입력 일시 차단
        keyboardDelayTimer = 0.35;  // ⏱️ 0.35초 입력 방화벽(Input Guard) 가동
        initVirtualKeyboard();      // ⌨️ 가상 자판 키 레이아웃 즉시 예열!
    } else {
        // 💀 [랭크인 실패]: 다시 시작(START) 타이틀 화면으로 전원 회항!
        gameState = 'START';
        messageBox.classList.remove('hidden');        
    }
}

function showLeaderboard() { gameState = 'LEADERBOARD'; messageBox.classList.add('hidden'); highscoreInput.classList.add('hidden'); }

// =================================================================
// 🛸 [로건의 조작계 통합 방화벽 - 메뉴 다층 락온 및 사운드 동결/멜팅 버전]
// =================================================================
window.addEventListener('mousedown', (e) => { 
    SoundManager.resume();
    
	// 🎰 [SCORE_DISPLAY] 상태 제어 스위치
	if (gameState === 'SCORE_DISPLAY') {
        let progress = scoreRollTimer / scoreRollDuration;
        if (progress < 1.0) {
            // 🚫 [입력 봉쇄] 점수가 롤업되는 도중에는 어떠한 탭 클릭도 무시하네!
            return;
        } else {
            // 🔓 [스킵 허용] 즉시 갈림길 전이 엔진 가동!
            transitionFromScoreDisplay();
        }
        return;
    }

	// 🎰 [SCORE_DISPLAY] 상태 제어 스위치 바로 아래에 삽입
    if (gameState === 'INPUT' && isKeyboardActive) {
        const pos = getGameCoordinates(e.clientX, e.clientY);
        handleVirtualKeyPress(pos.x, pos.y);
        return;
    }	
	
    if (gameState === 'PAUSE') {
        gameState = 'PLAY';
        justResumed = true;
        if (SoundManager) {
            if (SoundManager.currentBgm) {
                SoundManager.currentBgm.currentTime = SoundManager.currentBgm.currentTime;
                SoundManager.currentBgm.play().catch(() => {});
            }
            if (SoundManager.staticGain) SoundManager.staticGain.gain.value = 0.03;
        }
        return;
    }

    // 🛸 [로건의 시공간 복구 패치]: e.clientY 공급관을 다시 단단히 연결했네!
    if (gameState === 'START') {
        const pos = getGameCoordinates(e.clientX, e.clientY); 
        
        // 📐 1층 상자: TAP TO PLAY 구역 (Y고도 700 ~ 780)
        if (pos.x >= 120 && pos.x <= 480 && pos.y >= 730 && pos.y <= 810) {
            startGame(false); 
        }
        // 📐 2층 상자: START NEW GAME 구역 (Y고도 790 ~ 840)
        else if (pos.x >= 120 && pos.x <= 480 && pos.y >= 915 && pos.y <= 955) {
            if (localStorage.getItem('mste_sys_save') !== null) {
                startGame(true);
            }
        }
    }
	
	else if (gameState === 'LEADERBOARD') startGame(false);
    else if (gameState === 'PLAY') {
        const pos = getGameCoordinates(e.clientX, e.clientY);
        isExceptionClick = (
            pos.x >= player.x - 50 && pos.x <= player.x + 50 &&
            pos.y >= player.y - 100 && pos.y <= player.y + 40
        );
        if (isExceptionClick) {
            const now = performance.now();
            if (now - lastExceptionClickTime < 300) {
                gameState = 'PAUSE';
                if (SoundManager) {
                    if (SoundManager.currentBgm) SoundManager.currentBgm.pause();
                    if (SoundManager.staticGain) SoundManager.staticGain.gain.value = 0;
                }
                isExceptionClick = false;
                isDragging = false;
                return;
            }
            lastExceptionClickTime = now;
        } else {
            pendingX = pos.x;
            pendingY = pos.y;
        }
        isDragging = false;
    }
	else if (gameState === 'LEADERBOARD' && isScrollFinished) {
        finalHoldTimer = 0;
        gameState = 'START';
        messageBox.classList.remove('hidden');
    }
    else if (gameState === 'TRANSITION') {
        handleUiClick();
    }
});

        );

window.addEventListener('mouseup', () => { 
    SoundManager.resume();
    
    // 🛸 [오폭 방지 댐]: 복귀할 때 쓴 터치 신호는 총알이나 워프 연산으로 흘러가지 못하게 폐기하네!
    if (justResumed) {
        justResumed = false;
        return;
    }

    if (gameState === 'PLAY') {
        if (!isExceptionClick && !isDragging) {
            player.x = Math.max(30, Math.min(GAME_WIDTH - 30, pendingX));
            
            let targetY = pendingY - 150;
            if (pendingY > GAME_HEIGHT - 120) {
                let ratio = (pendingY - (GAME_HEIGHT - 120)) / 120;
                targetY = (pendingY - 150) + (120 * ratio);
            }
            player.y = Math.max(50, Math.min(GAME_HEIGHT - 30, targetY));
        }
        isDragging = false;
        isExceptionClick = false;
        fireBullet();
    }
});

window.addEventListener('keydown', function(e) {
    if (e.key === 'n' || e.key === 'N') {

            console.log("🛠️ [DEBUG] 관제탑 권한으로 스테이지 강제 클리어 프로토콜 발동!");
            
            // 🎯 [워프 테스트 밑작업]: 무작정 화면을 리셋하지 않고, 자네가 설계한 정식 클리어 스크린을 띄우네!
            // 이 함수 안에서 자동으로 암호화 세이브도 발동하고 레벨 증가 회선도 태우기 때문에 안전하네.

    }
