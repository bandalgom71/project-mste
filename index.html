        });

        // 2. [핵심 처방] 적들을 담고 있는 가방(배열) 자체를 통째로 비워버리네!
        // 우리 엔진에서 enemies는 let으로 선언되어 있어서 이 대입문 한 줄로 박스까지 싹 날아가지.
        enemies = [];
        
        // 청각적 카타르시스를 위해 쾅- 하는 저음 폭발음도 관제탑 권한으로 강제 재생!
        if (typeof SoundManager !== 'undefined' && SoundManager.playBassExplosion) {
            SoundManager.playBassExplosion(0);
        }
    }
});

window.addEventListener('mousemove', e => {
    if (gameState !== 'PLAY') return;

    // 호버 차단 (마우스 버튼을 안 누르고 움직이면 리턴)
    if (e.buttons !== 1) {
        isDragging = false;
        isExceptionClick = false;
        return;
    }

    // 🛸 예외 구역(비행기 주변)을 잡고 비비는 드래그는 즉시 무시하여 기체 고정!
    if (isExceptionClick) return;

    isDragging = true;

    let 계산X = e.clientX;
    let 계산Y = e.clientY;

    const canvasMinX = canvasOffsetX;
    const canvasMaxX = canvasOffsetX + GAME_WIDTH * scale;
    const canvasMaxY = canvasOffsetY + GAME_HEIGHT * scale;

    계산X = Math.max(canvasMinX + 10, Math.min(canvasMaxX - 10, e.clientX));
    계산Y = Math.min(canvasMaxY - 10, e.clientY);

    const pos = getGameCoordinates(계산X, 계산Y);
    player.x = Math.max(30, Math.min(GAME_WIDTH - 30, pos.x));
    
    let targetY = pos.y - 150;
    if (pos.y > GAME_HEIGHT - 120) {
        let ratio = (pos.y - (GAME_HEIGHT - 120)) / 120;
        targetY = (pos.y - 150) + (120 * ratio);
    }
    player.y = Math.max(50, Math.min(GAME_HEIGHT - 30, targetY));
});

window.addEventListener('touchmove', e => { 
    if (gameState !== 'PLAY') return;
    e.preventDefault();
    
    // 🛸 모바일 터치 드래그 시에도 무반응 영역 홀딩 가드 연동!
    if (isExceptionClick) return;
    
    isDragging = true;
    updatePlayerPos(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

function initAutoPauseProtection() {
    const triggerAutoPause = () => {
        if (gameState === 'PLAY') {
            gameState = 'PAUSE';
            
            // 🎵 [오디오 올스톱 방화벽]: BGM과 라디오 노이즈를 동시에 얼려버리네!
            if (SoundManager) {
                if (SoundManager.currentBgm) SoundManager.currentBgm.pause();
                if (SoundManager.staticGain) SoundManager.staticGain.gain.value = 0;
            }
        }
    };

    window.addEventListener('blur', triggerAutoPause);

    document.addEventListener('visibilitychange', () => {
        if (document.hidden || document.visibilityState === 'hidden') {
            triggerAutoPause();
        }
    });
}

// 락온 가동! 센서 활성화 회로 배치
initAutoPauseProtection();

function updatePlayerPos(clientX, clientY) {
    if (gameState !== 'PLAY' || !isDragging) return;
    const pos = getGameCoordinates(clientX, clientY);
    player.x = Math.max(30, Math.min(GAME_WIDTH - 30, pos.x));
    player.y = Math.max(50, Math.min(GAME_HEIGHT - 50, pos.y - 150));
}
function updateExpression(value) {
    if (activeItems.easyBusy > 0) {
        player.isEasyBusyExpr = true; // 🎯 Perfect 10 작동 중 조합된 수식에 각인
    }
    
    const isNum = !isNaN(value); const strVal = String(value);
    let tokens = player.expr.match(/\d+|[+\-×÷]/g);
    if (!tokens) { if (isNum) player.expr = strVal; return; }
    let lastIsNum = !isNaN(tokens[tokens.length - 1]);
    if (isNum) { if (lastIsNum) tokens[tokens.length - 1] = strVal; else tokens.push(strVal); } 
    else { if (!lastIsNum) tokens[tokens.length - 1] = strVal; else tokens.push(strVal); }
    player.expr = tokens.join('');
}

function fireBullet() {
    if (player.expr === "") return;
    if (isNaN(player.expr[player.expr.length - 1])) player.expr = player.expr.slice(0, -1);
    if (player.expr === "") return;
	
    // 💡 [1단계 수정] 관통 아이템(penetration) 여부 확인
    let isPiercing = activeItems.penetration > 0;
	let exprIsEasyBusy = player.isEasyBusyExpr; // 🎯 수식 출처 태그 복사

	if (isPiercing) {
        bullets.push({ 
            x: player.x, 
            y: player.y - 40, 
            text: player.expr, 
            speed: 1200,        
            isPiercing: false,   
            hitList: new Set(),
            isEasyBusy: exprIsEasyBusy // 🎯 탄환에 태그 이관
        });
        triggerSupportFire(player.expr);
        activeItems.penetration = 0;		
    } else {
        bullets.push({ 
            x: player.x, 
            y: player.y - 40, 
            text: player.expr, 
            speed: 1200, 
            isPiercing: false,
            hitList: new Set(),
            isEasyBusy: exprIsEasyBusy // 🎯 탄환에 태그 이관
        });
    }

    // ▼ 파티클 로직 (그대로 유지)
    for(let i = 0; i < 5; i++) {
        particles.push({
            type: 'spark',
            x: player.x + (Math.random() - 0.5) * 20, 
            y: player.y - 45,
            vx: (Math.random() - 0.5) * 100,
            vy: -200 - Math.random() * 300, 
            life: 0.7, 
            size: Math.random() * 3 + 2,
            color: Math.random() > 0.3 ? '#cccccc' : '#ffffff' 
        });
    }
	
	// 헤비 로테이션 시간이 끝났을 때만 수식을 초기화    
	if (!(activeItems.heavyRotation > 0)) {
        player.expr = "";
        player.isEasyBusyExpr = false; // 🎯 수식 비움과 동시에 태그 리셋
    }
}

function triggerSupportFire(firedText) {
    const colWidth = GAME_WIDTH / 7;
    let columns = [0, 1, 2, 3, 4, 5, 6].sort(() => Math.random() - 0.5);
    
    let currentDelay = Math.random() * (2000 - 1000) + 1000;
    
    columns.forEach((colIndex, i) => {
        const finalDelay = currentDelay;
        const isFirstBeam = (i === 0);
        const isLastBeam = (i === 6);
        
        let previewDur = 0.5; 
        let activeDur = 0.4;  
        let fadeDur = 0.3;    
        
        let previewMaxAlpha = 0.4;
        let previewMaxWidth = 4;
        
        // 💡 [해결] 루프 '내부'에서 매 마디마다 새 주사위를 굴려 독립된 메모리를 확보하네!
        let randomizedMaxWidth = Math.random() * (90 - 30) + 30;
        
        if (isFirstBeam) {
            previewDur = 0.8; 
            previewMaxAlpha = 0.6;  
            previewMaxWidth = 2;    
            
            // 🎯 오직 첫 번째 바퀴(i === 0)일 때만 주사위 값을 60으로 강제 락 고정!
            randomizedMaxWidth = 60; 
        }
        if (isLastBeam) {
            fadeDur = 1.0; 
        }
        
        setTimeout(() => {
            supportBeams.push({
                x: colIndex * colWidth + (colWidth / 2),
                elapsed: 0,
                state: 'PREVIEW',
                hasFired: false,
                text: firedText,
                previewDur: previewDur,
                activeDur: activeDur,
                fadeDur: fadeDur,
                previewMaxAlpha: previewMaxAlpha,
                previewMaxWidth: previewMaxWidth,
                maxLineWidth: randomizedMaxWidth // 안전하게 뱃속에 개별 캡처 완료
            });
        }, finalDelay);
        
        if (i === 0) {
            currentDelay += Math.random() * (1300 - 1000) + 1000;
        } else if (i === 1) {
            currentDelay += Math.random() * (800 - 500) + 500;
        } else if (i === 2) {
            currentDelay += Math.random() * (600 - 300) + 300;
        } else {
            currentDelay += Math.random() * (400 - 100) + 100;
        }
    });
}

function spawnDebris(x, y, hp) {
    if (hp < 10) return;
    const count = String(hp).length; 
    const maxVal = Math.floor(hp * 0.2); 
    if (maxVal < 1) return;
    for (let i = 0; i < count; i++) {
        let val = Math.floor(Math.random() * maxVal) + 1;
        items.push({ type: 'num', val: val, x: x, y: y, vx: (Math.random() - 0.5) * 400, vy: (Math.random() - 0.5) * 400, isDebris: true });
    }
}

function spawnExplosion(x, y, tier, textValue, damageVal, multiplier) {
    // 🎲 [로건의 유전자 동기화]: 외부에서 강제로 주입된 사운드 유전자가 있는지 검사하네!
    // 최초 직격탄일 때는 window.nextSoundType이 없을 테니, 여기서 50% 주사위를 딱 한 번만 굴려 픽스하지.
    let soundType = window.nextSoundType || (Math.random() < 0.5 ? 'bass2' : 'bass3');
    let soundBase = window.nextSoundBase || (0.90 + (Math.random() * 0.20));
    
    // 계산된 체인 카운트
    let chain = multiplier > 1 ? (multiplier - 1) : 0; 
    
    // 🎯 확정된 사운드 무기와 고정된 시작 피치를 매니저에게 토스!
    SoundManager.playBassExplosion(chain, soundType, soundBase); 
    
    // 사용한 글로벌 일회성 미끼는 다음 폭발을 위해 즉시 청소하네.
    window.nextSoundType = null;
    window.nextSoundBase = null;
    
    let finalText = textValue;
    if (textValue !== "SHIP IS DESTROYED" && tier === 'critical' && multiplier > 1) { finalText = "Critical"; }
    let textColor = (textValue === "SHIP IS DESTROYED") ? '#666666' : ((tier === 'critical') ? '#ffffff' : '#ffffff');
    
    // 이펙트 텍스트 생성
    particles.push({ type: 'text', x, y, text: finalText, life: 1.0, vy: -150, isCritical: (tier === 'critical'), color: textColor });
    
    // 파티클 기본 물리량 결정
    let count, speed, colors, shockSize;
    if (textValue === "SHIP IS DESTROYED") { count=50; speed=800; colors=['#ffffff', '#888888', '#444444']; shockSize=500; } 
    else if(tier==='small') { count=8; speed=300; colors=['#cccccc']; } 
    else if(tier==='medium') { count=20; speed=500; colors=['#ffffff','#666666']; shockSize=100; } 
    else { count=40; speed=800; colors=['#ffffff','#333333']; shockSize=300; } 
    
    for(let i=0; i<count; i++){
        const ang = Math.random()*Math.PI*2, s = Math.random()*speed;
        particles.push({ type:'spark', x, y, vx:Math.cos(ang)*s, vy:Math.sin(ang)*s, size:Math.random()*4+2, color:colors[i%colors.length], life:1.0, decay:1.5 });
    }
    
    // 🎯 [핵심 패치]: 충격파가 생성될 때 현재 결정된 사운드와 피치 유전자를 뱃속에 문신처럼 새겨놓네!
    if(tier==='critical' || textValue === "SHIP IS DESTROYED") { 
        particles.push({ 
            type: 'shockwave', x, y, size: 10, maxSize: shockSize, color: colors[0], life: 1.0, decay: 1.0, 
            damage: damageVal, hitList: [], age: 0, multiplier: multiplier,
            inheritedSoundType: soundType, // 🔥 무기 유전자 장착!
            inheritedSoundBase: soundBase   // 🔥 피치 유전자 장착!
        }); 
    } 
    else if (tier==='medium') { particles.push({ type:'shockwave_visual', x, y, size:10, maxSize:shockSize, color:colors[0], life:1.0, decay:2.0 }); }
}

function update(dt) {
	if (gameState === 'PAUSE') return;
	
	// 🎰 [로건의 최대 3초 유동적 점수 롤업 및 입력 봉쇄 엔진]
	if (gameState === 'SCORE_DISPLAY') {
        scoreRollTimer += dt / TIME_SCALE;
        let progress = Math.min(1.0, scoreRollTimer / scoreRollDuration); // 동적 한계 시간 대비 진행률 계산
        
        // 감속 곡선(easeOutQuad)을 줘서 마지막에 툭 정지하는 묵직한 카타르시스 부여!
        let ease = 1 - Math.pow(1 - progress, 2); 
        
        let prevScore = displayedScore;
        displayedScore = Math.floor(ease * score);
        
        // 점수가 실제로 변하는 틱 프레임마다 경쾌한 칩튠 소리 재생!
        if (displayedScore > prevScore) {
            SoundManager.playTickSound();
        }
        
		// 롤업이 완벽히 정착한 시점부터 정확히 10.0초간의 여운 대기 타이머가 흐르기 시작하네!
        if (progress >= 1.0) {
            scoreDisplayHoldTimer += dt / TIME_SCALE;
            if (scoreDisplayHoldTimer >= 10.0) { // ⏱️ [조율]: 5.0 -> 10.0초 대기 락온
                transitionFromScoreDisplay(); // 👈 시간 초과 시 갈림길 엔진 가동!
            }
        }
        updateStars(dt); // 점수가 올라가는 배경 뒤로 별무리만 부드럽게 흐르게 방치
        return; // 이 상태일 때는 인게임 루프(충돌, 입력 등)를 전면 차단하네!
	}
	
	// =================================================================
    // 🎯 [로건의 SF 기계식 S자형 댐퍼 가속 및 0.6초 시동 대기 시스템]
    // =================================================================
    if (gameState === 'LEADERBOARD' || gameState === 'INPUT') { // 💡 DEBUG_MODE.enable 제약 제거!
        if (!isScrollFinished) {
            if (scrollDelayTimer > 0) {
                // 🔌 [1단계: 시동 대기] 진입 즉시 0.6초간 움직이지 않고 상황 인지 유도!
                scrollDelayTimer -= dt / TIME_SCALE;
                scrollY = startScrollY;
            } else {
                let scrollDist = Math.abs(targetScrollY - startScrollY);

                if (scrollDist === 0) {
                    scrollY = targetScrollY;
                    isScrollFinished = true;
                    keyboardDelayTimer = 0.35;
                } else {
                    scrollTimeActive += dt / TIME_SCALE;
                    
                    let dynamicDuration = Math.max(1.2, Math.min(7.0, scrollDist / 200)); 
                    let t = Math.min(1.0, scrollTimeActive / dynamicDuration);

                    let ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                    scrollY = startScrollY + (targetScrollY - startScrollY) * ease;

                    if (t >= 1.0) {
                        scrollY = targetScrollY;
                        isScrollFinished = true;
                        keyboardDelayTimer = 0.35;
                        console.log("🎯 S자 가변 스크롤 드라이브 도킹 완료!");
                    }
                }
            }
        } else {
            // 🔌 [3단계: 지연 공급] 정지 완료 후 0.35초 후에 비로소 자판 전원 공급!
            if (keyboardDelayTimer > 0) {
                keyboardDelayTimer -= dt;
                if (keyboardDelayTimer <= 0) {
                    isKeyboardActive = true; 
                }
            }
			
			// ⏱️ [v10.0] 스크롤 도킹이 끝난 최종 연출 화면에서 10초 타이머 가동
            if (isFinalView || gameState === 'LEADERBOARD') {
                finalHoldTimer += dt / TIME_SCALE;
                if (finalHoldTimer >= 10.0) {
                    finalHoldTimer = 0;
                    gameState = 'START';
                    messageBox.classList.remove('hidden');
                }
            }
			
			// ⌨️ 가상 키보드 폭발 후 가속 낙하 및 입력 잠금 해제 연산
			if (gameState === 'INPUT') {
				// 🎯 [속도 조정 포인트] 기존 450에서 180으로 감속 (원하는 속도로 수치 변경 가능)
				const dropSpeed = 180; 

				virtualKeys.forEach(key => {
					if (key.isRespawning) {
						if (key.respawnTimer > 0) {
							// ⏱️ 폭발 연출 동안 대기 (키 숨김 유지)
							key.respawnTimer -= dt / TIME_SCALE;
						} else {
							// 🪂 대기 종료 후 상단에서 천천히 하강
							key.currentY += dropSpeed * (dt / TIME_SCALE);
							if (key.currentY >= key.targetY) {
								key.currentY = key.targetY;
								key.isRespawning = false; // 🔓 입력 재개
							}
						}
					}
				});
			}		
        }
    }
	
	if (gameState === 'INPUT') {
		for (let i = particles.length - 1; i >= 0; i--) {
			let p = particles[i];
			p.life -= (p.decay || 1.0) * (dt / TIME_SCALE);
			if (p.type === 'text') p.y += p.vy * (dt / TIME_SCALE);
			else if (p.type === 'spark') { 
				p.x += p.vx * (dt / TIME_SCALE); 
				p.y += p.vy * (dt / TIME_SCALE); 
				p.vx *= 0.9; 
				p.vy *= 0.9; 
			}
			else if (p.type === 'shockwave' || p.type === 'shockwave_visual') { 
				p.size += (p.maxSize - p.size) * 3 * (dt / TIME_SCALE); 
			}
			if (p.life <= 0) particles.splice(i, 1);
		}
	}
    // =================================================================
	
	// 🛸 [로건의 TITLEWARP 인트로 타임라인 관리자]
    if (gameState === 'TITLEWARP') {
        titleWarpTimer += dt / TIME_SCALE;
        updateStars(dt); // 워프가 기동되는 동안에도 배경의 별들은 주행 연산을 이어가네!
        
        if (titleWarpTimer >= 3.6) {
            resetStage(); // 💡 3.6초가 만료되는 마디에 진짜 인게임 전장으로 전격 사출!
        }
        return; // 워프 중에는 아래쪽 인게임 연산(적 하강, 충돌 등)을 철저히 락온 차단하네!
    }
		
	// 🛸 [규칙 엄수]: 1초에 정확히 1회전(2 * Math.PI) 하도록 실시간 축적하네!
	baseOrbitAngle += (Math.PI * dt) / TIME_SCALE; 
    if (baseOrbitAngle > Math.PI * 2) {
        baseOrbitAngle -= Math.PI * 2; 
    }
	
    updateStars(dt);
    if (pickupTimer > 0) pickupTimer -= dt;

	for (let key in activeItems) {
        if (activeItems[key] > 0) {
		if (key === 'penetration') continue;
		
            let prevTime = activeItems[key]; 
            activeItems[key] -= (dt / TIME_SCALE);
			
			// =======================================================
			// 💿 [로건의 위성 탈착 엔진]: 버프 만료 순간 궤도 좌표를 계산해 우주로 사출하네!
			// =======================================================
			if (activeItems[key] <= 0 && prevTime > 0) {
				let imgToUse = null;
				if (key === 'easyBusy') imgToUse = itemImgPf10;
				else if (key === 'heavyRotation') imgToUse = itemImgWlol;
				else if (key === 'timeStop') imgToUse = itemImgRlsp;

				// 만료되기 직전의 100px 궤도상 정확한 물리 좌표 역산 프로토콜
				if (imgToUse) {
					let order = ['easyBusy', 'heavyRotation', 'timeStop', 'penetration'];
					let currentActiveKeys = [];
					order.forEach(k => {
						if (k === key || activeItems[k] > 0) currentActiveKeys.push(k);
					});

					let activeCount = currentActiveKeys.length;
					let myIndex = currentActiveKeys.indexOf(key);

					if (activeCount > 0 && myIndex !== -1) {
						const ORBIT_RADIUS = 80; // 지휘관이 세팅한 대형 궤도폭 100 복포 고정
						let angle = baseOrbitAngle + (myIndex * (2 * Math.PI / activeCount));
						let spawnX = player.x + Math.cos(angle) * ORBIT_RADIUS;
						let spawnY = player.y + Math.sin(angle) * ORBIT_RADIUS;

						particles.push({
							type: 'vinyl_drop',
							x: spawnX,
							y: spawnY,
							img: imgToUse,
							spinTime: 0,
							life: 5.0,     // 화면 밖으로 탈출할 때까지 넉넉한 타이머 버퍼
							decay: 0.001,   // 자동 알파 소멸 가드를 끄기 위한 미세 감쇄율
							vy: 150
						});
					}
				}
			}
			

            // [대망의 피날레] Easy-Busy가 막 끝나는 찰나를 포착!
            if (key === 'easyBusy' && activeItems[key] <= 0 && prevTime > 0) {
                for (let i = items.length - 1; i >= 0; i--) {
                    let it = items[i];
                    if (!it.isDebris) {
                        if ((it.type === 'num' && it.val === 10) || 
                            (it.type === 'sym' && (it.val === '+' || it.val === '×'))) {
                            
                            // 1. 화려한 스파크 파티 생성! 
                            for(let k = 0; k < 8; k++) {
                                particles.push({
                                    type: 'spark',
                                    x: it.x,
                                    y: it.y,
                                    vx: (Math.random() - 0.5) * 400, 
                                    vy: (Math.random() - 0.5) * 400,
                                    life: 1.0,
                                    size: Math.random() * 4 + 2,
                                    color: Math.random() > 0.5 ? '#bbbbbb' : '#ffffff' 
                                });
                            }
                            // 2. 화면에서 깔끔하게 삭제 (파사삭!)
                            items.splice(i, 1);
                        }
                    }
                }
            }
        }
    }

    if (gameState === 'CRASHED') {
        crashTimer += dt;
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i]; p.life -= (p.decay || 1.0) * dt;
            if (p.type === 'text') p.y += p.vy * dt;
            else if (p.type === 'spark') { p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.9; p.vy *= 0.9; }
            else if (p.type === 'shockwave') { p.size += (p.maxSize - p.size) * 5 * dt; }
            if (p.life <= 0) particles.splice(i, 1);
        }
        if (crashTimer > 1.5) { lives--; if (lives <= 0) gameOver(); else triggerStageFail(); }
        return; 
    }
	
	if (gameState === 'WARP') {
		warpTimer += dt;

		// 1. 별들의 속도를 매 프레임마다 미친 듯이 오버클럭하네! (초고속 스크롤 연출용)
		stars.forEach(s => {
			s.speed += 2000 * dt; 
			s.y += s.speed * dt;
			if (s.y > GAME_HEIGHT) { s.y = 0; s.x = Math.random() * GAME_WIDTH; }
		});
		
		// 🎯 [아이템 잔상 격파]: 화면에 남아있던 숫자/기호들을 하단으로 폭풍 사출시켜 상대 속도감을 극대화하네!
		items.forEach(it => {
			it.y += 3000 * dt; // 초속 3000픽셀의 압도적인 속도로 하강!
		});
		// 화면 밑바닥을 완전히 탈출한 자원들은 가방(배열)에서 즉시 삭제하여 메모리 보호
		items = items.filter(it => it.y <= GAME_HEIGHT);

		// 2. 처음 0.6초 동안은 제자리에서 추진력을 모으고, 그 이후 하늘 위로 폭풍 가속 탈출!
		if (warpTimer > 0.6) {
			let accel = (warpTimer - 0.6) * 2200; // 가속도 법칙 적용
			player.y -= accel * dt;
		}

		// 3. 기체가 화면 상단 바깥(-100px)으로 완전히 탈출 성공했는가?
		if (player.y < -100) {						
			if (typeof STAGE_DATA !== 'undefined' && currentLevel <= STAGE_DATA.length) {
				resetStage();
			} else {
				gameState = 'CLEAR';
			}
		}
		return; // 워프 연출 중에는 아래쪽 인게임 연산을 건너뛰네!
	}
	
    if (gameState !== 'PLAY') return;
    if (!(activeItems.timeStop > 0)) {
        elapsedTime += dt * 1000;
    }
    if (enemySpawnData.length === 0 && enemies.length === 0) { stageClearTimer += dt; if (stageClearTimer > 3.0) showLevelClearScreen(); }

	for (let i = enemySpawnData.length - 1; i >= 0; i--) {
        let data = enemySpawnData[i];
        
		if (elapsedTime >= data.time) {
            
            if (data.type) {
                // [STEP 2] 이벤트 디스패처: 명령어를 읽고 전역 변수 업데이트
                if (data.type === 'BGM') { SoundManager.playSpecificBGM(data.val); }
                else if (data.type === 'SPEED') { currentEnemySpeed = data.val; }
                else if (data.type === 'SYMBOL') { currentSymbols = data.val; }
                else if (data.type === 'NUMBER') { currentNumbers = data.val; }
				else if (data.type === 'FORCE') { spawnForceNumbers(data.val); }
                else if (data.type === 'PRINT') {
					// 엑셀이나 파일에서 \n 혹은 실제 줄바꿈 문자가 들어왔을 때를 대비한 분할 처리
					let lines = String(data.text).split(/\\\\n|\n/);
					
					// 글로벌 스크롤 메시지 배열에 새로운 오브젝트 주입!
					scrollingTexts.push({
						lines: lines,
						x: GAME_WIDTH / 2,     // 화면 정중앙 좌표
						y: -30 * lines.length, // 글자 수(줄 수)에 맞춰 화면 위쪽 안 보이는 곳에 스폰
						speed: currentEnemySpeed * 2,
						opacity: 1             // 초기 투명도 (선명함)
					});}
                else if (data.type === 'ITEM') {
                    const colWidth = GAME_WIDTH / 7;
                    const xPos = (data.col - 1) * colWidth + (colWidth / 2);
					
					let width = ENEMY_WIDTH; let height = ENEMY_HEIGHT;
					enemies.push({ 
						x: xPos - width/2, 
						y: -80, 
						width: width, 
						height: height, 
						hp: 1, // 보급선의 체력 (원하는 대로 조절하게)
						maxHp: 1, 
						speed: currentEnemySpeed,
						color: '#888888', // 황금색 테두리!
						isBoss: false,
						dropItem: data.val // ★ 핵심: 죽을 때 떨어뜨릴 아이템 이름을 뱃속에 기억시킴 ★
					});
                }
				
				// === [인게임 광고 구현 STEP 2] 'AD' 명령어를 만나면 고정 속도/유리체력 광고판 투하 ===
                else if (data.type === 'AD') {
                    const colWidth = GAME_WIDTH / 7;
                    // 자네가 정한 7 그리드 시스템(col)을 기반으로 정확한 중심 X 좌표를 계산하네.
                    const xPos = (data.col - 1) * colWidth + (colWidth / 2);
                    
                    let width = 300;   // 우리가 합의한 300x150 규격 고정
                    let height = 150;
                    let fixedFallSpeed = gameAdSpeed;
                    
                    ads.push({
                        x: xPos - width / 2,
                        y: -200,                // 화면 위쪽 외곽 숨은 곳에서 스폰
                        width: width,
                        height: height,
                        vx: 0,                  // 나중에 퉁퉁 튕길 때 사용할 좌우 물리 속도
                        vy: fixedFallSpeed,     // 독자적인 고정 하강 속도 주입
                        hp: 1,                  // 💡 기획 4번 규칙: 총알 한 발에 터지는 유리체력 HP 1
                        isRealized: false,       // 💡 기획 2번 규칙: 특정 고도 전에는 무적 상태를 판별할 플래그라네
						imgSrc: gameAdImgSrc
                    });
                }
				
			} else {
				// 적 소환 (currentEnemySpeed 적용)
				let width = data.isBoss ? 150 : ENEMY_WIDTH; 
				let height = data.isBoss ? 100 : ENEMY_HEIGHT;

				if (!data.isBoss) {
					// 체력 숫자의 길이를 측정하네 (예: 99999는 5자리, 100000은 6자리)
					const hpLength = String(data.hp).length;
					
					// 💡 [로건의 6자리 가드 패치]: 5자리(99999)까지는 완벽하게 순정 폭(80)을 유지하네!
					// 숫자가 6자리가 되는 순간부터 자릿수가 늘어날 때마다 가로폭을 25픽셀씩 시원하게 늘려주네.
					// (6자리일 때 폭 105px, 7자리일 때 폭 130px로 웅장하게 벌크업!)
					if (hpLength >= 6) {
						width = ENEMY_WIDTH + (hpLength - 5) * 25;
					}
				}

				enemies.push({ 
					x: data.x - width/2, 
					y: -80, 
					width, // 👈 6자리 이상일 때만 벌크업된 가로폭이 드로잉과 히팅박스에 자동 연동되네!
					height, 
					hp: data.hp, 
					maxHp: data.hp, 
					speed: currentEnemySpeed, 
					color: data.isBoss ? '#444444' : '#ffffff', 
					isBoss: data.isBoss,
					isCriticalOnly: data.isCriticalOnly || false 
				});
			}          
            enemySpawnData.splice(i, 1);
        }
    }

    if (gameState === 'PLAY') {
		for (let i = scrollingTexts.length - 1; i >= 0; i--) {
			let txt = scrollingTexts[i];
			
			// 스테이지 현재 전장 스크롤 속도에 맞춰 실제 시간(dt)만큼 아래로 이동!
			txt.y += txt.speed * dt; 

			// [전술 연출] 화면 하단(GAME_HEIGHT)에 가까워질수록 자연스럽게 페이드아웃(투명화)
			// 화면 하단 도달 150픽셀 전부터 부드럽게 사라지도록 설계했네.
			let fadeZone = GAME_HEIGHT - 150;
			if (txt.y > fadeZone) {
				let distance = GAME_HEIGHT + 100 - txt.y;
				txt.opacity = Math.max(0, distance / (GAME_HEIGHT + 100 - fadeZone));
			}

			// 완전히 화면 밖(하단 마진 100픽셀)으로 탈출하면 배열에서 즉시 삭제하여 메모리 보호!
			if (txt.y > GAME_HEIGHT + 100) {
				scrollingTexts.splice(i, 1);
			}
		}
	}
	
    
    lastSpawnNum += dt * 1000; lastSpawnSym += dt * 1000;
    
	if (enemies.length > 0 || enemySpawnData.length > 0) {
        
        // ▼ 1. 숫자 폭우 설정: Easy-Busy일 땐 80(0.08초), 아닐 땐 원래 속도
        let currentNumRate = (activeItems.easyBusy > 0) ? 200 : SPAWN_RATE_NUM;
        if (lastSpawnNum > currentNumRate) {
            // [안전장치] currentNumbers에 데이터가 있을 때만 실행!
            if (currentNumbers.length > 0) {		
            // ▼ 삼항 연산자로 Easy-Busy 체크!
                let randNum = (activeItems.easyBusy > 0) ? 10 : currentNumbers[Math.floor(Math.random() * currentNumbers.length)];
                items.push({ type:'num', val:randNum, x:Math.random()*(GAME_WIDTH-60)+30, y:-40, speed:150 + Math.random()*90 }); 
            }
            lastSpawnNum = 0;
        }
        
        // ▼ 2. 기호 폭우 설정: Easy-Busy일 땐 150(0.15초), 아닐 땐 원래 속도
        let currentSymRate = (activeItems.easyBusy > 0) ? 150 : SPAWN_RATE_SYM;
        if (lastSpawnSym > currentSymRate) {
            // [안전장치] currentSymbols에 데이터가 있을 때만 실행!
            if (currentSymbols.length > 0) {
                // ▼ 여기서 Easy-Busy 체크! 활성화 중이면 '+', '×'만 들어있는 임시 배열(Pool)을 사용하네.
                let symPool = (activeItems.easyBusy > 0) ? ['×'] : currentSymbols;
                
                // === [로건의 결정론적 순환 스폰 수술] ===
                // 1. 혹시 스테이지가 바뀌어서 배열 크기보다 인덱스가 커졌을 상황을 대비한 안전장치!
                if (symIndex >= symPool.length) symIndex = 0;
                
                // 2. 랜덤이 아니라 현재 포인터 위치의 기호를 정확하게 픽스하네!
                let randSym = symPool[symIndex];
                
                // 3. 다음 기호를 준비하기 위해 인덱스를 1 키우고, 배열 크기를 넘어가면 0으로 리셋(순환)!
                symIndex = (symIndex + 1) % symPool.length;
                
                items.push({ 
                    type: 'sym', 
                    val: randSym, 
                    x: Math.random() * (GAME_WIDTH - 60) + 30, 
                    y: -40, 
                    speed: 150 + Math.random() * 90 
                }); 
            }
            lastSpawnSym = 0; 
        }
    }
    
    for (let i = items.length - 1; i >= 0; i--) {
        let it = items[i]; 
        
		// 🛸 [로건의 자동 감지 가드]: 태어난 경로와 상관없이 'special' 타입이면 실시간으로 타이머를 주입하네!
        if (it.type === 'special') {
            if (it.scaleAge === undefined) {
                it.scaleAge = 0;
                it.scaleDuration = 0.5; // 0.5초 동안 팝업 텐션 연출
            }
            if (it.scaleAge < it.scaleDuration) {
                it.scaleAge += dt;
            }
        }
		
        if (it.isDebris) {
            it.x += it.vx * dt;
            it.y += it.vy * dt;
            it.vy += 200 * dt;
        } else {
			let speedBoost = (activeItems.easyBusy > 0) ? 1.0 : 1.0;
            it.y += (it.speed * speedBoost) * dt;
        }

        if (isDragging && Math.abs(it.x - player.x) < 40 && Math.abs(it.y - player.y) < 40) {
            if (pickupTimer <= 0) {
			
				if (it.type === 'special') {
					if (it.val === 'EASY_BUSY') {
						activeItems.easyBusy = 10.0;	
						// activePrint를 지우고, 흐르는 텍스트 배열에 직접 주입하네!
						// scrollingTexts.push({ lines: ["EASY-BUSY!"], x: GAME_WIDTH / 2, y: it.y, speed: currentEnemySpeed, opacity: 1 });
						
						items.forEach(existingItem => {
							if (existingItem.type === 'num' && !existingItem.isDebris) existingItem.val = 10;
							else if (existingItem.type === 'sym') existingItem.val = Math.random() < 0.5 ? '+' : '×';
						}); 
					}
					else if (it.val === 'HEAVY_ROTATION') {
						activeItems.heavyRotation = 10.0;
						scrollingTexts.push({ lines: ["HEAVY-ROTATION!"], x: GAME_WIDTH / 2, y: it.y, speed: currentEnemySpeed, opacity: 1 });
					}
					else if (it.val === 'TIME_STOP') {
						activeItems.timeStop = 10.0;
						scrollingTexts.push({ lines: ["RED-LIGHT SPECIAL!"], x: GAME_WIDTH / 2, y: it.y, speed: currentEnemySpeed, opacity: 1 });
					}
					else if (it.val === 'PENETRATION') {
						activeItems.penetration = 1;
					}
					
					SoundManager.playItemGet('special');
					items.splice(i, 1);
					continue;
				}
			
                if (!(player.expr === "" && it.type === 'sym')) { 
                    updateExpression(it.val); 
                    SoundManager.playItemGet(it.type); 
                    items.splice(i, 1);
                    pickupTimer = PICKUP_COOLDOWN; 
                    continue; 
                }
            }
        }
        if (it.y > GAME_HEIGHT) items.splice(i, 1);
    }
	
	// === [인게임 광고 구현 STEP 3] 광고판 이동, 실체화 고도 판정, 화면 탈출 처리 ===
	
	for (let i = ads.length - 1; i >= 0; i--) {
        let ad = ads[i];

        // 💡 [추가] 0.3초 재충돌 방지를 위한 쿨타임 타이머 실시간 차감 연산일세.
        if (ad.hitCooldown > 0) {
            ad.hitCooldown -= dt;
        }

        // 물리 이동 연산
        ad.y += ad.vy * dt;
        ad.x += ad.vx * dt;

        // 중력 가속도 회로: 쳐올려진 광고판이 다시 아래로 떨어지게 만드는 힘
        if (ad.vy < gameAdSpeed) {
            ad.vy += 450 * dt; 
            if (ad.vy > gameAdSpeed) ad.vy = gameAdSpeed; // 원래 고정 속도로 복귀
        }

        // 광고판이 좌우 경계를 뚫고 나가지 못하도록 가두고 벽 바운스 연산
        if (ad.x < 0) {
            ad.x = 0;
            ad.vx = -ad.vx * 0.5; // 벽에 부딪히면 50%의 힘으로 반사 튕김
        } else if (ad.x > GAME_WIDTH - ad.width) {
            ad.x = GAME_WIDTH - ad.width;
            ad.vx = -ad.vx * 0.5;
        }

        ad.vx *= 0.95; // 마찰력

        // 고도 실체화 판정
        if (!ad.isRealized && ad.y >= 500) {
            ad.isRealized = true;
        }

        // 💡 [수정] 광고판이 실체화되었고, 충돌 쿨타임이 완전히 끝났을 때만 정밀 충돌 판정을 가동하네!
        if (ad.isRealized && (!ad.hitCooldown || ad.hitCooldown <= 0)) {
            let adCenterX = ad.x + ad.width / 2;
            let adCenterY = ad.y + ad.height / 2;
            
            // 가로/세로 영역 안으로 기체가 진입했는지 기본 히트박스 판정
            if (Math.abs(adCenterX - player.x) < (ad.width / 2 + 30) && 
                Math.abs(adCenterY - player.y) < (ad.height / 2 + 30)) {
                
                // [충돌 위치별 Y축 가속도 분기]
                if (player.y > adCenterY) {
                    // 비행기가 광고판 중심보다 아래에 있을 때: 하늘 위로 포물선 반발 사출 (-400)
                    ad.vy = -400; 
                } else {
                    // 비행기가 광고판 중심보다 위에 있을 때: 화면 아래로 강하게 사출 (600)
                    ad.vy = 600; 
                }
                
                // 옆으로 비껴 튕겨나가는 수평(X축) 가속도 연산
                ad.vx = (adCenterX - player.x) * 2; 
                
                // 💡 [핵심 추가] 충돌 직후 0.3초간 히트박스를 완전히 잠가버려서 중복 트리거 버그를 원천 봉쇄하네!
                ad.hitCooldown = 0.3;
                
                SoundManager.playBlockSound();
            }
        }

        // 화면 탈출 처리
        if (ad.y > GAME_HEIGHT) {
            ads.splice(i, 1);
        }
    }
	   
    for (let i = enemies.length - 1; i >= 0; i--) {
        let en = enemies[i];

        // ▼ 타임스톱이 아닐 때만 적이 아래로 이동! (시간이 멈추면 속도가 0이 되는 효과)
        if (!(activeItems.timeStop > 0)) {
            en.y += en.speed * dt;
        }

        // ▼ 충돌 판정은 무조건 검사! (얼어붙은 적에게 들이받으면 가차 없이 터지네!)
        if (Math.abs((en.x + en.width/2) - player.x) < (en.width/2 + 20) && Math.abs((en.y + en.height/2) - (player.y - 20)) < (en.height/2 + 20)) { 
            handlePlayerCrash(); 
            return; 
        }
        
        // 화면 밖으로 나갔을 때의 판정
        if (en.y > GAME_HEIGHT) { 
            lives--; 
            if (lives <= 0) { gameOver(); } else { triggerStageFail(); } 
            return; 
        }
    }
    
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i]; 
        b.y -= b.speed * dt;
        let bulletDestroyed = false; // [로건의 보너스] 총알이 삭제되었는지 기억하는 안전장치!
		
		// 💡 [추가] 총알과 광고판의 실시간 피격 충돌 연산 구역일세!
        for (let j = ads.length - 1; j >= 0; j--) {
            let ad = ads[j];
            
            // 광고판이 실체화 상태이고, 총알이 광고판의 사각형 영역 내부로 진입했는가?
            if (ad.isRealized && b.x > ad.x && b.x < ad.x + ad.width && b.y > ad.y && b.y < ad.y + ad.height) {
                
                // 관통 탄환 아이템 활성화 시 중복 피격 방지 명부 가동
                if (b.isPiercing && b.hitList.has(ad)) continue;
                if (b.isPiercing) b.hitList.add(ad);
                
                ad.hp -= 1; // 기획에 명시된 단 1발에 터지는 유리체력 HP 1 반영
                
                if (ad.hp <= 0) {
                    // 짜릿한 파괴 연출용 중형 폭발과 텍스트 생성
                    spawnExplosion(ad.x + ad.width / 2, ad.y + ad.height / 2, 'medium', "", 1, 1);
                    
                    // 🎲 네 가지 특수 아이템 풀(Pool)에서 완벽하게 무작위로 하나를 선택하네!
                    const itemPool = ['EASY_BUSY', 'HEAVY_ROTATION', 'TIME_STOP', 'PENETRATION'];
                    const chosenItem = itemPool[Math.floor(Math.random() * itemPool.length)];
                    
                    // 파괴된 광고판의 정중앙 좌표에서 특별 보급 상자 사출!
                    items.push({ 
                        type: 'special', 
                        val: chosenItem, 
                        x: ad.x + ad.width / 2, 
                        y: ad.y + ad.height / 2, 
                        speed: 150 
                    });
                    
                    // 화면 뒤에 오버레이되어 떠 있던 진짜 HTML 껍데기 엘리먼트 즉시 증발
                    if (ad.element) ad.element.remove();
                    
                    // 광고판 가방(배열)에서 완전히 제거
                    ads.splice(j, 1);
                }
                
                // 관통 탄환이 아닐 경우 총알을 즉시 소멸시키고 적 충돌 검사 패스
                if (!b.isPiercing) {
                    bullets.splice(i, 1);
                    bulletDestroyed = true;
                    break;
                }
            }
        }

        // 💡 [안전장치 추가] 총알이 광고판을 맞춰 이미 소멸했다면, 아래 적 충돌 검사는 건너뛰어야 하네!
        if (bulletDestroyed) continue;

        for (let j = enemies.length - 1; j >= 0; j--) {
            let en = enemies[j];
            
            // 1. 총알과 적의 기본 충돌 검사
            if (b.x > en.x - 5 && b.x < en.x + en.width + 5 && b.y > en.y && b.y < en.y + en.height) {
                
                // ▼▼▼ [NEW 1] 이미 때린 적은 명부(HitList)를 보고 무시! ▼▼▼
                if (b.isPiercing && b.hitList.has(en)) {
                    continue; 
                }

                // ▼▼▼ [NEW 2] 처음 때린 적이라면 명부에 바로 이름(en)을 적음! ▼▼▼
                if (b.isPiercing) {
                    b.hitList.add(en);
                }

                // (--- 이 아래는 기존 데미지 및 이펙트 로직 그대로! ---)
                let cleanExpr = b.text.replace(/×/g, '*').replace(/÷/g, '/');
                let dmg = 1; try { dmg = Math.floor(eval(cleanExpr)); } catch(e) {} if (dmg < 1) dmg = 1;
                let isCrit = (en.hp === dmg);
				
				// === [로건의 수술 1: 직격탄 방패 로직] ===
                if (en.isCriticalOnly && !isCrit) {
                    SoundManager.playBlockSound(); // 깡!
                    spawnExplosion(en.x + en.width/2, en.y + en.height/2, 'small', "BLOCK!", 0, 1);
                    
                    if (!b.isPiercing) {
                        bullets.splice(i, 1);
                        bulletDestroyed = true;
                    }
                    break; // 이번 총알은 이 적에게 막혔으므로 적 루프 종료
                }
				
                let tier = (en.hp - dmg <= 0) ? (isCrit ? 'critical' : 'medium') : 'small';
                let actualDmg = Math.min(en.hp, dmg);
                
                if (isCrit) {
					if (en.isBoss) {
						spawnDebris(en.x + en.width/2, en.y + en.height/2, en.hp);
					}
                }

                score += b.isEasyBusy ? 10 : dmg;
                spawnExplosion(en.x + en.width/2, en.y + en.height/2, tier, isCrit ? "CRITICAL!" : dmg, dmg, 2);
                en.hp -= dmg; 
                if (en.hp <= 0) {
                    if (en.dropItem) {
                        items.push({ 
                            type: 'special', val: en.dropItem, 
                            x: en.x + en.width / 2, y: en.y + en.height / 2, speed: 150 
                        });
                    }                           
                    enemies.splice(j, 1); 
                }
                // (--- 데미지 로직 끝 ---)

                // ▼▼▼ [NEW 3] 관통탄은 파괴되지 않고 뚫고 지나감! ▼▼▼
                if (!b.isPiercing) {
                    bullets.splice(i, 1); // 일반 총알만 여기서 터짐
                    bulletDestroyed = true; // 삭제되었다고 도장 쾅!
                    break; // 더 이상 다른 적을 검사할 필요 없으니 탈출
                }
            }
        }
        
        // ▼▼▼ [NEW 4] 화면 밖으로 나간 총알 삭제 (버그 픽스 포함) ▼▼▼
        // 이미 적을 때려서 삭제된 총알(bulletDestroyed)을 또 지우려다 에러가 나는 걸 방지!
        if (!bulletDestroyed && b.y < -100) {
            bullets.splice(i, 1);
        }
    }
    
	for (let i = particles.length - 1; i >= 0; i--) {
        // 💡 1. 변수 정의를 루프 입구 가장 첫 줄로 전진 배치 완료!
        let p = particles[i]; 
		
		// 🛸 [로건의 탈착 위성 물리 가드]: 화면 아래로 흐르는 중력 속도와 화면 이탈 자동 파쇄 회로
        if (p.type === 'vinyl_drop') {
            p.y += p.vy * dt;
            p.spinTime += dt;
            if (p.y > GAME_HEIGHT + 60) {
                particles.splice(i, 1);
                continue;
            }
        }
	
        p.life -= (p.decay || 1.0) * dt; 
        p.y += ENEMY_BASE_SPEED * dt;
        
        if (p.type === 'text') p.y += p.vy * dt;
        else if (p.type === 'spark') { p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.9; p.vy *= 0.9; }
        else if (p.type === 'shockwave' || p.type === 'shockwave_visual') {
            p.size += (p.maxSize - p.size) * 3 * dt;
            if (p.type === 'shockwave') {
                p.age += dt;
                if (p.age <= CHAIN_DMG_DURATION) {
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        let en = enemies[j]; if (en.y < 0 || en.y > GAME_HEIGHT) continue; if (p.hitList.includes(en)) continue;
                        let dist = Math.hypot((en.x + en.width/2) - p.x, (en.y + en.height/2) - p.y);
                        if (dist < p.size - 10) {
                            let isStrictCrit = (en.hp === p.damage); 
							
							// 적이 C타입인데 숫자가 딱 맞지 않으면 '깡-' 소리와 함께 무시!
                            if (en.isCriticalOnly && !isStrictCrit) {
                                SoundManager.playBlockSound(); // 깡!
                                spawnExplosion(en.x + en.width/2, en.y + en.height/2, 'small', "BLOCK!", 0, 1);
                                p.hitList.push(en); // 이번 충격파에는 이미 맞은 것으로 처리해서 중복 BLOCK 방지
                                continue; // 아래의 대미지 처리 로직을 건너뛰고 다음 적 검사로 넘어감
                            }
							let actualDmg = Math.min(en.hp, p.damage);
                            let addedScore = (activeItems.easyBusy > 0) ? 10 : (actualDmg * p.multiplier);
								score += addedScore; 
								en.hp -= p.damage; 
								p.hitList.push(en);
                            if (en.hp <= 0) {
                                if (isStrictCrit && en.isBoss) spawnDebris(en.x + en.width/2, en.y + en.height/2, p.damage);
								window.nextSoundType = p.inheritedSoundType;
								window.nextSoundBase = p.inheritedSoundBase;
                                spawnExplosion(en.x + en.width/2, en.y + en.height/2, isStrictCrit ? 'critical' : 'medium', isStrictCrit ? "CHAIN!" : p.damage, p.damage, p.multiplier + 1);
								if (en.dropItem) { items.push({ type: 'special', val: en.dropItem, x: en.x + en.width/2, y: en.y + en.height/2, speed: 150 }); }
                                enemies.splice(j, 1);
                            } else { spawnExplosion(en.x + en.width/2, en.y + en.height/2, 'small', p.damage, 1); }
                        }
                    }
                }
            }
        }
        if (p.life <= 0) particles.splice(i, 1);
    }
	
	if (gameState === 'PLAY') {
        // 현재 수식을 문자/기호 단위 토큰으로 정밀 분해하네. (예: "10+5" -> ["10", "+", "5"])
        const tokens = player.expr.match(/\d+|[+\-×÷]/g) || [];
        
        // 글자가 늘어나거나 줄어들면 꼬리 좌표 가방 크기도 동기화하네.
        if (tailPositions.length !== tokens.length) {
            if (tailPositions.length < tokens.length) {
                while (tailPositions.length < tokens.length) {
                    tailPositions.push({ x: player.x, y: player.y + 50 });
                }
            } else {
                tailPositions.splice(tokens.length);
            }
        }

        // 각 마디가 앞 단계를 부드럽게 추적하는 lerp(보간) 공식 발동!
        for (let i = 0; i < tokens.length; i++) {
            let targetX, targetY;
            
            if (i === 0) {
                // 첫 번째 마디는 비행기 바로 밑 45px 지점을 조준하네.
                targetX = player.x;
                targetY = player.y + 50;
            } else {
                // 두 번째 마디부터는 바로 앞 마디의 X좌표와, 앞 마디의 Y에서 30px 더 아래 지점을 조준하네!
                targetX = tailPositions[i - 1].x;
                targetY = tailPositions[i - 1].y + 20;
            }

            // 텔레포트하지 않고 dt 속도에 맞춰 스르륵 미끄러지듯 따라오게 만드는 전술 보간 공식
            tailPositions[i].x += (targetX - tailPositions[i].x) * 15 * dt;
            tailPositions[i].y += (targetY - tailPositions[i].y) * 15 * dt;
        }
    }
	
	// ==========================================
    // 🛸 [2단계] HOLD ON, I'M COMING 지원사격 타임라인 업데이트
    // ==========================================
    for (let i = supportBeams.length - 1; i >= 0; i--) {
        let beam = supportBeams[i];
        beam.elapsed += dt;

        // 💡 뱃속의 데이터를 꺼내 누적 타임라인 임계점 계산
        let t1 = beam.previewDur;
        let t2 = t1 + beam.activeDur;
        let t3 = t2 + beam.fadeDur;

        if (beam.elapsed < t1) {
            beam.state = 'PREVIEW';
        } else if (beam.elapsed < t2) {
            beam.state = 'ACTIVE';

            if (!beam.hasFired) {
                let fireText = beam.text || "1"; 
                bullets.push({
                    x: beam.x,
                    y: GAME_HEIGHT,
                    text: fireText,
                    speed: 3500,    
                    isPiercing: true,
                    isSupport: true, 
                    hitList: new Set()
                });
                beam.hasFired = true; 	
                SoundManager.playBassExplosion(-1); 
            }
        } else if (beam.elapsed < t3) {
            beam.state = 'FADE';
        } else {
            supportBeams.splice(i, 1);
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);   
	drawStars();
    
	// 🎰 [로건의 SF 플로팅 글래스 패널 스코어 디스플레이]
	if (gameState === 'SCORE_DISPLAY') {
	
	// 💀 [상단 빈 영역 - GAME OVER 타이틀]: 눈부신 백색 발광 효과 장착!
        ctx.save();
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur = 15;
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 100px "Neo Dunggeunmo"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText("GAME OVER", GAME_WIDTH / 2, 200); // 👈 기존 요소들과 겹치지 않는 Y축 200 고도에 정밀 배치!
        ctx.restore();
	       
		// 📐 1. [유리 패널 설계 명세]
		// 600x1000 화면 정중앙에 480x320 크기의 SF 터미널 패널을 띄우네!
		const pw = 480, ph = 320;
		const px = (GAME_WIDTH - pw) / 2;     // X좌표: 60
		const py = (GAME_HEIGHT - ph) / 2;    // Y좌표: 340
		const radius = 16;                     // 모서리 둥글기 수치

		// 🌌 2. [패널 배경]: 반투명 장막으로 글자 가독성을 사수
		// 이 영역 뒤로 지나가는 별들은 은은하게 어두워지며 우아한 심도(Depth)를 형성하지.
		ctx.beginPath();
		ctx.roundRect(px, py, pw, ph, radius);
		ctx.fillStyle = 'rgba(10, 10, 10, 0.5)';
		ctx.fill();

		// 🔩 3. [패널 외곽 더블 베젤 프레임]: SF 콘솔 느낌을 주는 정밀 메카닉 라인 가동!
		// 바깥쪽의 선명한 30% 백색 아웃라인
		ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
		ctx.lineWidth = 2;
		ctx.stroke();

		// 안쪽 미세 오프셋(6px)의 차분한 8% 투명 섀도우 베젤
		ctx.beginPath();
		ctx.roundRect(px + 6, py + 6, pw - 12, ph - 12, radius - 4);
		ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
		ctx.lineWidth = 1;
		ctx.stroke();

		// 📐 4. [모퉁이 L자 브래킷 장식]: 군용 하드웨어 느낌을 내기 위한 코너 브래킷 가이드라인 투사
		ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
		ctx.lineWidth = 2;
		const bLen = 12; // 브래킷 꺾쇠 길이

		// 좌상단
		ctx.beginPath(); ctx.moveTo(px + bLen, py); ctx.lineTo(px, py); ctx.lineTo(px, py + bLen); ctx.stroke();
		// 우상단
		ctx.beginPath(); ctx.moveTo(px + pw - bLen, py); ctx.lineTo(px + pw, py); ctx.lineTo(px + pw, py + bLen); ctx.stroke();
		// 좌하단
		ctx.beginPath(); ctx.moveTo(px, py + ph - bLen); ctx.lineTo(px, py + ph); ctx.lineTo(px + bLen, py + ph); ctx.stroke();
		// 우하단
		ctx.beginPath(); ctx.moveTo(px + pw - bLen, py + ph); ctx.lineTo(px + pw, py + ph); ctx.lineTo(px + pw, py + ph - bLen); ctx.stroke();

		// 🏆 6. "YOUR SCORE" 타이틀 각인
		ctx.fillStyle = '#888888';
		ctx.font = '42px "Neo Dunggeunmo"';
		ctx.textAlign = 'center';
		ctx.textBaseline = 'middle';
		ctx.fillText("YOUR SCORE", GAME_WIDTH / 2, GAME_HEIGHT / 2 - 40); // 웅장한 가로 세로 정중앙 상단 이격!

		// 💎 7. 점수 수치 렌더링 (백색 발광 아웃라인 네온 가공)
		ctx.save();
		ctx.shadowColor = '#ffffff';
		ctx.shadowBlur = 15;
		ctx.fillStyle = '#ffffff';
		ctx.font = '72px "Neo Dunggeunmo"';
		ctx.textAlign = 'center';
		ctx.textBaseline = 'middle';
		ctx.fillText(displayedScore.toLocaleString(), GAME_WIDTH / 2, GAME_HEIGHT / 2 + 30); // 하단 이격 배치
		ctx.restore();

		// =================================================================
		// 📡 [정밀 조율 V2]: 점수 롤업 정착 후 조건부 하단 메시지 뿜어내기 (PLAY AGAIN 점멸 제거 및 48px 확대 버전)
		// =================================================================
		let progress = scoreRollTimer / scoreRollDuration;
		if (progress >= 1.0) {
			ctx.save();
			
			if (isPlayerRanked) {
				// 🏆 [랭킹 진입 성공]: 자네가 설계한 3회 정밀 점멸 후 완전히 켜지는 영광의 이중 시퀀스 가동!
				let showText = true;
				if (scoreDisplayHoldTimer < 4) {
					// ⏱️ 꺼진 상태로 시작해 정확히 3회 째깍이는 자네의 전술 공식 완벽 계승!
					showText = Math.floor(scoreDisplayHoldTimer * 1.5) % 2 === 1;
				}

				if (showText) {
					// 👑 [흑백 왕관 연산 필터]: 자네가 조율한 28px 규격으로 시크하게 각인!
					ctx.save();
					ctx.filter = 'grayscale(100%)'; 
					ctx.fillStyle = '#ffffff';
					ctx.font = '28px "Neo Dunggeunmo"';
					ctx.textAlign = 'center';
					ctx.textBaseline = 'middle';
					ctx.fillText("👑👑👑 CONGRATULATION! 👑👑👑", GAME_WIDTH / 2, 790);
					ctx.restore();

					// YOU'RE RANKED! 메인 네온 싸인 각인 (자네가 조율한 40px 명품 규격 보존!)
					ctx.save();
					ctx.shadowColor = '#ffffff';
					ctx.shadowBlur = 15;
					ctx.fillStyle = '#ffffff';
					ctx.font = 'bold 40px "Neo Dunggeunmo"';
					ctx.textAlign = 'center';
					ctx.textBaseline = 'middle';
					ctx.fillText("YOU'RE RANKED!", GAME_WIDTH / 2, 850);
					ctx.restore();
				}
			} else {
				// 💀 [랭킹 진입 실패]: 깜빡임 조건문(showText)을 완전히 우회하여, 점수가 도킹하는 즉시 불빛이 고정 점등되네!
				ctx.save();
				ctx.shadowColor = '#cccccc';
				ctx.shadowBlur = 15;
				ctx.fillStyle = '#eeeeee';
								
				ctx.font = 'bold 60px "Neo Dunggeunmo"'; 
				ctx.textAlign = 'center';
				ctx.textBaseline = 'middle';
				ctx.fillText("PLAY AGAIN", GAME_WIDTH / 2, 820);
				ctx.restore();
			}
			
			ctx.restore();
		}
		
		// 🔳 9. [가장자리 보더라인 복구]: 탈출 직전 캔버스 외곽에 묵직한 베젤을 둘러 완결성을 고정하네!
		ctx.strokeStyle = '#333';
		ctx.lineWidth = 2;
		ctx.strokeRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

		ctx.restore();
		return; // 조기 탈출 가드로 아래쪽 플레이 렌더링 봉쇄!
	}
	
	// 🛸 [로건의 타이틀 전용 다층 타원형 부유 엔진 (Parallax Ellipse Floating)]
        if (gameState === 'START' || gameState === 'TITLEWARP') { // 🛠️ 가드 전면 개방!
            let t = performance.now() * 0.001; 
            let baseY = 280; 

            // 🔢 [마스터 전역 변환 매트릭스 - 1단계 세이브]
            ctx.save();
            if (gameState === 'TITLEWARP') {
                let zoomScale = 1.0;
                let alpha = 1.0;
                
                if (titleWarpTimer < 1.2) {
                    // ⏱️ 구간 1 (0초~1.2초): 0.4 배율로 완만하고 느리게 가속 확대
                    zoomScale = 1.0 + Math.pow(titleWarpTimer, 2) * 0.4; 
                    alpha = 1.0;
                } else if (titleWarpTimer <= 2.0) {
                    // ⏱️ 구간 2 (1.2초~2.0초): 초고속 가속 돌입
                    let dt = titleWarpTimer - 1.2; 
                    zoomScale = 1.576 + (dt * 30.0);        
                    alpha = 1.0; // 🛠️ 지휘관의 명령: 1.2초 이후 흐려짐 없이 선명도 100% 사수!
                } else {
                    alpha = 0.0; // 2초 정각 완전 소멸
                }
                
                // 소실점 중심축(300, 650) 마스터 매트릭스 변환 가동
                ctx.translate(GAME_WIDTH / 2, 650);
                ctx.scale(zoomScale, zoomScale);
                ctx.translate(-GAME_WIDTH / 2, -650);
                ctx.globalAlpha = alpha; 
            }

            // 💡 층 3: Far 레이어 (지휘관의 명령: 0.8배로 아스라이 축수하여 원경 락온!)

						}
					}

					// 🛸 [로건의 순정 흑백 고대비 프로토콜]: 유색 코드를 전면 배제하고 오직 글자(알파벳)로만 시인성을 극대화하네!
					ctx.beginPath();
					ctx.arc(0, 0, 15, 0, Math.PI * 2); // 반지름 15px의 선명한 정원
					
					// 바탕은 언제나 균일한 밝은 회색(#cccccc)으로 밀어버리네!
					ctx.fillStyle = '#cccccc'; 
					ctx.fill();
					
					ctx.strokeStyle = '#000000';
					ctx.lineWidth = 2;
					ctx.stroke();

					let rawKey = buff.key ? String(buff.key).trim() : '?';
					let shortcutLetter = rawKey.charAt(0).toUpperCase();

					// 중앙 알파벳 각인 (선명한 흑색)
					ctx.fillStyle = '#000000';
					ctx.font = 'bold 24px "Neo Dunggeunmo"';
					ctx.textAlign = 'center';
					ctx.textBaseline = 'middle';
					
					ctx.shadowColor = 'transparent';
					ctx.shadowBlur = 0;

					let xOffset = 0.5;
					let yOffset = 1.5;

					// 기존 0, 0 지점에서 보정치(Offset)를 더해 최종 렌더링!
					ctx.fillText(shortcutLetter, 0 + xOffset, 0 + yOffset);

					ctx.restore();
				});
				
				
				

                ctx.imageSmoothingEnabled = prevSmoothing;
            }
        }
		
        particles.forEach(p => { 
            ctx.save(); 
            ctx.globalAlpha = p.life; 
            
            if (p.type === 'text') { 
                ctx.translate(p.x, p.y); 
                ctx.fillStyle = p.color; 
                ctx.font = (p.isCritical?'bold 40px':'30px') + ' "Neo Dunggeunmo"'; 
                ctx.textAlign = 'center'; 
                ctx.fillText(p.text, 0, 0); 
            } else if (p.type === 'spark') { 
                ctx.fillStyle = p.color; 
                ctx.beginPath(); 
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2); 
                ctx.fill(); 
            } else if (p.type === 'shockwave' || p.type === 'shockwave_visual') { 
                ctx.strokeStyle = p.color; 
                ctx.lineWidth = 5 * p.life; 
                ctx.beginPath(); 
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); 
                ctx.stroke(); 
            } 
            // =======================================================
            // 💿 [로건의 3구역 저격 패치]: 만료된 위성이 탈착되어 3D 자전하며 떨어지네!
            // =======================================================
            else if (p.type === 'vinyl_drop') {
                ctx.globalAlpha = 0.8; // 지휘관의 0.8 알파 가드 준수
                let scaleX = Math.sin(p.spinTime * 8); // 뒤집히는 자전 주파수
                
                const prevSmoothing = ctx.imageSmoothingEnabled;
                ctx.imageSmoothingEnabled = false;
                
                ctx.translate(p.x, p.y);
                ctx.scale(scaleX, 1.0); // 가로축을 비틀어 동전 회전 착시 형성
                
                if (p.img && p.img.complete && p.img.naturalWidth !== 0) {
                    ctx.drawImage(p.img, -24, -24, 48, 48); // 48x48 규격 안착
                }
                ctx.imageSmoothingEnabled = prevSmoothing;
            }
            
            ctx.restore(); 
        });
		
        ctx.restore();

		if (gameState === 'PAUSE') {
			ctx.save();
			ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; 
			ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

			ctx.fillStyle = '#cccccc'; 
			ctx.textAlign = 'center';
			ctx.textBaseline = 'middle';

			// 🛸 4000ms(4초) 주기의 정밀 타임라인 모듈(Timeline module)
			let pauseTimer = Date.now() % 4000;

			if (pauseTimer < 1500) {
				// 0 ~ 1.5초 구간: PAUSE 노출
				ctx.font = '60px "Neo Dunggeunmo"';
				ctx.fillText("PAUSE", GAME_WIDTH / 2, GAME_HEIGHT / 2);
			} else if (pauseTimer >= 1500 && pauseTimer < 2000) {
				// 1.5 ~ 2.0초 구간: 0.5초간 공백(Blank)
			} else if (pauseTimer >= 2000 && pauseTimer < 3500) {
				// 2.0 ~ 3.5초 구간: RESUME 가이드 노출
				ctx.font = '40px "Neo Dunggeunmo"';
				ctx.fillText("TAP SCREEN TO RESUME", GAME_WIDTH / 2, GAME_HEIGHT / 2);
			} else {
				// 3.5 ~ 4.0초 구간: 0.5초간 공백(Blank)
			}
			
			ctx.restore();
		}		
    }
	
	// === [인게임 광고 구현 STEP 4] 캔버스 위에 HTML GIF 광고판 동기화 렌더링 ===
    // 1. 현재 브라우저 화면에 떠 있는 모든 광고 DOM 요소에 '미확인' 임시 표식을 남기네.
    const existingAdElements = document.querySelectorAll('.ingame-ad');
    existingAdElements.forEach(el => el.dataset.verified = "false");

    // 현재 브라우저 창에서 캔버스가 정중앙 어디에 위치해 있는지 실제 스크린 좌표를 계산하네.
    const canvasRect = canvas.getBoundingClientRect();

    // 2. 현재 활성화된 ads 배열을 순회하며 HTML 엘리먼트를 매핑하고 좌표를 동기화하네.
    ads.forEach(ad => {
        // 아직 DOM 엘리먼트가 생성되지 않았다면 최초 1회만 생성하네 (GIF 연속 재생 유지 목적)
        if (!ad.element) {
            const img = document.createElement('img');
            img.src = ad.imgSrc;
            img.className = 'ingame-ad';
            img.style.position = 'absolute';
            img.style.width = ad.width + 'px';
            img.style.height = ad.height + 'px';
            img.style.pointerEvents = 'none'; // 💡 유저의 마우스 클릭이나 조작을 방해하지 않게 차단하네.
			img.style.border = '2px solid #aaa';
            img.style.boxSizing = 'border-box';
            img.style.zIndex = '-1';          // 💡 캔버스 뒷면(배경)으로 배치하네.
            document.body.appendChild(img);
            ad.element = img;
        }

        // 실시간 좌표 매핑 (브라우저 절대 좌표 = 캔버스 시작점 + 게임 내부 좌표)
		ad.element.style.left = (canvasRect.left + ad.x * scale) + 'px';
        ad.element.style.top = (canvasRect.top + ad.y * scale) + 'px';
        ad.element.style.width = (ad.width * scale) + 'px';
        ad.element.style.height = (ad.height * scale) + 'px';

        // 💡 기획 2번 규칙 시각화: Y고도 100 미만인 안전 진입 단계(유령 상태)일 때는 반투명, 실체화 후엔 선명하게!
        ad.element.style.opacity = ad.isRealized ? '1.0' : '0.4';

        // 확인 도장 쾅! (배열에 살아있는 녀석임을 증명)
        ad.element.dataset.verified = "true";
    });

    // 3. 전 단계(STEP 3)에서 화면을 탈출해 배열에서 삭제된 광고판들의 찌꺼기 DOM 요소들을 깨끗하게 청소하네.
    existingAdElements.forEach(el => {
        if (el.dataset.verified === "false") {
            el.remove();
        }
    });
	
}
function gameLoop(currentTime) {
    const dt = (currentTime - lastTime) / 1000;
    lastTime = currentTime;
    if (dt < 0.1) { update(dt * TIME_SCALE); } 
    draw(); 
    requestAnimationFrame(gameLoop);
}

lastTime = performance.now();

// =================================================================
// 🚀 [인터셉트] 시작하자마자 타이틀을 찢고 지정된 티어의 스크롤 전선으로 즉시 사출!
// =================================================================
// 🛠️ 버추얼키보드
function initVirtualKeyboard() {
    // 내부에서만 쓰는 지역 변수들
    const rows = [
        ["!", "1", "2", "3", "4", "5", "6", "7", "8", "9", "0"],
        ["Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P", "⌫"],
        ["A", "S", "D", "F", "G", "H", "J", "K", "L", { char: "OK", span: 2 }],
        ["Z", "X", "C", "V", "B", "N", "M", { char: "SPACE", span: 4 }]
    ];

    const startX = 17;     
    const startY = 754;     
    const keyW = 46;        
    const keyH = 50;        
    const gap = 6;          

    virtualKeys = []; // 상단에 선언해 둔 전역 배열에 데이터를 채워 넣음

    for (let r = 0; r < rows.length; r++) {
        let colIndex = 0;
        const rowData = rows[r];
        for (let i = 0; i < rowData.length; i++) {
            const item = rowData[i];
            let char = typeof item === 'string' ? item : item.char;
            let span = typeof item === 'string' ? 1 : item.span;

            let width = span * keyW + (span - 1) * gap;
            let x = startX + colIndex * (keyW + gap);
            let y = startY + r * (keyH + gap);

			virtualKeys.push({
				char: char,
				x: x,
				targetY: y,
				currentY: y,
				width: width,
				height: keyH,
				isRespawning: false,
				respawnTimer: 0 // 💥 [신규] 폭발 연출 대기 타이머
			});

            colIndex += span;
        }
    }
}

// =================================================================
// ⌨️ [MSTE v10.0] 가상 키보드 터치 폭발 & Y축 사출 연출
// =================================================================
function handleVirtualKeyPress(mx, my) {
    for (let key of virtualKeys) {
        if (mx >= key.x && mx <= key.x + key.width &&
            my >= key.currentY && my <= key.currentY + key.height) {
            
            // 🚫 이미 터져서 떨어지는 중이거나 대기 중인 키는 무시
            if (key.isRespawning) return;

            // 💥 1. 적 폭발 이펙트 & 베이스 효과음 격발
            const centerX = key.x + key.width / 2;
            const centerY = key.currentY + key.height / 2;
            spawnExplosion(centerX, centerY, 'medium', "", 1, 1);
            
            if (typeof SoundManager !== 'undefined' && SoundManager.playBassExplosion) {
                SoundManager.playBassExplosion(0);
            }

            // 🚀 2. 키 숨김 및 폭발 대기 세팅 (0.25초 후 상단에서 낙하 시작)
            key.isRespawning = true;
            key.respawnTimer = 0.25; 
            key.currentY = key.targetY - 80; // 상단 사출 위치

            // ⌨️ 3. 입력 로직
            if (key.char === '⌫') {
                if (currentInputName.length > 0) {
                    currentInputName = currentInputName.slice(0, -1);
                }
            } else if (key.char === 'OK') {
                initialsField.value = currentInputName;
                submitBtn.click();
            } else {
                if (currentInputName.length < 15) {
                    if (key.char === 'SPACE') {
                        currentInputName += " ";
                    } else {
                        currentInputName += key.char;
                    }
                }
            }
            SoundManager.playBlockSound();
            break;
        }
    }
}

requestAnimationFrame(gameLoop);

    }
    
    return cc;
