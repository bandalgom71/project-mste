// 💾 [로건의 암호화 세이브 시스템]: 유저 조작을 원천 차단하는 이중 방벽 금고일세.
const SaveSystem = {
    SECRET_KEY: 119, // 수식 치트를 방어하기 위한 비밀 XOR 오차 키라네.
    
    // 데이터를 안전하게 꾸워내어 로컬 스토리지에 박는 함수
    save: function(level, score, lives) {
        try {
            const dataObj = { lvl: level, scr: score, lvs: lives };
            const jsonStr = JSON.stringify(dataObj);
            
            // 1차 암호화: 글자 주파수를 비밀 키로 비틀어버리네.
            let xorStr = "";
            for (let i = 0; i < jsonStr.length; i++) {
                xorStr += String.fromCharCode(jsonStr.charCodeAt(i) ^ this.SECRET_KEY);
            }
            // 2차 암호화: 브라우저가 직접 읽지 못하게 Base64 문자로 인코딩 가동!
            const encData = btoa(encodeURIComponent(xorStr));
            localStorage.setItem('mste_sys_save', encData);
            console.log("🛠️ [관제탑] 전장 상태 암호화 세이브 완료.");
        } catch(e) { console.error("세이브 오류:", e); }
    },

    // 외계어로 짜인 금고를 다시 해독하는 함수
    load: function() {
        try {
            const encData = localStorage.getItem('mste_sys_save');
            if (!encData) return null;
            
            // 역순으로 복호화 알고리즘 가동
            const xorStr = decodeURIComponent(atob(encData));
            let jsonStr = "";
            for (let i = 0; i < xorStr.length; i++) {
                jsonStr += String.fromCharCode(xorStr.charCodeAt(i) ^ this.SECRET_KEY);
            }
            return JSON.parse(jsonStr);
        } catch(e) {
            console.error("복호화 에러 (조작 흔적 감지):", e);
            this.clear(); // 강제 변조 흔적이 있다면 금고를 파쇄해 버리네!
            return null;
        }
    },

    // 금고 영구 파쇄 함수 (게임오버 시 사용)
    clear: function() {

    }
};

// --- AUDIO SYSTEM ---
const SoundManager = {
    ctx: null, 
    currentBgm: null, 
    staticNode: null, 
    staticGain: null, 
    masterGain: null, 
    isMuted: false,
    tracks: ['test_bgm_01.mp3', 'test_bgm_02.mp3', 'test_bgm_03.mp3', 'test_bgm_04.mp3'],
    
    // 🎯 [로건의 수술 1]: 에이스 샘플 bass2(메가), bass3(일반/체인) 서랍장 장착
    bassBuffer2: null, 
    bassBuffer3: null, 

    init: function() {
        if (this.ctx) return;
        window.AudioContext = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AudioContext();
        this.masterGain = this.ctx.createGain();
        this.masterGain.connect(this.ctx.destination);
        
        if (this.ctx.state === 'suspended') {
            this.ctx.resume();
        }
        try {
            const dummyOsc = this.ctx.createOscillator();
            const dummyGain = this.ctx.createGain();
            dummyGain.gain.setValueAtTime(0, this.ctx.currentTime); 
            dummyOsc.connect(dummyGain);
            dummyGain.connect(this.ctx.destination);
            dummyOsc.start(0);
            dummyOsc.stop(0.01); 
        } catch(e) {
            console.log("AudioContext Safari warm-up bypass", e);
        }

        this.createRadioStatic();
        
        if (!this.currentBgm) {
            this.currentBgm = new Audio();
            this.currentBgm.play().catch(() => {});
        }

        // 🎯 [로건의 수술 2]: 게임 기동 즉시 두 샘플을 비동기로 동시 적재하네!
        this.loadBassSamples();
    },
    
    // 🎯 두 개의 에이스 샘플을 병렬로 긁어오는 프로토콜
	loadBassSamples: function() {
        const self = this;
        
        // bass1.wav (단정하고 깔끔한 맛)
        fetch('assets/bass1.wav')
            .then(response => response.arrayBuffer())
            .then(arrayBuffer => self.ctx.decodeAudioData(arrayBuffer))
            .then(audioBuffer => {
                // 기존에 선언되어 있던 this.bassBuffer1 서랍을 그대로 활용하네.
                self.bassBuffer1 = audioBuffer;
                console.log("🛠️ [관제탑] 베이스 1호(bass1.wav) 버퍼 적재 완료!");
            })
            .catch(e => console.error("bass1 로드 실패:", e));

        // bass2.wav (메가/치트 폭탄용 웅장한 아날로그 둥~)
        fetch('assets/bass2.wav')
            .then(response => response.arrayBuffer())
            .then(arrayBuffer => self.ctx.decodeAudioData(arrayBuffer))
            .then(audioBuffer => {
                self.bassBuffer2 = audioBuffer;
                console.log("🛠️ [관제탑] 메가 베이스(bass2.wav) 버퍼 적재 완료!");
            })
            .catch(e => console.error("bass2 로드 실패:", e));

        // bass3.wav (일반/연쇄용 선명한 모범생 둥~)
        fetch('assets/bass3.wav')
            .then(response => response.arrayBuffer())
            .then(arrayBuffer => self.ctx.decodeAudioData(arrayBuffer))
            .then(audioBuffer => {
                self.bassBuffer3 = audioBuffer;
                console.log("🛠️ [관제탑] 일반 베이스(bass3.wav) 버퍼 적재 완료!");
            })
            .catch(e => console.error("bass3 로드 실패:", e));
    },

    resume: function() {
        if (this.ctx && this.ctx.state === 'suspended') {
            this.ctx.resume();
            try {
                const osc = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                g.gain.setValueAtTime(0, this.ctx.currentTime);
                osc.connect(g); g.connect(this.ctx.destination);
                osc.start(0); osc.stop(0.01);
            } catch(e){}
        }
    },
	
    createRadioStatic: function() {
        if (!this.ctx) return;
        const bufferSize = 2 * this.ctx.sampleRate; 
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.2; 
        this.staticNode = this.ctx.createBufferSource();
        this.staticNode.buffer = buffer;
        this.staticNode.loop = true;
        this.staticGain = this.ctx.createGain();
        this.staticGain.gain.value = 0.03; 
        this.staticNode.connect(this.staticGain);
        this.staticGain.connect(this.masterGain); 
        this.staticNode.start();
    },
    
    playRandomBGM: function() {
        if (!this.currentBgm) this.currentBgm = new Audio();
        this.currentBgm.pause();
        const idx = Math.floor(Math.random() * this.tracks.length);
        this.currentBgm.src = this.tracks[idx]; 
        this.currentBgm.loop = true;
        this.currentBgm.volume = 0.5; 
        this.currentBgm.play().catch(e => console.log("BGM wait", e));
    },
    
    stopBGM: function() { 
        if (this.currentBgm) this.currentBgm.pause(); 
    },
	
    playSpecificBGM: function(filename) {
        if (!this.currentBgm) this.currentBgm = new Audio();
        this.currentBgm.pause();
        this.currentBgm.src = filename; 
        this.currentBgm.loop = true;
        this.currentBgm.volume = 0.5; 
        this.currentBgm.play().catch(e => console.log("BGM wait", e));
    },
	
	// 🎯 [버그 수정]: 첫 타격에서 고정된 무기와 피치 톤을 연쇄 끝까지 완벽하게 유지하는 코드
    playBassExplosion: function(chainCount = 0, forcedType = null, forcedBase = null) {
        if (!this.ctx || this.isMuted) return;
        try {
            const now = this.ctx.currentTime;
            const source = this.ctx.createBufferSource();
            const gain = this.ctx.createGain();

            let targetBuffer = null;
            let rateMultiplier = 1.0;

            if (chainCount === -1) { 
                if (!this.bassBuffer2) return;
                targetBuffer = this.bassBuffer2;
                rateMultiplier = 1.0; 
            } else {
                // 🎯 [유전자 판별]: 외부에서 "이 무기로 고정해!"라고 넘겨주면(연쇄 중일 때) 주사위를 굴리지 않고 그대로 복종하네!
                let finalType = forcedType;
                let finalBase = forcedBase;

                // 만약 단발성이라 지정된 게 없다면 여기서 새로 주사위를 굴리네.
				if (!finalType) {
                    // 🎲 [자네의 기획]: 33.3% 확률로 3가지 샘플 중 하나를 완전히 무작위 셔플링!
                    const dice = Math.random();
                    if (dice < 0.33) {
                        finalType = 'bass1';
                    } else if (dice < 0.66) {
                        finalType = 'bass2';
                    } else {
                        finalType = 'bass3';
                    }
                    
                    finalBase = 0.90 + (Math.random() * 0.20);
                }

                if (finalType === 'bass1') {
                    targetBuffer = this.bassBuffer1;
                } else if (finalType === 'bass2') {
                    targetBuffer = this.bassBuffer2;
                } else {
                    targetBuffer = this.bassBuffer3;
                }
				
                if (!targetBuffer) return;

                if (chainCount > 1) {
                    // 🔥 [연쇄 폭발]: 첫 발 쏠 때 고정된 시작음(finalBase)을 그대로 기둥으로 삼고, 
                    // 그 위로 자네의 12음계 수식 계단만 깔끔하고 선명하게 쌓아 올리네! (들쑥날쑥 현상 완벽 소멸)
                    rateMultiplier = finalBase * Math.pow(1.05946, (chainCount - 1) % 12);
                } else {
                    // 일반 단발성 폭발은 고정된 변주 피치 그대로 발사!
                    rateMultiplier = finalBase;
                }
            }

            source.buffer = targetBuffer;
            source.playbackRate.setValueAtTime(rateMultiplier, now);

            const sampleDuration = targetBuffer.duration / rateMultiplier;
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.95, now + 0.01); 
            gain.gain.exponentialRampToValueAtTime(0.001, now + sampleDuration);

            source.connect(gain);
            gain.connect(this.masterGain);

            source.start(now);
            source.stop(now + sampleDuration + 0.05); 
            
            console.log(`[연쇄 동기화 폭발] 샘플: ${targetBuffer === this.bassBuffer2 ? 'bass2' : 'bass3'}, 체인: ${chainCount}, 최종배율: ${rateMultiplier.toFixed(3)}`);
        } catch(e) {
            console.error("오디오 출력 오류:", e);
        }
    },
	
    playBlockSound: function() {
        if (!this.ctx || this.isMuted) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'square'; 
        osc.frequency.setValueAtTime(1200, now); 
        osc.frequency.exponentialRampToValueAtTime(440, now + 0.1); 
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start(now);
        osc.stop(now + 0.1);
    },
    
    playItemGet: function(type) {
        if (!this.ctx || this.isMuted) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        if (type === 'num') { 
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(880, now); 
            gain.gain.setValueAtTime(0.2, now); 
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1); 
        } else { 
            osc.type = 'square'; 
            osc.frequency.setValueAtTime(440, now); 
            osc.frequency.linearRampToValueAtTime(880, now + 0.05); 
            gain.gain.setValueAtTime(0.1, now); 
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1); 
        }
        osc.connect(gain); gain.connect(this.masterGain);
        osc.start(now); osc.stop(now + 0.1);
    }
};

// --- VISUALS ---
const stars = [];
function initStars() { for (let i = 0; i < 100; i++) stars.push({ x: Math.random() * GAME_WIDTH, y: Math.random() * GAME_HEIGHT, size: Math.random() * 1.5 + 0.5, speed: Math.random() * 50 + 20, alpha: Math.random() * 0.5 + 0.3 }); }
function updateStars(dt) {     
    if (activeItems && activeItems.timeStop > 0) return; 

    // (타임스톱이 아닐 때만 아래 코드가 실행되어 별이 움직이네)
    stars.forEach(s => { 
        s.y += s.speed * dt; 
        if (s.y > GAME_HEIGHT) { s.y = 0; s.x = Math.random() * GAME_WIDTH; } 
    }); 
}

function drawStars() { 
    ctx.save(); 
    stars.forEach(s => { 
        ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`; 
        ctx.strokeStyle = `rgba(255, 255, 255, ${s.alpha * 0.5})`;

        ctx.beginPath();
        if (gameState === 'WARP') {
            // 🎯 [워프 스타라인]: '흑백 미학' 준수! 별의 현재 위치에서 위쪽으로 길게 뻗은 연회색 선을 그리네!
            ctx.lineWidth = s.size * 1.5;
            ctx.moveTo(s.x, s.y);
            ctx.lineTo(s.x, s.y - (s.speed * 0.08)); // 속도에 비례해서 광선이 길어지네.
            ctx.stroke();
        } else {
            // 순정 상태일 때는 원래대로 이쁜 원형 점으로 렌더링하네.
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fill(); 
        }
    }); 
    ctx.restore(); 
}

let globalScores = [];
let isFetching = false; // [로건의 안전장치] 혹시 모를 Reference Error 방지용
function fetchGlobalScores() { 
    isFetching = true; 
    fetch(SERVER_URL)
        .then(r => r.json())
        .then(d => { 
            let tempList = [];
            // 파이어베이스에서 받은 객체 데이터들을 자바스크립트 배열로 정제하네!
            if (d && typeof d === 'object') {
                Object.keys(d).forEach(key => {
                    if (d[key] && d[key].name && d[key].score !== undefined) {
                        tempList.push({ name: d[key].name, score: d[key].score });
                    }
                });
            }
            // 점수가 높은 순(내림차순)으로 칼같이 정렬하여 상위 20개만 슬라이스!
            tempList.sort((a, b) => b.score - a.score);
            globalScores = tempList.slice(0, 20);
            isFetching = false; 
        })
        .catch(e => { 
            console.log("DB Fetch Error:", e);
            isFetching = false; 
        }); 
}

function sendGlobalScore(name, finalScore) { 
    gameState = 'UPLOADING'; 
    highscoreInput.classList.add('hidden'); 
    
    // 파이어베이스 서버로 이름과 점수를 즉각 POST 발사!
    fetch(SERVER_URL, { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, score: finalScore }) 
    })
    .then(r => r.json())
    .then(() => { 
        // 업로드가 끝나면 즉시 랭킹을 새로 읽어오고 랭킹 스크린 로드!
        fetchGlobalScores(); 
        setTimeout(showLeaderboard, 500); // 응답이 워낙 빨라 대기시간을 0.5초로 단축했네!
    })
    .catch((e) => { 
        console.log("DB Send Error:", e);
        setTimeout(showLeaderboard, 500); 
    }); 
}

function checkIsHighScore(finalScore) { if (globalScores.length < 20) return true; return finalScore > globalScores[globalScores.length - 1].score; }

// --- LOGIC ---
function generateLevel(levelNum) {
    let spawnList = [];
    if (typeof STAGE_DATA === 'undefined') return [];
    const stageConfig = STAGE_DATA[levelNum - 1];
    if (!stageConfig) return []; 
    
    if (stageConfig.spawnList) {
        stageConfig.spawnList.forEach(unit => {
            const t = unit.row * ROW_TIME + START_DELAY;
            
            // 1순위: 'type'이 있는 명령어(ITEM 등)를 먼저 체크!
            if (unit.type) {
                spawnList.push({ 
                    time: t, 
                    type: unit.type, 
                    val: unit.val, 
                    text: unit.text, 
                    duration: unit.duration,
                    col: unit.col // 아이템 위치를 위해 col도 같이 저장
                });
            }             	
			// 2순위: type이 없을 때만 '적'으로 생성
            else if (unit.col) {
                const cellWidth = GAME_WIDTH / 7;
                const px = (unit.col - 0.5) * cellWidth;
                // [수정] isCriticalOnly 속성을 데이터에서 가져와 저장하네!
                spawnList.push({ 
                    time: t, 
                    x: px, 
                    hp: unit.hp, 
                    isBoss: unit.isBoss || false,
                    isCriticalOnly: unit.isCriticalOnly || false // 이 줄을 추가하게
                });
            }			
        });
    }
    
	spawnList.sort((a, b) => {
        if (a.time !== b.time) return a.time - b.time;
        // [로건의 팁] 같은 시간(Row)일 경우, 이벤트(type)가 배열의 뒤로 가게 하여
        // 역순 루프(i--)에서 적보다 먼저 실행되도록 우선순위를 조작한다!
        if (a.type && !b.type) return 1;
        if (!a.type && b.type) return -1;
        return 0;
    });
    return spawnList;
}

function spawnForceNumbers(targetNumbers) {
    targetNumbers.forEach(num => {
        let radius = 20; 
        let x = Math.random() * (GAME_WIDTH - radius * 2) + radius; 
        let y = -radius; 
        
        items.push({
            type: 'num', // 자네가 아래 메인 루프에서 사용하는 대문자 규격에 완벽 일치!
            val: num,
            x: x,
            y: y,
            radius: radius,
            speed: Math.random() * 150 + 150 // [보정] dt 기반 물리엔진에 맞춰 초당 150~300픽셀 낙하 속도 부여
        });
    });
}

            let centerX = en.x + en.width / 2;
            let centerY = en.y + en.height / 2;
            // 기존 엔진 규격에 맞춰 미디움 급 폭발과 함께 "BOOM!" 텍스트를 띄우지.
            spawnExplosion(centerX, centerY, 'medium', "BOOM!", 0, 1);
        });

        // 2. [핵심 처방] 적들을 담고 있는 가방(배열) 자체를 통째로 비워버리네!
        // 우리 엔진에서 enemies는 let으로 선언되어 있어서 이 대입문 한 줄로 박스까지 싹 날아가지.
        enemies = [];
        
        // 청각적 카타르시스를 위해 쾅- 하는 저음 폭발음도 관제탑 권한으로 강제 재생!
        if (typeof SoundManager !== 'undefined' && SoundManager.playBassExplosion) {
            SoundManager.playBassExplosion(0);
        }
    }
}); // ⬅️ [로건의 픽스] 마감 괄호를 원래의 규격인 '});'로 안전하게 복구했네!

window.addEventListener('mousemove', e => {
    if (gameState !== 'PLAY') return; //

    // 1. 브라우저의 실제 물리 버튼 클릭 상태를 실시간 확인하네.
    const isMouseReallyPressed = (e.buttons === 1);
    isDragging = isMouseReallyPressed; //

    let 계산X = e.clientX;
    let 계산Y = e.clientY;

    // 2. [마우스 포인터 제어]: 오직 버튼다운(조작 중) 상태일 때만 마우스 포인터를 가상의 벽에 가두네!
    if (isDragging) { //
        const canvasMinX = canvasOffsetX;
        const canvasMaxX = canvasOffsetX + GAME_WIDTH * scale;
        const canvasMaxY = canvasOffsetY + GAME_HEIGHT * scale;

        계산X = Math.max(canvasMinX + 10, Math.min(canvasMaxX - 10, e.clientX));
        계산Y = Math.min(canvasMaxY - 10, e.clientY); // 하단 바 탈출 차단!
    } 
    // ※ 버튼업 상태일 때는 계산X, 계산Y에 브라우저 원본 좌표를 그대로 흘려보내서 자유 탈출을 허용하네!

    // 3. 가두거나 풀어준 마우스 좌표를 게임 내부 좌표계로 치환하네.
    const pos = getGameCoordinates(계산X, 계산Y); //
    player.x = Math.max(30, Math.min(GAME_WIDTH - 30, pos.x)); //
    
    // 4. [기체 제어 - 밀착 알고리즘 전면 적용]: 버튼다운이든 업이든 비행기는 무조건 바닥 끝까지 내려가야 하네!
    let targetY = pos.y - 150;
    if (pos.y > GAME_HEIGHT - 120) {
        // 마우스가 하단 120px 구역으로 들어오면 비행기를 바닥 쪽으로 자석처럼 찰칵 밀착시키네.
        let ratio = (pos.y - (GAME_HEIGHT - 120)) / 120;
        targetY = (pos.y - 150) + (120 * ratio);
    }
    
    // 최종적으로 비행기가 화면 밑바닥(GAME_HEIGHT - 30)을 완전히 긁고 다닐 수 있게 리미트를 통일했네!
    player.y = Math.max(50, Math.min(GAME_HEIGHT - 30, targetY)); 
});

window.addEventListener('touchmove', e => { e.preventDefault(); updatePlayerPos(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });

function updatePlayerPos(clientX, clientY) {
    if (gameState !== 'PLAY' || !isDragging) return;
    const pos = getGameCoordinates(clientX, clientY);
    player.x = Math.max(30, Math.min(GAME_WIDTH - 30, pos.x));
    player.y = Math.max(50, Math.min(GAME_HEIGHT - 50, pos.y - 150));
}
function updateExpression(value) {
    const isNum = !isNaN(value); const strVal = String(value);
    let tokens = player.expr.match(/\d+|[+\-×÷]/g);
    if (!tokens) { if (isNum) player.expr = strVal; return; }
    let lastIsNum = !isNaN(tokens[tokens.length - 1]);
    if (isNum) { if (lastIsNum) tokens[tokens.length - 1] = strVal; else tokens.push(strVal); } 
    else { if (!lastIsNum) tokens[tokens.length - 1] = strVal; else tokens.push(strVal); }
    player.expr = tokens.join('');
}

function fireBullet() {
    if (player.expr === "") return;
    if (isNaN(player.expr[player.expr.length - 1])) player.expr = player.expr.slice(0, -1);
    if (player.expr === "") return;
    
    // 💡 [1단계 수정] 관통 아이템(penetration) 여부 확인
    let isPiercing = activeItems.penetration > 0;

    if (isPiercing) {
	
		bullets.push({ 
            x: player.x, 
            y: player.y - 40, 
            text: player.expr, 
            speed: 1200,        // 일반 탄속
            isPiercing: false,   // 일반 탄환 규격으로 발사
            hitList: new Set()
        });
	
        // [새 기획] 관통 아이템 발동 시 지원사격 함수 호출
        triggerSupportFire(player.expr);
        // 1회성 아이템이므로 소멸
        activeItems.penetration = 0;
    } else {
        // 기존의 일반 탄환 발사 로직 그대로 유지
        bullets.push({ 
            x: player.x, 
            y: player.y - 40, 
            text: player.expr, 
            speed: 1200, 
            isPiercing: false,
            hitList: new Set()
        });
    }

    // ▼ 파티클 로직 (그대로 유지)
    for(let i = 0; i < 5; i++) {
        particles.push({
            type: 'spark',
            x: player.x + (Math.random() - 0.5) * 20, 
            y: player.y - 45,
            vx: (Math.random() - 0.5) * 100,
            vy: -200 - Math.random() * 300, 
            life: 0.7, 
            size: Math.random() * 3 + 2,
            color: Math.random() > 0.3 ? '#cccccc' : '#ffffff' 
        });
    }
	
	// 헤비 로테이션 시간이 끝났을 때만 수식을 초기화    
	if (!(activeItems.heavyRotation > 0)) {
        player.expr = "";
    }
}

function triggerSupportFire(firedText) {
    const colWidth = GAME_WIDTH / 7;
    let columns = [0, 1, 2, 3, 4, 5, 6].sort(() => Math.random() - 0.5);
    
    let currentDelay = Math.random() * (2000 - 1000) + 1000;
    
    columns.forEach((colIndex, i) => {
        const finalDelay = currentDelay;
        const isFirstBeam = (i === 0);
        const isLastBeam = (i === 6);
        
        let previewDur = 0.5; 
        let activeDur = 0.4;  
        let fadeDur = 0.3;    
        
        let previewMaxAlpha = 0.4;
        let previewMaxWidth = 4;
        
        // 💡 [해결] 루프 '내부'에서 매 마디마다 새 주사위를 굴려 독립된 메모리를 확보하네!
        let randomizedMaxWidth = Math.random() * (90 - 30) + 30;
        
        if (isFirstBeam) {
            previewDur = 0.8; 
            previewMaxAlpha = 0.6;  
            previewMaxWidth = 2;    
            
            // 🎯 오직 첫 번째 바퀴(i === 0)일 때만 주사위 값을 60으로 강제 락 고정!
            randomizedMaxWidth = 60; 
        }
        if (isLastBeam) {
            fadeDur = 1.0; 
        }
        
        setTimeout(() => {
            supportBeams.push({
                x: colIndex * colWidth + (colWidth / 2),
                elapsed: 0,
                state: 'PREVIEW',
                hasFired: false,
                text: firedText,
                previewDur: previewDur,
                activeDur: activeDur,
                fadeDur: fadeDur,
                previewMaxAlpha: previewMaxAlpha,
                previewMaxWidth: previewMaxWidth,
                maxLineWidth: randomizedMaxWidth // 안전하게 뱃속에 개별 캡처 완료
            });
        }, finalDelay);
        
        if (i === 0) {
            currentDelay += Math.random() * (1300 - 1000) + 1000;
        } else if (i === 1) {
            currentDelay += Math.random() * (800 - 500) + 500;
        } else if (i === 2) {
            currentDelay += Math.random() * (600 - 300) + 300;
        } else {
            currentDelay += Math.random() * (400 - 100) + 100;
        }
    });
}

function spawnDebris(x, y, hp) {
    if (hp < 10) return;
    const count = String(hp).length; 
    const maxVal = Math.floor(hp * 0.2); 
    if (maxVal < 1) return;
    for (let i = 0; i < count; i++) {
        let val = Math.floor(Math.random() * maxVal) + 1;
        items.push({ type: 'num', val: val, x: x, y: y, vx: (Math.random() - 0.5) * 400, vy: (Math.random() - 0.5) * 400, isDebris: true });
    }
}

function spawnExplosion(x, y, tier, textValue, damageVal, multiplier) {
    // 🎲 [로건의 유전자 동기화]: 외부에서 강제로 주입된 사운드 유전자가 있는지 검사하네!
    // 최초 직격탄일 때는 window.nextSoundType이 없을 테니, 여기서 50% 주사위를 딱 한 번만 굴려 픽스하지.
    let soundType = window.nextSoundType || (Math.random() < 0.5 ? 'bass2' : 'bass3');
    let soundBase = window.nextSoundBase || (0.90 + (Math.random() * 0.20));
    
    // 계산된 체인 카운트
    let chain = multiplier > 1 ? (multiplier - 1) : 0; 
    
    // 🎯 확정된 사운드 무기와 고정된 시작 피치를 매니저에게 토스!
    SoundManager.playBassExplosion(chain, soundType, soundBase); 
    
    // 사용한 글로벌 일회성 미끼는 다음 폭발을 위해 즉시 청소하네.
    window.nextSoundType = null;
    window.nextSoundBase = null;
    
    let finalText = textValue;
    if (textValue !== "SHIP IS DESTROYED" && tier === 'critical' && multiplier > 1) { finalText = "Critical"; }
    let textColor = (textValue === "SHIP IS DESTROYED") ? '#666666' : ((tier === 'critical') ? '#ffffff' : '#ffffff');
    
    // 이펙트 텍스트 생성
    particles.push({ type: 'text', x, y, text: finalText, life: 1.0, vy: -150, isCritical: (tier === 'critical'), color: textColor });
    
    // 파티클 기본 물리량 결정
    let count, speed, colors, shockSize;
    if (textValue === "SHIP IS DESTROYED") { count=50; speed=800; colors=['#ffffff', '#888888', '#444444']; shockSize=500; } 
    else if(tier==='small') { count=8; speed=300; colors=['#cccccc']; } 
    else if(tier==='medium') { count=20; speed=500; colors=['#ffffff','#666666']; shockSize=100; } 
    else { count=40; speed=800; colors=['#ffffff','#333333']; shockSize=300; } 
    
    for(let i=0; i<count; i++){
        const ang = Math.random()*Math.PI*2, s = Math.random()*speed;
        particles.push({ type:'spark', x, y, vx:Math.cos(ang)*s, vy:Math.sin(ang)*s, size:Math.random()*4+2, color:colors[i%colors.length], life:1.0, decay:1.5 });
    }
    
    // 🎯 [핵심 패치]: 충격파가 생성될 때 현재 결정된 사운드와 피치 유전자를 뱃속에 문신처럼 새겨놓네!
    if(tier==='critical' || textValue === "SHIP IS DESTROYED") { 
        particles.push({ 
            type: 'shockwave', x, y, size: 10, maxSize: shockSize, color: colors[0], life: 1.0, decay: 1.0, 
            damage: damageVal, hitList: [], age: 0, multiplier: multiplier,
            inheritedSoundType: soundType, // 🔥 무기 유전자 장착!
            inheritedSoundBase: soundBase   // 🔥 피치 유전자 장착!
        }); 
    } 
    else if (tier==='medium') { particles.push({ type:'shockwave_visual', x, y, size:10, maxSize:shockSize, color:colors[0], life:1.0, decay:2.0 }); }
}

function update(dt) {
    updateStars(dt);
    if (pickupTimer > 0) pickupTimer -= dt;

	for (let key in activeItems) {
        if (activeItems[key] > 0) {
            let prevTime = activeItems[key]; 
            activeItems[key] -= (dt / TIME_SCALE);

            // [대망의 피날레] Easy-Busy가 막 끝나는 찰나를 포착!
            if (key === 'easyBusy' && activeItems[key] <= 0 && prevTime > 0) {
                for (let i = items.length - 1; i >= 0; i--) {
                    let it = items[i];
                    if (!it.isDebris) {
                        if ((it.type === 'num' && it.val === 10) || 
                            (it.type === 'sym' && (it.val === '+' || it.val === '×'))) {
                            
                            // 1. 화려한 스파크 파티 생성! 
                            for(let k = 0; k < 8; k++) {
                                particles.push({
                                    type: 'spark',
                                    x: it.x,
                                    y: it.y,
                                    vx: (Math.random() - 0.5) * 400, 
                                    vy: (Math.random() - 0.5) * 400,
                                    life: 1.0,
                                    size: Math.random() * 4 + 2,
                                    color: Math.random() > 0.5 ? '#bbbbbb' : '#ffffff' 
                                });
                            }
                            // 2. 화면에서 깔끔하게 삭제 (파사삭!)
                            items.splice(i, 1);
                        }
                    }
                }
            }
        }
    }

    if (gameState === 'CRASHED') {
        crashTimer += dt;
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i]; p.life -= (p.decay || 1.0) * dt;
            if (p.type === 'text') p.y += p.vy * dt;
            else if (p.type === 'spark') { p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.9; p.vy *= 0.9; }
            else if (p.type === 'shockwave') { p.size += (p.maxSize - p.size) * 5 * dt; }
            if (p.life <= 0) particles.splice(i, 1);
        }
        if (crashTimer > 1.5) { lives--; if (lives <= 0) gameOver(); else triggerStageFail(); }
        return; 
    }
	
	if (gameState === 'WARP') {
		warpTimer += dt;

		// 1. 별들의 속도를 매 프레임마다 미친 듯이 오버클럭하네! (초고속 스크롤 연출용)
		stars.forEach(s => {
			s.speed += 2000 * dt; 
			s.y += s.speed * dt;
			if (s.y > GAME_HEIGHT) { s.y = 0; s.x = Math.random() * GAME_WIDTH; }
		});
		
		// 🎯 [아이템 잔상 격파]: 화면에 남아있던 숫자/기호들을 하단으로 폭풍 사출시켜 상대 속도감을 극대화하네!
		items.forEach(it => {
			it.y += 3000 * dt; // 초속 3000픽셀의 압도적인 속도로 하강!
		});
		// 화면 밑바닥을 완전히 탈출한 자원들은 가방(배열)에서 즉시 삭제하여 메모리 보호
		items = items.filter(it => it.y <= GAME_HEIGHT);

		// 2. 처음 0.6초 동안은 제자리에서 추진력을 모으고, 그 이후 하늘 위로 폭풍 가속 탈출!
		if (warpTimer > 0.6) {
			let accel = (warpTimer - 0.6) * 2200; // 가속도 법칙 적용
			player.y -= accel * dt;
		}

		// 3. 기체가 화면 상단 바깥(-100px)으로 완전히 탈출 성공했는가?
		if (player.y < -100) {						
			if (typeof STAGE_DATA !== 'undefined' && currentLevel <= STAGE_DATA.length) {
				resetStage();
			} else {
				gameState = 'CLEAR';
			}
		}
		return; // 워프 연출 중에는 아래쪽 인게임 연산을 건너뛰네!
	}
	
    if (gameState !== 'PLAY') return;
    if (!(activeItems.timeStop > 0)) {
        elapsedTime += dt * 1000;
    }
    if (enemySpawnData.length === 0 && enemies.length === 0) { stageClearTimer += dt; if (stageClearTimer > 3.0) showLevelClearScreen(); }

	for (let i = enemySpawnData.length - 1; i >= 0; i--) {
        let data = enemySpawnData[i];
        
		if (elapsedTime >= data.time) {
            
            if (data.type) {
                // [STEP 2] 이벤트 디스패처: 명령어를 읽고 전역 변수 업데이트
                if (data.type === 'BGM') { SoundManager.playSpecificBGM(data.val); }
                else if (data.type === 'SPEED') { currentEnemySpeed = data.val; }
                else if (data.type === 'SYMBOL') { currentSymbols = data.val; }
                else if (data.type === 'NUMBER') { currentNumbers = data.val; }
				else if (data.type === 'FORCE') { spawnForceNumbers(data.val); }
                else if (data.type === 'PRINT') {
					// 엑셀이나 파일에서 \n 혹은 실제 줄바꿈 문자가 들어왔을 때를 대비한 분할 처리
					let lines = String(data.text).split(/\\\\n|\n/);
					
					// 글로벌 스크롤 메시지 배열에 새로운 오브젝트 주입!
					scrollingTexts.push({
						lines: lines,
						x: GAME_WIDTH / 2,     // 화면 정중앙 좌표
						y: -30 * lines.length, // 글자 수(줄 수)에 맞춰 화면 위쪽 안 보이는 곳에 스폰
						speed: currentEnemySpeed * 2,
						opacity: 1             // 초기 투명도 (선명함)
					});}
                else if (data.type === 'ITEM') {
                    const colWidth = GAME_WIDTH / 7;
                    const xPos = (data.col - 1) * colWidth + (colWidth / 2);
					
					let width = ENEMY_WIDTH; let height = ENEMY_HEIGHT;
					enemies.push({ 
						x: xPos - width/2, 
						y: -80, 
						width: width, 
						height: height, 
						hp: 1, // 보급선의 체력 (원하는 대로 조절하게)
						maxHp: 1, 
						speed: currentEnemySpeed * 0.8, // 일반 적보다 살짝 느리게
						color: '#888888', // 황금색 테두리!
						isBoss: false,
						dropItem: data.val // ★ 핵심: 죽을 때 떨어뜨릴 아이템 이름을 뱃속에 기억시킴 ★
					});
                }
				
				// === [인게임 광고 구현 STEP 2] 'AD' 명령어를 만나면 고정 속도/유리체력 광고판 투하 ===
                else if (data.type === 'AD') {
                    const colWidth = GAME_WIDTH / 7;
                    // 자네가 정한 7 그리드 시스템(col)을 기반으로 정확한 중심 X 좌표를 계산하네.
                    const xPos = (data.col - 1) * colWidth + (colWidth / 2);
                    
                    let width = 300;   // 우리가 합의한 300x150 규격 고정
                    let height = 150;
                    let fixedFallSpeed = gameAdSpeed;
                    
                    ads.push({
                        x: xPos - width / 2,
                        y: -200,                // 화면 위쪽 외곽 숨은 곳에서 스폰
                        width: width,
                        height: height,
                        vx: 0,                  // 나중에 퉁퉁 튕길 때 사용할 좌우 물리 속도
                        vy: fixedFallSpeed,     // 독자적인 고정 하강 속도 주입
                        hp: 1,                  // 💡 기획 4번 규칙: 총알 한 발에 터지는 유리체력 HP 1
                        isRealized: false,       // 💡 기획 2번 규칙: 특정 고도 전에는 무적 상태를 판별할 플래그라네
						imgSrc: gameAdImgSrc
                    });
                }
				
			} else {
				// 적 소환 (currentEnemySpeed 적용)
				let width = data.isBoss ? 150 : ENEMY_WIDTH; 
				let height = data.isBoss ? 100 : ENEMY_HEIGHT;

				if (!data.isBoss) {
					// 체력 숫자의 길이를 측정하네 (예: 99999는 5자리, 100000은 6자리)
					const hpLength = String(data.hp).length;
					
					// 💡 [로건의 6자리 가드 패치]: 5자리(99999)까지는 완벽하게 순정 폭(80)을 유지하네!
					// 숫자가 6자리가 되는 순간부터 자릿수가 늘어날 때마다 가로폭을 25픽셀씩 시원하게 늘려주네.
					// (6자리일 때 폭 105px, 7자리일 때 폭 130px로 웅장하게 벌크업!)
					if (hpLength >= 6) {
						width = ENEMY_WIDTH + (hpLength - 5) * 25;
					}
				}

					x: data.x - width/2, 
					y: -80,

					height, 
					hp: data.hp, 
					maxHp: data.hp, 
					speed: currentEnemySpeed, 
					color: data.isBoss ? '#444444' : '#ffffff',

					isCriticalOnly: data.isCriticalOnly || false 
				});
			}          
            enemySpawnData.splice(i, 1);
        }
    }

    if (gameState === 'PLAY') {
		for (let i = scrollingTexts.length - 1; i >= 0; i--) {
			let txt = scrollingTexts[i];
			
			// 스테이지 현재 전장 스크롤 속도에 맞춰 실제 시간(dt)만큼 아래로 이동!
			txt.y += txt.speed * dt; 

			// [전술 연출] 화면 하단(GAME_HEIGHT)에 가까워질수록 자연스럽게 페이드아웃(투명화)
			// 화면 하단 도달 150픽셀 전부터 부드럽게 사라지도록 설계했네.
			let fadeZone = GAME_HEIGHT - 150;
			if (txt.y > fadeZone) {
				let distance = GAME_HEIGHT + 100 - txt.y;

			}

			// 완전히 화면 밖(하단 마진 100픽셀)으로 탈출하면 배열에서 즉시 삭제하여 메모리 보호!
			if (txt.y > GAME_HEIGHT + 100) {
				scrollingTexts.splice(i, 1);
			}
		}
	}
	
    
    lastSpawnNum += dt * 1000; lastSpawnSym += dt * 1000;
    
	if (enemies.length > 0 || enemySpawnData.length > 0) {
        
        // ▼ 1. 숫자 폭우 설정: Easy-Busy일 땐 80(0.08초), 아닐 땐 원래 속도
        let currentNumRate = (activeItems.easyBusy > 0) ? 200 : SPAWN_RATE_NUM;
        if (lastSpawnNum > currentNumRate) {
            // [안전장치] currentNumbers에 데이터가 있을 때만 실행!

            // ▼ 삼항 연산자로 Easy-Busy 체크!
                let randNum = (activeItems.easyBusy > 0) ? 10 : currentNumbers[Math.floor(Math.random() * currentNumbers.length)];
                items.push({ type:'num', val:randNum, x:Math.random()*(GAME_WIDTH-60)+30, y:-40, speed:180 + Math.random()*60 }); 
            }
            lastSpawnNum = 0;

        // ▼ 2. 기호 폭우 설정: Easy-Busy일 땐 150(0.15초), 아닐 땐 원래 속도
        let currentSymRate = (activeItems.easyBusy > 0) ? 150 : SPAWN_RATE_SYM;
        if (lastSpawnSym > currentSymRate) {
            // [안전장치] currentSymbols에 데이터가 있을 때만 실행!
            if (currentSymbols.length > 0) {
                // ▼ 여기서 Easy-Busy 체크! 활성화 중이면 '+', '×'만 들어있는 임시 배열(Pool)을 사용하네.
                let symPool = (activeItems.easyBusy > 0) ? ['×'] : currentSymbols;
                
                // === [로건의 결정론적 순환 스폰 수술] ===
                // 1. 혹시 스테이지가 바뀌어서 배열 크기보다 인덱스가 커졌을 상황을 대비한 안전장치!
                if (symIndex >= symPool.length) symIndex = 0;
                
                // 2. 랜덤이 아니라 현재 포인터 위치의 기호를 정확하게 픽스하네!
                let randSym = symPool[symIndex];
                
                // 3. 다음 기호를 준비하기 위해 인덱스를 1 키우고, 배열 크기를 넘어가면 0으로 리셋(순환)!
                symIndex = (symIndex + 1) % symPool.length;
                
                items.push({

                    y: -40,

                });

            lastSpawnSym = 0; 
        }
    }
    
    for (let i = items.length - 1; i >= 0; i--) {
        let it = items[i]; 
        
        if (it.isDebris) {
            it.x += it.vx * dt;
            it.y += it.vy * dt;
            it.vy += 200 * dt;
        } else {
			let speedBoost = (activeItems.easyBusy > 0) ? 1.0 : 1.0;
            it.y += (it.speed * speedBoost) * dt;
        }

        if (isDragging && Math.abs(it.x - player.x) < 40 && Math.abs(it.y - player.y) < 40) {
            if (pickupTimer <= 0) {
			
				if (it.type === 'special') {
					if (it.val === 'EASY_BUSY') {
						activeItems.easyBusy = 10.0;	
						// activePrint를 지우고, 흐르는 텍스트 배열에 직접 주입하네!
						// scrollingTexts.push({ lines: ["EASY-BUSY!"], x: GAME_WIDTH / 2, y: it.y, speed: currentEnemySpeed, opacity: 1 });
						
						items.forEach(existingItem => {
							if (existingItem.type === 'num' && !existingItem.isDebris) existingItem.val = 10;
							else if (existingItem.type === 'sym') existingItem.val = Math.random() < 0.5 ? '+' : '×';

					else if (it.val === 'HEAVY_ROTATION') {

					}
					
					SoundManager.playItemGet('special');
					items.splice(i, 1);

				}
			
                if (!(player.expr === "" && it.type === 'sym')) { 
                    updateExpression(it.val); 
                    SoundManager.playItemGet(it.type); 
                    items.splice(i, 1);
                    pickupTimer = PICKUP_COOLDOWN; 
                    continue; 
                }
            }
        }
        if (it.y > GAME_HEIGHT) items.splice(i, 1);
    }
	
	// === [인게임 광고 구현 STEP 3] 광고판 이동, 실체화 고도 판정, 화면 탈출 처리 ===
	
	for (let i = ads.length - 1; i >= 0; i--) {
        let ad = ads[i];

        // 💡 [추가] 0.3초 재충돌 방지를 위한 쿨타임 타이머 실시간 차감 연산일세.
        if (ad.hitCooldown > 0) {
            ad.hitCooldown -= dt;
        }

        // 물리 이동 연산
        ad.y += ad.vy * dt;
        ad.x += ad.vx * dt;

        // 중력 가속도 회로: 쳐올려진 광고판이 다시 아래로 떨어지게 만드는 힘
        if (ad.vy < gameAdSpeed) {
            ad.vy += 450 * dt; 
            if (ad.vy > gameAdSpeed) ad.vy = gameAdSpeed; // 원래 고정 속도로 복귀
        }

        // 광고판이 좌우 경계를 뚫고 나가지 못하도록 가두고 벽 바운스 연산
        if (ad.x < 0) {
            ad.x = 0;
            ad.vx = -ad.vx * 0.5; // 벽에 부딪히면 50%의 힘으로 반사 튕김
        } else if (ad.x > GAME_WIDTH - ad.width) {
            ad.x = GAME_WIDTH - ad.width;
            ad.vx = -ad.vx * 0.5;
        }

        ad.vx *= 0.95; // 마찰력

        // 고도 실체화 판정
        if (!ad.isRealized && ad.y >= 500) {
            ad.isRealized = true;
        }

        // 💡 [수정] 광고판이 실체화되었고, 충돌 쿨타임이 완전히 끝났을 때만 정밀 충돌 판정을 가동하네!
        if (ad.isRealized && (!ad.hitCooldown || ad.hitCooldown <= 0)) {
            let adCenterX = ad.x + ad.width / 2;
            let adCenterY = ad.y + ad.height / 2;
            
            // 가로/세로 영역 안으로 기체가 진입했는지 기본 히트박스 판정
            if (Math.abs(adCenterX - player.x) < (ad.width / 2 + 30) && 
                Math.abs(adCenterY - player.y) < (ad.height / 2 + 30)) {
                
                // [충돌 위치별 Y축 가속도 분기]
                if (player.y > adCenterY) {
                    // 비행기가 광고판 중심보다 아래에 있을 때: 하늘 위로 포물선 반발 사출 (-400)
                    ad.vy = -400; 
                } else {
                    // 비행기가 광고판 중심보다 위에 있을 때: 화면 아래로 강하게 사출 (600)
                    ad.vy = 600; 
                }
                
                // 옆으로 비껴 튕겨나가는 수평(X축) 가속도 연산
                ad.vx = (adCenterX - player.x) * 2; 
                
                // 💡 [핵심 추가] 충돌 직후 0.3초간 히트박스를 완전히 잠가버려서 중복 트리거 버그를 원천 봉쇄하네!
                ad.hitCooldown = 0.3;
                
                SoundManager.playBlockSound();
            }
        }

        // 화면 탈출 처리
        if (ad.y > GAME_HEIGHT) {
            ads.splice(i, 1);
        }
    }
	   
    for (let i = enemies.length - 1; i >= 0; i--) {
        let en = enemies[i];

        // ▼ 타임스톱이 아닐 때만 적이 아래로 이동! (시간이 멈추면 속도가 0이 되는 효과)
        if (!(activeItems.timeStop > 0)) {
            en.y += en.speed * dt;
        }

        // ▼ 충돌 판정은 무조건 검사! (얼어붙은 적에게 들이받으면 가차 없이 터지네!)
        if (Math.abs((en.x + en.width/2) - player.x) < (en.width/2 + 20) && Math.abs((en.y + en.height/2) - (player.y - 20)) < (en.height/2 + 20)) { 
            handlePlayerCrash(); 
            return; 
        }
        
        // 화면 밖으로 나갔을 때의 판정
        if (en.y > GAME_HEIGHT) { 
            lives--; 
            if (lives <= 0) { gameOver(); } else { triggerStageFail(); } 
            return; 
        }
    }
    
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i]; 
        b.y -= b.speed * dt;
        let bulletDestroyed = false; // [로건의 보너스] 총알이 삭제되었는지 기억하는 안전장치!
		
		// 💡 [추가] 총알과 광고판의 실시간 피격 충돌 연산 구역일세!
        for (let j = ads.length - 1; j >= 0; j--) {
            let ad = ads[j];
            
            // 광고판이 실체화 상태이고, 총알이 광고판의 사각형 영역 내부로 진입했는가?
            if (ad.isRealized && b.x > ad.x && b.x < ad.x + ad.width && b.y > ad.y && b.y < ad.y + ad.height) {
                
                // 관통 탄환 아이템 활성화 시 중복 피격 방지 명부 가동
                if (b.isPiercing && b.hitList.has(ad)) continue;
                if (b.isPiercing) b.hitList.add(ad);
                
                ad.hp -= 1; // 기획에 명시된 단 1발에 터지는 유리체력 HP 1 반영
                
                if (ad.hp <= 0) {
                    // 짜릿한 파괴 연출용 중형 폭발과 텍스트 생성
                    spawnExplosion(ad.x + ad.width / 2, ad.y + ad.height / 2, 'medium', "", 1, 1);
                    
                    // 🎲 네 가지 특수 아이템 풀(Pool)에서 완벽하게 무작위로 하나를 선택하네!
                    const itemPool = ['EASY_BUSY', 'HEAVY_ROTATION', 'TIME_STOP', 'PENETRATION'];
                    const chosenItem = itemPool[Math.floor(Math.random() * itemPool.length)];
                    
                    // 파괴된 광고판의 정중앙 좌표에서 특별 보급 상자 사출!
                    items.push({ 
                        type: 'special', 
                        val: chosenItem, 
                        x: ad.x + ad.width / 2, 
                        y: ad.y + ad.height / 2, 
                        speed: 150 
                    });
                    
                    // 화면 뒤에 오버레이되어 떠 있던 진짜 HTML 껍데기 엘리먼트 즉시 증발
                    if (ad.element) ad.element.remove();
                    
                    // 광고판 가방(배열)에서 완전히 제거
                    ads.splice(j, 1);
                }
                
                // 관통 탄환이 아닐 경우 총알을 즉시 소멸시키고 적 충돌 검사 패스
                if (!b.isPiercing) {
                    bullets.splice(i, 1);
                    bulletDestroyed = true;
                    break;
                }
            }
        }

        // 💡 [안전장치 추가] 총알이 광고판을 맞춰 이미 소멸했다면, 아래 적 충돌 검사는 건너뛰어야 하네!
        if (bulletDestroyed) continue;

        for (let j = enemies.length - 1; j >= 0; j--) {
            let en = enemies[j];
            
            // 1. 총알과 적의 기본 충돌 검사
            if (b.x > en.x - 5 && b.x < en.x + en.width + 5 && b.y > en.y && b.y < en.y + en.height) {
                
                // ▼▼▼ [NEW 1] 이미 때린 적은 명부(HitList)를 보고 무시! ▼▼▼
                if (b.isPiercing && b.hitList.has(en)) {
                    continue; 
                }

                // ▼▼▼ [NEW 2] 처음 때린 적이라면 명부에 바로 이름(en)을 적음! ▼▼▼
                if (b.isPiercing) {
                    b.hitList.add(en);
                }

                // (--- 이 아래는 기존 데미지 및 이펙트 로직 그대로! ---)
                let cleanExpr = b.text.replace(/×/g, '*').replace(/÷/g, '/');
                let dmg = 1; try { dmg = Math.floor(eval(cleanExpr)); } catch(e) {} if (dmg < 1) dmg = 1;
                let isCrit = (en.hp === dmg);
				
				// === [로건의 수술 1: 직격탄 방패 로직] ===
                if (en.isCriticalOnly && !isCrit) {
                    SoundManager.playBlockSound(); // 깡!
                    spawnExplosion(en.x + en.width/2, en.y + en.height/2, 'small', "BLOCK!", 0, 1);
                    
                    if (!b.isPiercing) {
                        bullets.splice(i, 1);
                        bulletDestroyed = true;
                    }
                    break; // 이번 총알은 이 적에게 막혔으므로 적 루프 종료
                }
				
                let tier = (en.hp - dmg <= 0) ? (isCrit ? 'critical' : 'medium') : 'small';
                let actualDmg = Math.min(en.hp, dmg);
                
                if (isCrit) {
					if (en.isBoss) {
						spawnDebris(en.x + en.width/2, en.y + en.height/2, en.hp);
					}
                }

                score += dmg;
                spawnExplosion(en.x + en.width/2, en.y + en.height/2, tier, isCrit ? "CRITICAL!" : dmg, dmg, 2);
                en.hp -= dmg; 
                if (en.hp <= 0) {
                    if (en.dropItem) {
                        items.push({ 
                            type: 'special', val: en.dropItem, 
                            x: en.x + en.width / 2, y: en.y + en.height / 2, speed: 150 
                        });
                    }                           
                    enemies.splice(j, 1); 
                }
                // (--- 데미지 로직 끝 ---)

                // ▼▼▼ [NEW 3] 관통탄은 파괴되지 않고 뚫고 지나감! ▼▼▼
                if (!b.isPiercing) {
                    bullets.splice(i, 1); // 일반 총알만 여기서 터짐
                    bulletDestroyed = true; // 삭제되었다고 도장 쾅!
                    break; // 더 이상 다른 적을 검사할 필요 없으니 탈출
                }
            }
        }
        
        // ▼▼▼ [NEW 4] 화면 밖으로 나간 총알 삭제 (버그 픽스 포함) ▼▼▼
        // 이미 적을 때려서 삭제된 총알(bulletDestroyed)을 또 지우려다 에러가 나는 걸 방지!
        if (!bulletDestroyed && b.y < -100) {
            bullets.splice(i, 1);
        }
    }
    
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.life -= (p.decay || 1.0) * dt; p.y += ENEMY_BASE_SPEED * dt;
        if (p.type === 'text') p.y += p.vy * dt;
        else if (p.type === 'spark') { p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.9; p.vy *= 0.9; }
        else if (p.type === 'shockwave' || p.type === 'shockwave_visual') {
            p.size += (p.maxSize - p.size) * 3 * dt;
            if (p.type === 'shockwave') {
                p.age += dt;
                if (p.age <= CHAIN_DMG_DURATION) {
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        let en = enemies[j]; if (en.y < 0 || en.y > GAME_HEIGHT) continue; if (p.hitList.includes(en)) continue;
                        let dist = Math.hypot((en.x + en.width/2) - p.x, (en.y + en.height/2) - p.y);
                        if (dist < p.size - 10) {
                            let isStrictCrit = (en.hp === p.damage); 
							
							// 적이 C타입인데 숫자가 딱 맞지 않으면 '깡-' 소리와 함께 무시!
                            if (en.isCriticalOnly && !isStrictCrit) {
                                SoundManager.playBlockSound(); // 깡!
                                spawnExplosion(en.x + en.width/2, en.y + en.height/2, 'small', "BLOCK!", 0, 1);
                                p.hitList.push(en); // 이번 충격파에는 이미 맞은 것으로 처리해서 중복 BLOCK 방지
                                continue; // 아래의 대미지 처리 로직을 건너뛰고 다음 적 검사로 넘어감
                            }
							let actualDmg = Math.min(en.hp, p.damage);
                            score += actualDmg * p.multiplier; en.hp -= p.damage; p.hitList.push(en);
                            if (en.hp <= 0) {
                                if (isStrictCrit && en.isBoss) spawnDebris(en.x + en.width/2, en.y + en.height/2, p.damage);
								window.nextSoundType = p.inheritedSoundType;
								window.nextSoundBase = p.inheritedSoundBase;
                                spawnExplosion(en.x + en.width/2, en.y + en.height/2, isStrictCrit ? 'critical' : 'medium', isStrictCrit ? "CHAIN!" : p.damage, p.damage, p.multiplier + 1);
								if (en.dropItem) { items.push({ type: 'special', val: en.dropItem, x: en.x + en.width/2, y: en.y + en.height/2, speed: 150 }); }
                                enemies.splice(j, 1);
                            } else { spawnExplosion(en.x + en.width/2, en.y + en.height/2, 'small', p.damage, 1); }
                        }
                    }
                }
            }
        }
        if (p.life <= 0) particles.splice(i, 1);
    }
	
	if (gameState === 'PLAY') {
        // 현재 수식을 문자/기호 단위 토큰으로 정밀 분해하네. (예: "10+5" -> ["10", "+", "5"])
        const tokens = player.expr.match(/\d+|[+\-×÷]/g) || [];
        
        // 글자가 늘어나거나 줄어들면 꼬리 좌표 가방 크기도 동기화하네.
        if (tailPositions.length !== tokens.length) {
            if (tailPositions.length < tokens.length) {
                while (tailPositions.length < tokens.length) {
                    tailPositions.push({ x: player.x, y: player.y + 50 });
                }
            } else {
                tailPositions.splice(tokens.length);
            }
        }

        // 각 마디가 앞 단계를 부드럽게 추적하는 lerp(보간) 공식 발동!
        for (let i = 0; i < tokens.length; i++) {
            let targetX, targetY;
            
            if (i === 0) {
                // 첫 번째 마디는 비행기 바로 밑 45px 지점을 조준하네.
                targetX = player.x;
                targetY = player.y + 50;
            } else {
                // 두 번째 마디부터는 바로 앞 마디의 X좌표와, 앞 마디의 Y에서 30px 더 아래 지점을 조준하네!
                targetX = tailPositions[i - 1].x;
                targetY = tailPositions[i - 1].y + 20;
            }

            // 텔레포트하지 않고 dt 속도에 맞춰 스르륵 미끄러지듯 따라오게 만드는 전술 보간 공식
            tailPositions[i].x += (targetX - tailPositions[i].x) * 15 * dt;
            tailPositions[i].y += (targetY - tailPositions[i].y) * 15 * dt;
        }
    }
	
	// ==========================================
    // 🛸 [2단계] HOLD ON, I'M COMING 지원사격 타임라인 업데이트
    // ==========================================
    for (let i = supportBeams.length - 1; i >= 0; i--) {
        let beam = supportBeams[i];
        beam.elapsed += dt;

        // 💡 뱃속의 데이터를 꺼내 누적 타임라인 임계점 계산
        let t1 = beam.previewDur;
        let t2 = t1 + beam.activeDur;
        let t3 = t2 + beam.fadeDur;

        if (beam.elapsed < t1) {
            beam.state = 'PREVIEW';
        } else if (beam.elapsed < t2) {
            beam.state = 'ACTIVE';

            if (!beam.hasFired) {
                let fireText = beam.text || "1"; 
                bullets.push({
                    x: beam.x,
                    y: GAME_HEIGHT,
                    text: fireText,
                    speed: 3500,    
                    isPiercing: true,
                    isSupport: true, 
                    hitList: new Set()
                });
                beam.hasFired = true; 	
                SoundManager.playBassExplosion(-1); 
            }
        } else if (beam.elapsed < t3) {
            beam.state = 'FADE';
        } else {
            supportBeams.splice(i, 1);
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
	drawStars();

    // ⚡ [3단계] HOLD ON, I'M COMING 애니메이션 레이저 렌더링
    // ==========================================
    supportBeams.forEach(beam => {
        ctx.save();
        
        let alpha = 0;
        let lineWidth = 0;

        let t1 = beam.previewDur;
        let t2 = t1 + beam.activeDur;

        if (beam.state === 'PREVIEW') {
            let progress = beam.elapsed / t1;
            alpha = progress * beam.previewMaxAlpha;        
            lineWidth = progress * beam.previewMaxWidth;      
        } else if (beam.state === 'ACTIVE') {
            let activeElapsed = beam.elapsed - t1;
            let growDur = 0.12; 
            
            if (activeElapsed < growDur) {
                let progress = activeElapsed / growDur;
                alpha = 1.0;
                lineWidth = beam.previewMaxWidth + (beam.maxLineWidth - beam.previewMaxWidth) * progress;
            } else {
                alpha = 1.0;                   
                lineWidth = beam.maxLineWidth; // 💡 여기에 고정 수치 60이 남아있었다면 범인일세!             
            }
        } else if (beam.state === 'FADE') {
            let progress = (beam.elapsed - t2) / beam.fadeDur;
            alpha = 1.0 * (1 - progress);
            lineWidth = beam.maxLineWidth * (1 - progress); // 💡 여기도 변수 연동 완료!
        }

        if (lineWidth > 0) {
            ctx.strokeStyle = `rgba(255, 255, 255, ${alpha * 0.3})`;
            ctx.lineWidth = lineWidth + 24; 
            ctx.beginPath();
            ctx.moveTo(beam.x, 0); ctx.lineTo(beam.x, GAME_HEIGHT); ctx.stroke();

            ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
            ctx.lineWidth = lineWidth;
            ctx.beginPath();
            ctx.moveTo(beam.x, 0); ctx.lineTo(beam.x, GAME_HEIGHT); ctx.stroke();
        }
        
        ctx.restore();
    });
	
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.strokeRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

	if (gameState === 'PLAY') {

			txt.lines.forEach((line, index) => {

	if (gameState === 'PLAY' || gameState === 'TRANSITION' || gameState === 'FAIL' || gameState === 'INPUT' || gameState === 'CRASHED' || gameState === 'WARP') {

				ctx.font = 'bold 18px "Neo Dunggeunmo"';

				ctx.fillText(`${label}: ${activeItems[key].toFixed(2)}`, GAME_WIDTH - 20, timerY);

		}
        
		// === [아이템 렌더링 영역] ===
        items.forEach(it => {
            ctx.save();

			} else if (it.type === 'special') {
                // 💡 [로건의 픽셀 가드]: 브라우저가 이미지를 강제로 뭉개는 보간법을 꺼서, 거친 도트 맛을 살려내네!
                const prevSmoothing = ctx.imageSmoothingEnabled;

		if (gameState !== 'CRASHED' && gameState !== 'FAIL' && gameState !== 'GAMEOVER') {
			if (player.expr !== "" && tailPositions.length > 0) {
                const tokens = player.expr.match(/\d+|[+\-×÷]/g) || [];

		}
		
        particles.forEach(p => { ctx.save(); ctx.globalAlpha = p.life; if (p.type === 'text') { ctx.translate(p.x, p.y); ctx.fillStyle = p.color; ctx.font = (p.isCritical?'bold 40px':'30px') + ' "Neo Dunggeunmo"'; ctx.textAlign = 'center'; ctx.fillText(p.text, 0, 0); } else if (p.type === 'spark') { ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2); ctx.fill(); } else if (p.type === 'shockwave' || p.type === 'shockwave_visual') { ctx.strokeStyle = p.color; ctx.lineWidth = 5 * p.life; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.stroke(); } ctx.restore(); });
		
        ctx.restore();
    }
	
	// === [인게임 광고 구현 STEP 4] 캔버스 위에 HTML GIF 광고판 동기화 렌더링 ===
    // 1. 현재 브라우저 화면에 떠 있는 모든 광고 DOM 요소에 '미확인' 임시 표식을 남기네.
    const existingAdElements = document.querySelectorAll('.ingame-ad');
    existingAdElements.forEach(el => el.dataset.verified = "false");

    // 현재 브라우저 창에서 캔버스가 정중앙 어디에 위치해 있는지 실제 스크린 좌표를 계산하네.
    const canvasRect = canvas.getBoundingClientRect();

    // 2. 현재 활성화된 ads 배열을 순회하며 HTML 엘리먼트를 매핑하고 좌표를 동기화하네.
    ads.forEach(ad => {
        // 아직 DOM 엘리먼트가 생성되지 않았다면 최초 1회만 생성하네 (GIF 연속 재생 유지 목적)
        if (!ad.element) {
            const img = document.createElement('img');
            img.src = ad.imgSrc;
            img.className = 'ingame-ad';
            img.style.position = 'absolute';
            img.style.width = ad.width + 'px';
            img.style.height = ad.height + 'px';
            img.style.pointerEvents = 'none'; // 💡 유저의 마우스 클릭이나 조작을 방해하지 않게 차단하네.
			img.style.border = '2px solid #aaa';
            img.style.boxSizing = 'border-box';
            img.style.zIndex = '-1';          // 💡 캔버스 뒷면(배경)으로 배치하네.
            document.body.appendChild(img);
            ad.element = img;
        }

        // 실시간 좌표 매핑 (브라우저 절대 좌표 = 캔버스 시작점 + 게임 내부 좌표)
		ad.element.style.left = (canvasRect.left + ad.x * scale) + 'px';
        ad.element.style.top = (canvasRect.top + ad.y * scale) + 'px';
        ad.element.style.width = (ad.width * scale) + 'px';
        ad.element.style.height = (ad.height * scale) + 'px';

        // 💡 기획 2번 규칙 시각화: Y고도 100 미만인 안전 진입 단계(유령 상태)일 때는 반투명, 실체화 후엔 선명하게!
        ad.element.style.opacity = ad.isRealized ? '1.0' : '0.4';

        // 확인 도장 쾅! (배열에 살아있는 녀석임을 증명)
        ad.element.dataset.verified = "true";
    });

    // 3. 전 단계(STEP 3)에서 화면을 탈출해 배열에서 삭제된 광고판들의 찌꺼기 DOM 요소들을 깨끗하게 청소하네.
    existingAdElements.forEach(el => {
        if (el.dataset.verified === "false") {
            el.remove();
        }
    });
	
}
function gameLoop(currentTime) {
    const dt = (currentTime - lastTime) / 1000;
    lastTime = currentTime;
    if (dt < 0.1) { update(dt * TIME_SCALE); } 
    draw(); 
    requestAnimationFrame(gameLoop);
}

lastTime = performance.now();
requestAnimationFrame(gameLoop);

</script>
